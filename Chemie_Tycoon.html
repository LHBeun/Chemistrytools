              <div className="rounded-md border px-3 py-2 text-xs font-mono-data" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
                <div className="text-[10px] uppercase tracking-wide mb-1.5" style={{ color: 'var(--text)' }}>Financieel (deze tick, niet cumulatief)</div>
                <div className="flex justify-between mb-0.5"><span style={{ color: 'var(--text-dim)' }}>Omzet</span><span style={{ color: 'var(--green)' }}>+{fmtEuro(b.revenue)}</span></div>
                <div className="flex justify-between mb-0.5"><span style={{ color: 'var(--text-dim)' }}>Grondstof</span><span style={{ color: 'var(--red)' }}>−{fmtEuro(b.feedCost)}</span></div>
                <div className="flex justify-between mb-0.5"><span style={{ color: 'var(--text-dim)' }}>Energie (T+druk+scheiding+recirc.)</span><span style={{ color: 'var(--red)' }}>−{fmtEuro(totalEnergyCost)}</span></div>
                <div className="flex justify-between mb-0.5"><span style={{ color: 'var(--text-dim)' }}>Onderhoud</span><span style={{ color: 'var(--red)' }}>−{fmtEuro(b.maintenanceCost)}</span></div>
                <div className="flex justify-between pt-1 mt-1 border-t font-semibold" style={{ borderColor: 'var(--border)' }}>
                  <span style={{ color: 'var(--text)' }}>Winst/tick</span>
                  <span style={{ color: snapshot.profitDelta >= 0 ? 'var(--green)' : 'var(--red)' }}>{fmtEuro(snapshot.profitDelta)}</span>
                </div>
              </div>

              <div className="rounded-md border px-3 py-2 text-xs font-mono-data" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
                <div className="text-[10px] uppercase tracking-wide mb-1.5" style={{ color: 'var(--text)' }}>Milieu (per ton {sp.c}, genormaliseerd)</div>
                <div className="flex justify-between mb-0.5"><span style={{ color: 'var(--text-dim)' }}>Energieverbruik/ton</span><span>{snapshot.energyPerTon.toFixed(0)} eenh.</span></div>
                <div className="flex justify-between"><span style={{ color: 'var(--text-dim)' }}>CO2-uitstoot/ton</span><span>{snapshot.co2PerTon.toFixed(3)} ton</span></div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function BottomFinancePanel({ expanded, onToggle, winst, loanBalance, totals, monthlyTotals, onRepayLoan, unlocked, activeProjectId, projectProgress, rdYearlyCommitment, onSelectProject, onSetYearlyCommitment, process }) {
  const [repayAmount, setRepayAmount] = useState(Math.round(loanBalance / 2) || 0);
  const activeItem = process.researchItems.find(r => r.id === activeProjectId);
  const pointsPerYear = GAME.rdEfficiencyK * Math.sqrt(rdYearlyCommitment);
  const rows = [
    { label: 'Omzet', field: 'revenue', sign: '+' },
    { label: 'Grondstofkosten', field: 'feedCost', sign: '-' },
    { label: 'Energie — verwarming (T)', field: 'energyCostHeat', sign: '-' },
    { label: 'Energie — compressie (druk)', field: 'energyCostComp', sign: '-' },
    { label: 'Energie — scheiding', field: 'energyCostSep', sign: '-' },
    { label: 'Energie — recirculatie (retourlus)', field: 'energyCostRecirculation', sign: '-' },
    { label: 'Onderhoud', field: 'maintenanceCost', sign: '-' },
    { label: 'Reparaties', field: 'repairCost', sign: '-' },
    { label: 'CO2-rechten', field: 'co2RightsCost', sign: '-' },
    { label: 'Rente op lening', field: 'interestCost', sign: '-' },
    { label: 'Heffing (wetgeving)', field: 'heffingCost', sign: '-' },
    { label: 'Apparatuur/katalysator', field: 'equipmentCost', sign: '-' },
  ];
  const sumSigned = (t) => rows.reduce((s, r) => s + (r.sign === '+' ? t[r.field] : -t[r.field]), 0);
  const monthlyProfit = sumSigned(monthlyTotals);
  const totalProfit = sumSigned(totals);
  return (
    <div className="border-t" style={{ borderColor: 'var(--border)', background: 'var(--panel)' }}>
      <div onClick={onToggle} className="flex items-center justify-between px-4 py-2 cursor-pointer select-none">
        <div className="flex items-center gap-4 font-mono-data text-sm flex-wrap">
          <span style={{ color: 'var(--text-dim)' }}>Financiën</span>
          <span style={{ color: 'var(--text-dim)' }}>In kas:</span>
          <span style={{ color: winst >= 0 ? 'var(--green)' : 'var(--red)' }}>{fmtEuro(winst)}</span>
          {loanBalance > 0 && <span style={{ color: 'var(--amber)' }}>Lening: {fmtEuro(loanBalance)}</span>}
          {activeItem && <span style={{ color: 'var(--cyan)' }}>R&D: {activeItem.label} ({Math.round(projectProgress / activeItem.cost * 100)}%)</span>}
        </div>
        <span className="text-xs" style={{ color: 'var(--text-dim)' }}>{expanded ? '▾ inklappen' : '▸ uitklappen'}</span>
      </div>
      {expanded && (
        <div className="px-4 pb-4 grid gap-4" style={{ gridTemplateColumns: 'minmax(0,1fr) minmax(0,320px)' }}>
          <div className="text-xs font-mono-data">
            <div className="grid mb-1.5 pb-1 border-b" style={{ gridTemplateColumns: '1fr 150px 150px', borderColor: 'var(--border)' }}>
              <span></span>
              <span className="text-right" style={{ color: 'var(--text)' }}>deze maand</span>
              <span className="text-right" style={{ color: 'var(--text)' }}>totaal</span>
            </div>
            {rows.map(r => (
              <div key={r.label} className="grid mb-1" style={{ gridTemplateColumns: '1fr 150px 150px' }}>
                <span style={{ color: 'var(--text-dim)' }}>{r.label}</span>
                <span className="text-right" style={{ color: r.sign === '+' ? 'var(--green)' : 'var(--red)' }}>{r.sign}{fmtEuro(Math.abs(monthlyTotals[r.field])).replace('€', '€ ')}</span>
                <span className="text-right" style={{ color: r.sign === '+' ? 'var(--green)' : 'var(--red)' }}>{r.sign}{fmtEuro(Math.abs(totals[r.field])).replace('€', '€ ')}</span>
              </div>
            ))}
            <div className="grid mt-2 pt-2 border-t font-semibold" style={{ gridTemplateColumns: '1fr 150px 150px', borderColor: 'var(--border)' }}>
              <span style={{ color: 'var(--text)' }}>Winst</span>
              <span className="text-right" style={{ color: monthlyProfit >= 0 ? 'var(--green)' : 'var(--red)' }}>{fmtEuro(monthlyProfit)}</span>
              <span className="text-right" style={{ color: totalProfit >= 0 ? 'var(--green)' : 'var(--red)' }}>{fmtEuro(totalProfit)}</span>
            </div>
          </div>
          <div className="flex flex-col gap-3">
            <div className="rounded-md border px-3 py-2" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
              <div className="text-xs uppercase tracking-wide mb-1.5" style={{ color: 'var(--text)' }}>Lening</div>
              {loanBalance > 0 ? (
                <>
                  <div className="text-xs font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>Openstaand: <span style={{ color: 'var(--amber)' }}>{fmtEuro(loanBalance)}</span> (6%/jaar)</div>
                  <input type="range" min={0} max={loanBalance} step={Math.max(1, Math.round(loanBalance/100))} value={Math.min(repayAmount, loanBalance)}
                         onChange={(e) => setRepayAmount(parseFloat(e.target.value))} className="w-full mb-2" />
                  <div className="flex justify-between text-xs font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>
                    <span>Aflossen: {fmtEuro(repayAmount)}</span>
                  </div>
                  <button onClick={() => onRepayLoan(repayAmount)}
                          className="w-full text-xs rounded-md border px-2 py-1.5 hover:bg-white/5"
                          style={{ borderColor: 'var(--green)', color: 'var(--green)' }}>
                    Aflossen
                  </button>
                </>
              ) : (
                <div className="text-xs" style={{ color: 'var(--text-dim)' }}>Geen openstaande lening.</div>
              )}
            </div>

            <div className="rounded-md border px-3 py-2" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
              <div className="text-xs uppercase tracking-wide mb-1.5" style={{ color: 'var(--text)' }}>🔬 R&amp;D</div>
              <select value={activeProjectId || ''} onChange={(e) => onSelectProject(e.target.value)}
                      className="w-full text-xs rounded-md border px-2 py-1.5 mb-2"
                      style={{ background: 'var(--panel)', borderColor: 'var(--border)', color: 'var(--text)' }}>
                <option value="" disabled>Kies een project…</option>
                {process.researchItems.map(item => {
                  const prereqMet = !item.prerequisite || unlocked[item.prerequisite];
                  const prereqLabel = item.prerequisite ? process.researchItems.find(r => r.id === item.prerequisite)?.label : null;
                  return (
                    <option key={item.id} value={item.id} disabled={unlocked[item.id] || !prereqMet}>
                      {item.label} ({item.cost} pt){unlocked[item.id] ? ' ✓' : (!prereqMet ? ` 🔒 vereist eerst: ${prereqLabel}` : '')}
                    </option>
                  );
                })}
              </select>
              {activeItem && (
                <>
                  <div className="w-full h-1.5 rounded-full overflow-hidden mb-1" style={{ background: '#233038' }}>
                    <div style={{ width: `${Math.min(100, projectProgress/activeItem.cost*100)}%`, height: '100%', background: 'var(--cyan)', transition: 'width 0.4s ease' }} />
                  </div>
                  <div className="text-[11px] font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>{projectProgress.toFixed(0)} / {activeItem.cost} pt</div>
                </>
              )}
              <input type="range" min={0} max={8000000} step={50000} value={rdYearlyCommitment}
                     onChange={(e) => onSetYearlyCommitment(parseFloat(e.target.value))} className="w-full mb-1" />
              <div className="flex justify-between text-[11px] font-mono-data" style={{ color: 'var(--text-dim)' }}>
                <span>{fmtEuro(rdYearlyCommitment)}/jaar</span>
                <span>{pointsPerYear.toFixed(1)} pt/jaar</span>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- CO2-rechtenmarkt ---------- */

function Co2MarketModal({ co2Rights, protestStress, co2CatTotals, co2RightsBasePrice, purchasedThisYear, co2IntensityLive, totalNh3Kg, co2TotalAll, hasGreenCertificate, legislativeCap, inGracePeriod, process, onBuy, onEmergencyBuy, onClose }) {
  const [amountTon, setAmountTon] = useState(5000);
  const amountKg = amountTon * 1000;
  const cost = co2RightsPurchaseCost(amountKg, co2RightsBasePrice);
  const pricePerTon = cost / amountTon;
  const stressColor = protestStress > 60 ? 'var(--red)' : protestStress > 25 ? 'var(--amber)' : 'var(--green)';
  const co2Rows = [
    { label: 'Verwarming (T)', value: co2CatTotals.heat },
    { label: 'Compressie (druk)', value: co2CatTotals.comp },
    { label: 'Scheiding', value: co2CatTotals.sep },
    { label: 'Recirculatie (retourlus)', value: co2CatTotals.recirculatie },
    { label: 'Lekkages', value: co2CatTotals.leak },
  ];
  const co2TotalCat = co2Rows.reduce((s, r) => s + r.value, 0) || 1;
  const overallIntensity = totalNh3Kg > 0 ? (co2TotalAll / totalNh3Kg) : 0;

  const [emergencyAmountTon, setEmergencyAmountTon] = useState(Math.ceil(Math.max(0, -co2Rights) / 1000 / 100) * 100 || 100);
  const emergencyPrice = co2RightsBasePrice * GAME.co2EmergencyPriceMultiplier;
  const emergencyCost = co2RightsPurchaseCost(emergencyAmountTon * 1000, emergencyPrice);

  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.55)' }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} className="max-w-md w-full rounded-lg border p-5 slide-in max-h-[88vh] overflow-y-auto scrollbar-thin"
           style={{ background: 'var(--panel)', borderColor: 'var(--border)' }}>
        <div className="flex items-center justify-between mb-4">
          <span className="font-medium" style={{ color: 'var(--amber)' }}>CO2-rechten &amp; intensiteit</span>
          <button onClick={onClose} className="text-sm" style={{ color: 'var(--text-dim)' }}>✕</button>
        </div>

        {inGracePeriod && (
          <div className="rounded-md border px-3 py-2 mb-3 text-xs" style={{ borderColor: 'var(--cyan)', color: 'var(--cyan)', background: 'rgba(79,195,217,0.08)' }}>
            Als startende industrie hoef je het eerste jaar geen CO2-rechten te kopen.
            Vanaf het tweede jaar is dit wel verplicht.
          </div>
        )}

        <div className="rounded-md border px-3 py-2 mb-3 font-mono-data text-sm" style={{ borderColor: hasGreenCertificate ? 'var(--green)' : 'var(--border)', background: 'var(--panel-2)' }}>
          <div className="flex justify-between mb-1">
            <span style={{ color: 'var(--text-dim)' }}>CO2-intensiteit (live)</span>
            <span style={{ color: co2IntensityLive < legislativeCap ? 'var(--text)' : 'var(--red)' }}>{co2IntensityLive.toFixed(2)} ton/ton</span>
          </div>
          <div className="flex justify-between mb-1 text-xs">
            <span style={{ color: 'var(--text-dim)' }}>Cumulatief gemiddeld</span>
            <span>{overallIntensity.toFixed(2)} ton/ton</span>
          </div>
          <div className="flex justify-between text-xs mb-1">
            <span style={{ color: 'var(--text-dim)' }}>Groen certificaat (onder {process.greenCertificateThreshold < 0.1 ? process.greenCertificateThreshold.toFixed(3) : process.greenCertificateThreshold.toFixed(1)})</span>
            <span style={{ color: hasGreenCertificate ? 'var(--green)' : 'var(--text-dim)' }}>{hasGreenCertificate ? `actief (+${Math.round(GAME.greenCertificateBonus*100)}% prijs)` : 'niet actief'}</span>
          </div>
          <div className="flex justify-between text-xs">
            <span style={{ color: 'var(--text-dim)' }}>Wettelijk maximum</span>
            <span style={{ color: 'var(--amber)' }}>{legislativeCap.toFixed(2)} ton/ton</span>
          </div>
        </div>

        <div className="rounded-md border px-3 py-2 mb-3 font-mono-data text-sm" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
          <div className="flex justify-between mb-1">
            <span style={{ color: 'var(--text-dim)' }}>Saldo rechten</span>
            <span style={{ color: co2Rights >= 0 ? 'var(--green)' : 'var(--red)' }}>{fmtCO2(co2Rights)}</span>
          </div>
          <div className="flex justify-between text-xs mb-1" style={{ color: 'var(--text-dim)' }}>
            <span>Protestrisico</span><span style={{ color: stressColor }}>{protestStress.toFixed(0)}%</span>
          </div>
          <div className="w-full h-1.5 rounded-full overflow-hidden" style={{ background: '#233038' }}>
            <div style={{ width: `${Math.min(100, protestStress)}%`, height: '100%', background: stressColor, transition: 'width 0.4s ease' }} />
          </div>
        </div>

        {co2Rights < 0 && (
          <div className="rounded-md border px-3 py-2 mb-3" style={{ borderColor: 'var(--red)', background: 'rgba(229,72,77,0.08)' }}>
            <div className="text-xs mb-2" style={{ color: 'var(--red)' }}>Je zit in een tekort — nu bijkopen kan tegen het noodtarief ({GAME.co2EmergencyPriceMultiplier}× marktprijs), ongeacht de jaarlijkse aankooplimiet.</div>
            <input type="range" min={100} max={Math.max(500000, emergencyAmountTon)} step={100} value={emergencyAmountTon}
                   onChange={(e) => setEmergencyAmountTon(parseFloat(e.target.value))} className="w-full mb-2" />
            <div className="flex justify-between text-xs font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>
              <span>{emergencyAmountTon.toLocaleString('nl-NL')} ton</span>
              <span>{fmtEuro(emergencyCost).replace('€', '€ ')}</span>
            </div>
            <button onClick={() => onEmergencyBuy(emergencyAmountTon * 1000)}
                    className="w-full text-sm rounded-md border px-2 py-2 hover:bg-white/5 font-mono-data"
                    style={{ borderColor: 'var(--red)', color: 'var(--red)' }}>
              Noodaankoop tegen {fmtEuro(emergencyPrice*1000)}/ton
            </button>
          </div>
        )}

        <div className="rounded-md border px-3 py-2 mb-3" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
          <div className="text-xs mb-2" style={{ color: 'var(--text-dim)' }}>Rechten inkopen (marktprijs: {fmtEuro(co2RightsBasePrice*1000)}/ton) — één keer per jaar</div>
          {purchasedThisYear ? (
            <div className="text-xs rounded-md border px-2 py-2 text-center" style={{ borderColor: 'var(--border)', color: 'var(--text-dim)' }}>
              Dit jaar al ingekocht — volgend jaar weer beschikbaar.
            </div>
          ) : (
            <>
              <input type="range" min={100} max={500000} step={100} value={amountTon}
                     onChange={(e) => setAmountTon(parseFloat(e.target.value))} className="w-full mb-2" />
              <div className="flex justify-between text-xs font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>
                <span>{amountTon.toLocaleString('nl-NL')} ton</span>
                <span>{fmtEuro(pricePerTon)}/ton</span>
              </div>
              <button onClick={() => onBuy(amountKg)}
                      className="w-full text-sm rounded-md border px-2 py-2 hover:bg-white/5 font-mono-data"
                      style={{ borderColor: 'var(--amber)', color: 'var(--amber)' }}>
                Koop voor {fmtEuro(cost).replace('€', '€ ')}
              </button>
            </>
          )}
          <p className="text-[10px] mt-1.5 leading-relaxed" style={{ color: 'var(--text-dim)' }}>
            Grotere aankopen ineens zijn onevenredig duurder per ton.
          </p>
        </div>

        <div className="rounded-md border px-3 py-2 font-mono-data text-xs" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
          <div className="text-[10px] uppercase tracking-wide mb-1.5" style={{ color: 'var(--text)' }}>Cumulatieve uitstoot naar bron</div>
          {co2Rows.map(r => (
            <div key={r.label} className="mb-1.5">
              <div className="flex justify-between mb-0.5" style={{ color: 'var(--text-dim)' }}>
                <span>{r.label}</span><span>{fmtCO2(r.value)}</span>
              </div>
              <div className="w-full h-1 rounded-full overflow-hidden" style={{ background: '#233038' }}>
                <div style={{ width: `${(r.value / co2TotalCat) * 100}%`, height: '100%', background: 'var(--text-dim)' }} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function EmergencyCo2Modal({ deficitKg, co2RightsBasePrice, onPay, onAccept }) {
  const [amountTon, setAmountTon] = useState(Math.ceil(deficitKg / 1000 / 100) * 100 || 100);
  const amountKg = amountTon * 1000;
  const emergencyPrice = co2RightsBasePrice * GAME.co2EmergencyPriceMultiplier;
  const cost = co2RightsPurchaseCost(amountKg, emergencyPrice);
  const coversDeficit = amountKg >= deficitKg;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.75)' }}>
      <div className="max-w-md w-full rounded-lg border p-6 slide-in warn-pulse" style={{ background: 'var(--panel)', borderColor: 'var(--red)' }}>
        <div className="text-lg font-semibold mb-2" style={{ color: 'var(--red)' }}>🛑 Dreigende productiestop</div>
        <p className="text-sm mb-4" style={{ color: 'var(--text-dim)' }}>
          Je hebt aanhoudend meer CO2 uitgestoten dan je rechten dekken (tekort: <b style={{color:'var(--text)'}}>{fmtCO2(deficitKg)}</b>).
          Koop nu bij tegen het noodtarief om door te draaien, of accepteer de productiestop.
        </p>

        <div className="rounded-md border px-3 py-2 mb-4" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
          <div className="text-xs mb-2" style={{ color: 'var(--text-dim)' }}>
            Noodtarief: {fmtEuro(emergencyPrice*1000)}/ton ({GAME.co2EmergencyPriceMultiplier}× de normale marktprijs)
          </div>
          <input type="range" min={100} max={Math.max(500000, amountTon)} step={100} value={amountTon}
                 onChange={(e) => setAmountTon(parseFloat(e.target.value))} className="w-full mb-2" />
          <div className="flex justify-between text-xs font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>
            <span style={{ color: coversDeficit ? 'var(--text-dim)' : 'var(--red)' }}>{amountTon.toLocaleString('nl-NL')} ton{!coversDeficit ? ' (dekt tekort niet)' : ''}</span>
            <span>{fmtEuro(cost).replace('€', '€ ')}</span>
          </div>
          <button onClick={() => onPay(amountKg)}
                  className="w-full text-sm rounded-md border px-2 py-2 hover:bg-white/5 font-mono-data"
                  style={{ borderColor: 'var(--red)', color: 'var(--red)' }}>
            Noodaankoop — productie hervatten
          </button>
        </div>

        <button onClick={onAccept} className="w-full text-sm rounded-md border px-3 py-2" style={{ borderColor: 'var(--border)', color: 'var(--text-dim)' }}>
          Negeren — productie {(GAME.shutdownDurationTicks * GAME.tickMs / 1000).toFixed(0)}s stilleggen
        </button>
      </div>
    </div>
  );
}


/* ---------- Resultatenkaart (einde spel) ---------- */

function ResultCardScreen({ data, onRestart }) {
  const isBankrupt = data.reason === 'bankrupt';
  const process = data.process;
  const overallIntensity = data.totalNh3Kg > 0 ? (data.co2TotalAll / data.totalNh3Kg) : 0;
  const unlockedCount = Object.values(data.unlocked || {}).filter(Boolean).length;
  const unlockedLabels = process.researchItems.filter(r => data.unlocked && data.unlocked[r.id]).map(r => r.label);

  return (
    <div className="h-screen w-screen flex items-start justify-center p-4 overflow-y-auto" style={{ background: 'var(--bg)' }}>
      <div className="max-w-md w-full rounded-lg border p-6 my-6" style={{ background: 'var(--panel)', borderColor: isBankrupt ? 'var(--red)' : 'var(--green)' }}>
        <div className="text-xl font-semibold mb-1" style={{ color: isBankrupt ? 'var(--red)' : 'var(--green)' }}>
          {isBankrupt ? '💥 Failliet' : '🏁 Eindresultaat'}
        </div>
        <p className="text-sm mb-5" style={{ color: 'var(--text-dim)' }}>
          {isBankrupt
            ? `De kas ging negatief in jaar ${data.year} (${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][data.month-1]}) — het bedrijf is failliet verklaard.`
            : `Na ${data.year} jaar is de speelperiode afgelopen. Hier is het eindresultaat.`}
        </p>

        <div className="rounded-md border px-3 py-3 mb-3 font-mono-data" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
          <div className="flex justify-between text-sm mb-1">
            <span style={{ color: 'var(--text-dim)' }}>In kas</span>
            <span style={{ color: data.capitalNow >= 0 ? 'var(--green)' : 'var(--red)' }}>{fmtEuro(data.capitalNow)}</span>
          </div>
          <div className="flex justify-between text-xs">

          <p>Klik op een <b>Reactor</b> om temperatuur{process.kineticsType !== 'fermentation' ? ', reactorvolume' : ', pH'} en katalysator

             {process.kineticsType !== 'fermentation'
               ? ' Je regelt niet de druk rechtstreeks, maar het volume van de reactor — een kleiner volume geeft (bij gelijke hoeveelheid deeltjes) automatisch een hogere druk, en die verhoogt doorgaans de opbrengst.'
               : ''}
             {' '}Je begint met twee materiaaltiers — {tier2Label} en verdere

             instelling bepaalt ook de verkoopprijs: onder ~80% nauwelijks verkoopbaar,
             boven ~95% een meerprijs. Let op: teruggevoerd gas moet opnieuw verwarmd en
             samengeperst worden — dat kost energie, apart zichtbaar als <b>"Energie — recirculatie"</b>
             in het financiënpaneel en de CO2-uitsplitsing. Bij hogere doorvoer moet er relatief
             meer gas rondgepompt worden om hetzelfde eindresultaat te halen, dus die kosten lopen
             mee op.</p>
          <p>Eén spelseizoen duurt 90 seconden en telt als één "jaar". Aan het eind pauzeert het spel

             katalysatortier is pas te onderzoeken nadat je de tussenliggende tier al hebt

          <p>Katalysatorgezondheid werkt 1-op-1: bij 90% gezondheid draait de reactor op 90% van de

             CO2 per ton {sp.c}). Onder een drempel krijg je een <b>groen certificaat</b> voor het
             volgende jaar (meerprijs); de <b>wetgeving</b> stelt een eigen, losstaand maximum aan
             die intensiteit — overschrijd je dat aan het eind van het jaar, dan volgt een heffing,
             ook als je genoeg CO2-rechten had. Die wettelijke grens wordt jaarlijks met een
             oplopende kans verder aangescherpt (begint rond 1 op de 3, wordt met elk jaar
             waarschijnlijker) — en elke aanscherping laat ook de marktprijs van CO2-rechten flink
             springen. Over meerdere jaren kan die prijs vertienvoudigen: wacht te lang met
             investeren in schonere opties (ruthenium, zonnepanelen, CO2-afvang), dan wordt
             uitstoot vanzelf onbetaalbaar.</p>
          <p>Rechten inkopen kan één keer per jaar en moet elk jaar opnieuw — een overschot vervalt,
             het scherm opent automatisch bij een nieuw jaar. Grotere aankopen ineens zijn
             onevenredig duurder per ton. Kom je toch tekort, dan kun je altijd bijkopen tegen een
             fors noodtarief (4× de normale prijs). Het hele eerste jaar geldt deze verplichting nog
             niet — een opstartregeling voor nieuwe industrie, zodat je eerst kunt observeren
             hoeveel je proces uitstoot voordat het menens wordt.</p>
          <p>Bij de start kies je een <b>scenario</b> (of "vrij spelen" met eigen keuzes) en een
             <b> speelduur</b> (vast aantal jaren, met een resultatenkaart aan het eind, of
             eindeloos). Gaat je kas onder nul, dan is het bedrijf <b>failliet</b> — plan je
             investeringen dus met beleid. Via <b>💾 Opslaan</b> bovenin bewaar je je spelstand als
             bestand, te laden vanaf het opstartscherm.</p>
        </div>
      </div>
    </div>
  );

  const projectProgressRef = useRef(0);
  const rdYearlyCommitmentRef = useRef(0);
  const winstRef = useRef(GAME.startingCapital);
  const gameDurationYearsRef = useRef(5);

  useEffect(() => { nodesRef.current = nodes; }, [nodes]);
  useEffect(() => { edgesRef.current = edges; }, [edges]);
  useEffect(() => { energyRef.current = energySource; }, [energySource]);
  useEffect(() => { marketRef.current = market; }, [market]);
  useEffect(() => { unlockedRef.current = unlocked; }, [unlocked]);
  useEffect(() => { loanBalanceRef.current = loanBalance; }, [loanBalance]);
  useEffect(() => { hasGreenCertificateRef.current = hasGreenCertificate; }, [hasGreenCertificate]);
  useEffect(() => { legislativeCapRef.current = legislativeCap; }, [legislativeCap]);
  useEffect(() => { activeProjectRef.current = activeProjectId; }, [activeProjectId]);
  useEffect(() => { projectProgressRef.current = projectProgress; }, [projectProgress]);
  useEffect(() => { rdYearlyCommitmentRef.current = rdYearlyCommitment; }, [rdYearlyCommitment]);
  useEffect(() => { winstRef.current = winst; }, [winst]);
  useEffect(() => { gameDurationYearsRef.current = gameDurationYears; }, [gameDurationYears]);

  const pushToast = useCallback((text, tone = 'info') => {
    const id = ++toastCounter.current;
    setToasts(ts => [...ts, { id, text, tone }]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 5500);
  }, []);

  const applyScenario = (key) => {
    setScenarioKey(key);
    const sc = SCENARIOS[key];
    if (!sc.free) {
      setCapitalKey(sc.capitalKey);
      setVolatilityKey(sc.volatilityKey);
    }
  };

  const startGame = () => {
    const sc = SCENARIOS[scenarioKey];
    const structure = CAPITAL_STRUCTURES[capitalKey];
    setWinst(GAME.startingCapital);
    winstRef.current = GAME.startingCapital;
    setLoanBalance(GAME.startingCapital * (1 - structure.equityShare));
    const capInit = (sc && sc.legislativeCapInitial) || process.legislativeCapInitial;
    const capTighten = (sc && sc.legislativeCapTightenChance) || GAME.legislativeCapTightenChance;
    setLegislativeCap(capInit);
    legislativeCapRef.current = capInit;
    legislativeCapTightenChanceRef.current = capTighten;
    setMarket(initialMarket(process));
    lowCashWarnedRef.current = false;
    setRunning(false);
    setGameStarted(true);
  };

  /* ---------- game loop ---------- */
  useEffect(() => {
    if (!running || !gameStarted) return;
    const interval = setInterval(() => {
      const proc = processRef.current;
      const isShutdown = shutdownRef.current > 0;
      const result = simulateTick(nodesRef.current, edgesRef.current, energyRef.current, isShutdown, marketRef.current, unlockedRef.current, hasGreenCertificateRef.current, proc);
      setActiveChain(result.activeChain || []);

      if (result.active) {
        const b = result.breakdown;
        const profitDelta = b.revenue - b.feedCost - b.energyCostHeat - b.energyCostComp - b.energyCostSep - b.maintenanceCost - b.repairCost;
        winstRef.current += profitDelta;
        setWinst(w => w + profitDelta);
        setCostTotals(t => ({
          ...t,
          revenue: t.revenue + b.revenue, feedCost: t.feedCost + b.feedCost,
          energyCostHeat: t.energyCostHeat + b.energyCostHeat, energyCostComp: t.energyCostComp + b.energyCostComp,
          energyCostSep: t.energyCostSep + b.energyCostSep, energyCostRecirculation: t.energyCostRecirculation + b.energyCostRecirculation, maintenanceCost: t.maintenanceCost + b.maintenanceCost,
          repairCost: t.repairCost + b.repairCost,
        }));
        monthlyRef.current = {
          ...monthlyRef.current,
          revenue: monthlyRef.current.revenue + b.revenue, feedCost: monthlyRef.current.feedCost + b.feedCost,
          energyCostHeat: monthlyRef.current.energyCostHeat + b.energyCostHeat, energyCostComp: monthlyRef.current.energyCostComp + b.energyCostComp,
          energyCostSep: monthlyRef.current.energyCostSep + b.energyCostSep, energyCostRecirculation: monthlyRef.current.energyCostRecirculation + b.energyCostRecirculation, maintenanceCost: monthlyRef.current.maintenanceCost + b.maintenanceCost,
          repairCost: monthlyRef.current.repairCost + b.repairCost,
        };
        setMonthlyTotals({ ...monthlyRef.current });
        const yr = yearlyRef.current;
        yr.revenue += b.revenue; yr.feedCost += b.feedCost;
        yr.energyCostHeat += b.energyCostHeat; yr.energyCostComp += b.energyCostComp; yr.energyCostSep += b.energyCostSep; yr.energyCostRecirculation += b.energyCostRecirculation;
        yr.maintenanceCost += b.maintenanceCost; yr.repairCost += b.repairCost;
        yr.nh3Kg += result.product_kg;

        setCo2Total(c => c + result.co2Delta);
        setTotalNh3Kg(v => v + result.product_kg);
        setCo2IntensityLive(result.product_kg > 0 ? (result.co2Delta / result.product_kg) : 0);
        if (result.co2Breakdown) {
          setCo2CatTotals(c => ({
            heat: c.heat + result.co2Breakdown.heat, comp: c.comp + result.co2Breakdown.comp,
            sep: c.sep + result.co2Breakdown.sep, recirculatie: c.recirculatie + result.co2Breakdown.recirculatie, leak: c.leak + result.co2Breakdown.leak,
          }));
          yr.co2Heat += result.co2Breakdown.heat; yr.co2Comp += result.co2Breakdown.comp;
          yr.co2Sep += result.co2Breakdown.sep; yr.co2Recirculatie = (yr.co2Recirculatie || 0) + result.co2Breakdown.recirculatie; yr.co2Leak += result.co2Breakdown.leak;
        }
        setPurity(result.purity);
        setNodes(ns => ns.map(n => (
          result.statusUpdates[n.id] ? { ...n, status: { ...n.status, ...result.statusUpdates[n.id] } } : n
        )));

        // Live snapshot: uitsluitend deze tick, geen opgetelde waarden -- zo zie je het effect
        // van een aanpassing direct, zonder dat het wordt "opgeslokt" door eerdere ticks.
        const firstReactor = nodesRef.current.find(n => n.type === 'reactor');
        setLiveSnapshot({
          reactor: firstReactor ? {
            tempC: firstReactor.config.tempC,
            secondDial: firstReactor.config.pressureBar,
            volumeM3: firstReactor.config.volumeM3,
            xEq: result.statusUpdates[firstReactor.id] ? result.statusUpdates[firstReactor.id].xEq : (firstReactor.status && firstReactor.status.xEq),
            kFactor: result.statusUpdates[firstReactor.id] ? result.statusUpdates[firstReactor.id].kFactor : (firstReactor.status && firstReactor.status.kFactor),
            xNet: result.statusUpdates[firstReactor.id] ? result.statusUpdates[firstReactor.id].xNet : (firstReactor.status && firstReactor.status.xNet),
          } : null,
          product_kg: result.product_kg,
          breakdown: result.breakdown,
          profitDelta,
          co2Delta: result.co2Delta,
          co2PerTon: result.product_kg > 0 ? (result.co2Delta / result.product_kg) : 0,
          energyPerTon: result.product_kg > 0 ? (result.totalEnergyUnits / result.product_kg * 1000) : 0,
        });
        if (result.leakEvents.length) {
          result.leakEvents.forEach(ev => {
            pushToast(`⚠ Lekkage! Druk (${ev.pressure} bar) overschreed de materiaalgrens (${ev.maxPressure.toFixed(1)} bar). Reparatiekosten ${fmtEuro(GAME.leakRepairCost)}, reactor tijdelijk offline.`, 'danger');
            setShakeIds(s => ({ ...s, [ev.nodeId]: true }));
            setTimeout(() => setShakeIds(s => ({ ...s, [ev.nodeId]: false })), 450);
          });
        }

        if (!isShutdown) {
          const inGracePeriod = currentYear === 1 && (yearTickRef.current < (GAME.ticksPerYear / 12) * GAME.co2GracePeriodMonths);
          const prevBalance = co2RightsRef.current;
          const newBalance = prevBalance - result.co2Delta;
          co2RightsRef.current = newBalance;
          setCo2Rights(newBalance);
          if (!inGracePeriod) {
            if (newBalance < 0 && prevBalance >= 0) {
              pushToast('⚠ Onvoldoende CO2-rechten — koop bijtijds bij, anders riskeer je een productiestop.', 'danger');
            }
            let newStress = protestStressRef.current;
            if (newBalance < 0) newStress += GAME.co2ProtestStressRate * Math.abs(newBalance);
            else newStress = Math.max(0, newStress - GAME.co2ProtestStressDecay);
            if (newStress >= GAME.co2ProtestStressThreshold && shutdownRef.current === 0) {
              newStress = 0;
              protestStressRef.current = newStress;
              setProtestStress(newStress);
              setEmergencyDeficit(Math.max(0, -newBalance));
              setShowEmergencyCo2(true);
              setRunning(false);
              return;
            }
            protestStressRef.current = newStress;
            setProtestStress(newStress);
          }
        }
      } else {
        setPurity(0);
        setLiveSnapshot(null);
      }

      if (isShutdown) {
        const next = Math.max(0, shutdownRef.current - 1);
        shutdownRef.current = next;
        setShutdownTicksRemaining(next);
      }

      /* ---------- R&D: loopt live per tick door, met afnemende meeropbrengst ---------- */
      if (activeProjectRef.current && rdYearlyCommitmentRef.current > 0) {
        const item = proc.researchItems.find(r => r.id === activeProjectRef.current);
        if (item) {
          const yearlyEffectiveProgress = GAME.rdEfficiencyK * Math.sqrt(rdYearlyCommitmentRef.current);
          const perTickSpend = Math.min(rdYearlyCommitmentRef.current / GAME.ticksPerYear, Math.max(0, winstRef.current));
          const perTickProgress = Math.min(yearlyEffectiveProgress / GAME.ticksPerYear, item.cost - projectProgressRef.current);
          if (perTickSpend > 0) {
            winstRef.current -= perTickSpend;
            setWinst(w => w - perTickSpend);
            yearlyRef.current.rdSpent = (yearlyRef.current.rdSpent || 0) + perTickSpend;
          }
          if (perTickProgress > 0) {
            projectProgressRef.current += perTickProgress;
            setProjectProgress(projectProgressRef.current);
          }
          if (projectProgressRef.current >= item.cost) {
            setUnlocked(u => ({ ...u, [item.id]: true }));
            yearlyRef.current.projectCompletedThisYear = item.label;
            pushToast(`✓ Onderzoek voltooid: ${item.label}!`, 'success');
            activeProjectRef.current = null;
            setActiveProjectId(null);
            projectProgressRef.current = 0;
            setProjectProgress(0);
          }
        }
      }

      /* ---------- kalender ---------- */
      yearTickRef.current++;
      const monthLength = GAME.ticksPerYear / 12;
      setCurrentMonth(Math.min(12, Math.floor(yearTickRef.current / monthLength) + 1));
      if (yearTickRef.current % monthLength === 0) {
        monthlyRef.current = initialCostTotals();
        setMonthlyTotals(initialCostTotals());
      }

      /* ---------- jaarwisseling ---------- */
      if (yearTickRef.current >= GAME.ticksPerYear) {
        yearTickRef.current = 0;
        const yr = yearlyRef.current;
        const interest = loanBalanceRef.current * GAME.loanInterestRate;

        const co2ThisYear = yr.co2Heat + yr.co2Comp + yr.co2Sep + (yr.co2Recirculatie || 0) + yr.co2Leak;
        const yearIntensity = yr.nh3Kg > 0 ? (co2ThisYear / yr.nh3Kg) : null;

        const newCertificate = yearIntensity !== null && yearIntensity < proc.greenCertificateThreshold;
        if (yearIntensity !== null) { hasGreenCertificateRef.current = newCertificate; setHasGreenCertificate(newCertificate); }
        if (newCertificate) setGreenCertificateYears(v => v + 1);

        let heffing = 0;
        if (yearIntensity !== null && yearIntensity > legislativeCapRef.current) {
          const excessTonsCo2 = (yearIntensity - legislativeCapRef.current) * (yr.nh3Kg / 1000);
          const heffingRatePerTon = marketRef.current.co2RightsBasePrice * 1000 * GAME.co2EmergencyPriceMultiplier;
          heffing = excessTonsCo2 * heffingRatePerTon;
        }
        const co2PriceBeforeTightening = marketRef.current.co2RightsBasePrice;
        let capTightened = false;
        const effectiveTightenChance = Math.min(GAME.legislativeCapTightenChanceMax, legislativeCapTightenChanceRef.current + (currentYear - 1) * GAME.legislativeCapTightenGrowthPerYear);
        if (Math.random() < effectiveTightenChance) {
          legislativeCapRef.current = legislativeCapRef.current * GAME.legislativeCapTightenFactor;
          setLegislativeCap(legislativeCapRef.current);
          // Wetgeving verstrakt niet alleen het maximum, maar maakt CO2-rechten in datzelfde
          // jaar ook fors duurder (markt reageert op structureel afnemende beschikbaarheid).
          marketRef.current = { ...marketRef.current, co2RightsBasePrice: marketRef.current.co2RightsBasePrice * GAME.co2PriceTightenJumpFactor };
          capTightened = true;
        }

        const rdSpent = yr.rdSpent || 0;

        // GMO-wetgeving: alleen relevant voor processen met een biologisch/GMO-onderscheid (bio-ethanol).
        if (proc.organicBonus) {
          if (!gmoBanAnnouncedRef.current) {
            const announceChance = Math.min(0.6, proc.gmoBanBaseChance + Math.max(0, currentYear - 3) * proc.gmoBanGrowthPerYear);
            if (currentYear >= 3 && Math.random() < announceChance) {
              gmoBanAnnouncedRef.current = true;
              gmoBanAnnouncedYearRef.current = currentYear;
              setGmoBanAnnounced(true);
              setGmoBanAnnouncedYear(currentYear);
              pushToast(`⚠ Aangekondigd: GMO-giststammen worden over ${proc.gmoBanGraceYears} jaar verboden. Plan je overstap naar een biologische stam.`, 'danger');
            }
          } else if (!gmoBanActiveRef.current && currentYear - gmoBanAnnouncedYearRef.current >= proc.gmoBanGraceYears) {
            gmoBanActiveRef.current = true;
            setGmoBanActive(true);
            const mats = proc.getMaterials(unlockedRef.current);
            const bestNonGMO = mats.filter(m => !m.isGMO).sort((a, b) => b.catalystEfficiency - a.catalystEfficiency)[0];
            let switched = false;
            setNodes(ns => ns.map(n => {
              if (n.type === 'reactor') {
                const mat = mats.find(m => m.id === n.config.materialId);
                if (mat && mat.isGMO && bestNonGMO) {
                  switched = true;
                  return { ...n, config: { ...n.config, materialId: bestNonGMO.id }, status: { ...n.status, catalystHealth: 100 } };
                }
              }
              return n;
            }));
            if (switched) pushToast('🚫 GMO-verbod nu van kracht — reactoren automatisch omgeschakeld naar de beste biologische giststam.', 'danger');
            else pushToast('🚫 GMO-verbod nu van kracht.', 'danger');
          }
        }
        const projectCompleted = yr.projectCompletedThisYear || null;

        const evolved = evolveMarket(marketRef.current, volatilityKey);
        // Zorg dat het gerapporteerde percentage de VOLLEDIGE beweging toont (incl. een eventuele
        // verstrakkingssprong), niet alleen de kleinere stap die evolveMarket zelf toevoegde.
        evolved.changes = { ...evolved.changes, co2Change: (evolved.co2RightsBasePrice / co2PriceBeforeTightening) - 1 };
        setMarket(evolved);
        winstRef.current -= (interest + heffing);
        setWinst(w => w - interest - heffing);
        setCostTotals(t => ({ ...t, interestCost: t.interestCost + interest, heffingCost: t.heffingCost + heffing }));

        // CO2-rechten: jaarlijks "use it or lose it" -- geen overdracht naar volgend jaar.
        co2RightsRef.current = 0;
        setCo2Rights(0);
        protestStressRef.current = 0;
        setProtestStress(0);

        const finishedYear = currentYear;
        const isGameOver = gameDurationYearsRef.current != null && finishedYear >= gameDurationYearsRef.current;

        setYearEndData({
          year: finishedYear,
          yearly: { ...yr, interest, heffing },
          co2ThisYear,
          yearIntensity,
          hasGreenCertificate: newCertificate,
          legislativeCap: legislativeCapRef.current,
          capTightened,
          rdSpent, projectCompleted,
          marketChanges: evolved.changes,
          newMarket: evolved,
          isGameOver,
          maintenance: nodesRef.current.filter(n => n.type === 'reactor').map(n => ({
            id: n.id, health: (n.status && n.status.catalystHealth != null) ? n.status.catalystHealth : 100,
            leakRisk: !!(n.status && n.status.leakRisk),
          })),
        });
        yearlyRef.current = { ...initialCostTotals(), co2Heat: 0, co2Comp: 0, co2Sep: 0, co2Leak: 0, nh3Kg: 0, rdSpent: 0, projectCompletedThisYear: null };
        setCurrentYear(y => y + 1);
        setCurrentMonth(1);
        setCo2PurchasedThisYear(false);
        setShowYearEnd(true);
        setRunning(false);
      }

      /* ---------- faillissement (pas vanaf jaar 2 -- jaar 1 mag altijd afgemaakt worden) ---------- */
      if (currentYear > 1 && winstRef.current < 0) {
        setResultCard({
          reason: 'bankrupt', year: currentYear, month: currentMonth, capitalNow: winstRef.current,
          co2TotalAll: co2Total, totalNh3Kg, hasGreenCertificate, greenCertificateYears, unlocked, process: proc,
        });
        setRunning(false);
      } else if (!lowCashWarnedRef.current && winstRef.current < GAME.startingCapital * GAME.lowCashWarningFraction) {
        lowCashWarnedRef.current = true;
        pushToast('⚠ Je kas raakt krap — vanaf jaar 2 gaat het bedrijf bij een negatief saldo failliet.', 'danger');
      } else if (winstRef.current > GAME.startingCapital * GAME.lowCashWarningFraction * 1.5) {
        lowCashWarnedRef.current = false; // opnieuw waarschuwen mocht het weer krap worden
      }
    }, GAME.tickMs);
    return () => clearInterval(interval);
  }, [running, gameStarted, pushToast, volatilityKey, currentYear, currentMonth, co2Total, totalNh3Kg, hasGreenCertificate, greenCertificateYears, unlocked]);

  /* ---------- node handlers ---------- */

  const addNode = (type) => {
    const idNum = ++idCounter.current;
    const id = type + '_' + idNum;
    const count = nodes.filter(n => n.type !== 'feed' && n.type !== 'product').length;
    const x = snapToGrid(200 + (count % 3) * 210);
    const y = snapToGrid(30 + Math.floor(count / 3) * 160);
    let config = {}, cost = 0, status = {};
    if (type === 'reactor') {
      const mats = process.getMaterials(unlocked);
      const midTemp = Math.round(((process.tempRange[0] + process.tempRange[1]) / 2) / 5) * 5;
      const midPressure = Math.round(((process.pressureRange[0] + process.pressureRange[1]) / 2) / process.pressureStep) * process.pressureStep;
      if (process.volumeRange) {
        const midVolume = Math.round(((process.volumeRange[0] + process.volumeRange[1]) / 2) / process.volumeStep) * process.volumeStep;
        config = { tempC: midTemp, volumeM3: midVolume, pressureBar: pressureFromVolume(midVolume, process), materialId: mats[0].id };
      } else {
        config = { tempC: midTemp, pressureBar: midPressure, materialId: mats[0].id };
      }
      cost = materialTotalCost(mats[0]);
      status = { catalystHealth: 100, vesselCondition: 100, serviceCount: 0 };
    }
    if (type === 'heatExchanger') { config = { recovery: 0.4 }; cost = GAME.heatExchangerCost; }
    if (type === 'separator') { config = { efficiency: 0.85 }; cost = GAME.separatorCost; }
    setNodes(ns => [...ns, { id, type, x, y, config, status }]);
    winstRef.current -= cost;
    setWinst(w => w - cost);
    setCostTotals(t => ({ ...t, equipmentCost: t.equipmentCost + cost }));
    yearlyRef.current.equipmentCost += cost;
    pushToast(`+ ${type === 'separator' ? process.separatorLabel : labelForType(type)} geplaatst — investering ${fmtEuro(-cost)}`);
  };

  const removeNode = (id) => {
    setNodes(ns => ns.filter(n => n.id !== id));
    setEdges(es => es.filter(e => e.from !== id && e.to !== id));
    if (selectedNodeId === id) setSelectedNodeId(null);
  };

  const updateNodeConfig = (id, patch) => {
    setNodes(ns => ns.map(n => {
      if (n.id !== id) return n;
      if (patch.materialId && n.type === 'reactor') {
        const mats = process.getMaterials(unlocked);
        const oldM = mats.find(m => m.id === n.config.materialId) || mats[0];
        const newM = mats.find(m => m.id === patch.materialId);
        const diff = materialTotalCost(newM) - materialTotalCost(oldM);
        if (diff > 0) {
          winstRef.current -= diff;
          setWinst(w => w - diff);
          setCostTotals(t => ({ ...t, equipmentCost: t.equipmentCost + diff }));
          yearlyRef.current.equipmentCost += diff;
        }
        return { ...n, config: { ...n.config, ...patch }, status: { ...n.status, catalystHealth: 100 } };
      }
      return { ...n, config: { ...n.config, ...patch } };
    }));
  };

  const replaceCatalyst = (id) => {
    const node = nodes.find(n => n.id === id);
    if (!node) return;
    const mats = process.getMaterials(unlocked);
    const material = mats.find(m => m.id === node.config.materialId) || mats[0];
    winstRef.current -= material.catalystCost;
    setWinst(w => w - material.catalystCost);
    setCostTotals(t => ({ ...t, equipmentCost: t.equipmentCost + material.catalystCost }));
    yearlyRef.current.equipmentCost += material.catalystCost;
    setNodes(ns => ns.map(n => n.id === id ? { ...n, status: { ...n.status, catalystHealth: 100 } } : n));
    pushToast(`Katalysator vervangen — investering ${fmtEuro(-material.catalystCost)}`);
  };

  const performMaintenance = (id) => {
    const node = nodes.find(n => n.id === id);
    if (!node) return;
    const mats = process.getMaterials(unlocked);
    const material = mats.find(m => m.id === node.config.materialId) || mats[0];
    const cost = material.catalystCost * GAME.maintenanceServiceCostFraction;
    const serviceCount = node.status.serviceCount || 0;
    const restore = GAME.maintenanceServiceRestoreBase * Math.pow(GAME.maintenanceServiceRestoreDecayFactor, serviceCount);
    winstRef.current -= cost;
    setWinst(w => w - cost);
    setCostTotals(t => ({ ...t, equipmentCost: t.equipmentCost + cost }));
    yearlyRef.current.equipmentCost += cost;
    setNodes(ns => ns.map(n => n.id === id ? {
      ...n, status: { ...n.status, vesselCondition: Math.min(100, (n.status.vesselCondition || 100) + restore), serviceCount: serviceCount + 1 },
    } : n));
    pushToast(`Onderhoudsbeurt uitgevoerd (+${restore.toFixed(0)}pt vatstaat) — investering ${fmtEuro(-cost)}`);
  };

  const replaceVessel = (id) => {
    const node = nodes.find(n => n.id === id);
    if (!node) return;
    const mats = process.getMaterials(unlocked);
    const material = mats.find(m => m.id === node.config.materialId) || mats[0];
    winstRef.current -= material.vesselCost;
    setWinst(w => w - material.vesselCost);
    setCostTotals(t => ({ ...t, equipmentCost: t.equipmentCost + material.vesselCost }));
    yearlyRef.current.equipmentCost += material.vesselCost;
    setNodes(ns => ns.map(n => n.id === id ? { ...n, status: { ...n.status, vesselCondition: 100, serviceCount: 0 } } : n));
    pushToast(`Vat vervangen — investering ${fmtEuro(-material.vesselCost)}`);
  };

  const buyCo2Rights = (amountKg) => {
    const cost = co2RightsPurchaseCost(amountKg, market.co2RightsBasePrice);
    winstRef.current -= cost;
    setWinst(w => w - cost);
    setCostTotals(t => ({ ...t, co2RightsCost: t.co2RightsCost + cost }));
    yearlyRef.current.co2RightsCost += cost;
    setCo2Rights(r => { const nr = r + amountKg; co2RightsRef.current = nr; return nr; });
    setCo2PurchasedThisYear(true);
    pushToast(`CO2-rechten gekocht: ${fmtCO2(amountKg)} voor ${fmtEuro(-cost)}`);
  };

  const payEmergencyCo2 = (amountKg) => {
    const cost = co2RightsPurchaseCost(amountKg, market.co2RightsBasePrice * GAME.co2EmergencyPriceMultiplier);
    winstRef.current -= cost;
    setWinst(w => w - cost);
    setCostTotals(t => ({ ...t, co2RightsCost: t.co2RightsCost + cost }));
    yearlyRef.current.co2RightsCost += cost;
    setCo2Rights(r => { const nr = r + amountKg; co2RightsRef.current = nr; return nr; });
    setShowEmergencyCo2(false);
    setRunning(true);
    pushToast(`Noodaankoop CO2-rechten tegen ${GAME.co2EmergencyPriceMultiplier}× tarief: ${fmtCO2(amountKg)} voor ${fmtEuro(-cost)}. Productie hervat.`, 'danger');
  };

  const acceptCo2Shutdown = () => {
    shutdownRef.current = GAME.shutdownDurationTicks;
    setShutdownTicksRemaining(GAME.shutdownDurationTicks);
    setShowEmergencyCo2(false);
    setRunning(true);
    pushToast(`🛑 Protest bij de fabriek! Productie ${(GAME.shutdownDurationTicks * GAME.tickMs / 1000).toFixed(0)}s stilgelegd wegens CO2-overschrijding.`, 'danger');
  };

  const repayLoan = (amount) => {
    const pay = Math.min(amount, loanBalance, winst);
    if (pay <= 0) return;
    winstRef.current -= pay;
    setWinst(w => w - pay);
    setLoanBalance(l => { const nl = l - pay; loanBalanceRef.current = nl; return nl; });
    pushToast(`Lening afgelost: ${fmtEuro(-pay)}`);
  };

  const selectActiveProject = (id) => {
    if (unlocked[id]) return;
    const item = process.researchItems.find(r => r.id === id);
    if (item && item.prerequisite && !unlocked[item.prerequisite]) return;
    setActiveProjectId(id);
    activeProjectRef.current = id;
    setProjectProgress(0);
    projectProgressRef.current = 0;
  };

  const onHeaderDown = (e, node) => {
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const originX = node.x, originY = node.y;
    let moved = false;
    const onMove = (ev) => {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
      const rawX = Math.max(0, originX + dx), rawY = Math.max(0, originY + dy);
      setNodes(ns => ns.map(n => n.id === node.id ? { ...n, x: snapToGrid(rawX), y: snapToGrid(rawY) } : n));
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if (!moved) setSelectedNodeId(node.id);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const onPortDown = (e, node, portId) => {
    e.stopPropagation();
    const isOutput = portId === 'out' || portId === 'recycleOut';
    if (!isOutput) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const start = portPos(node, portId);
    setLinking({ fromId: node.id, fromPort: portId, x1: start.x, y1: start.y, mx: start.x, my: start.y });
    const onMove = (ev) => {
      const mx = ev.clientX - rect.left + canvasRef.current.scrollLeft;
      const my = ev.clientY - rect.top + canvasRef.current.scrollTop;
      setLinking(l => l ? { ...l, mx, my } : l);
    };
    const onUp = (ev) => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      const mx = ev.clientX - rect.left + canvasRef.current.scrollLeft;
      const my = ev.clientY - rect.top + canvasRef.current.scrollTop;
      let target = null;
      for (const n of nodesRef.current) {
        if (n.id === node.id) continue;
        for (const portDef of PORT_DEFS[n.type]) {
          const isInput = portDef.id === 'in' || portDef.id === 'recycleIn';
          if (!isInput) continue;
          const p = portPos(n, portDef.id);
          if (Math.hypot(p.x - mx, p.y - my) < 20) { target = { id: n.id, portId: portDef.id }; break; }
        }
        if (target) break;
      }
      if (target) {
        setEdges(es => {
          const filtered = es.filter(ed => !(ed.from === node.id && ed.fromPort === portId) && !(ed.to === target.id && ed.toPort === target.portId));
          return [...filtered, {
            id: 'e_' + node.id + '_' + portId + '_' + target.id + '_' + target.portId + '_' + Date.now(),
            from: node.id, fromPort: portId, to: target.id, toPort: target.portId,
          }];
        });
      }
      setLinking(null);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const deleteEdge = (edgeId) => setEdges(es => es.filter(e => e.id !== edgeId));

  const continueAfterYearEnd = () => {
    setShowYearEnd(false);
    if (yearEndData && yearEndData.isGameOver) {
      setResultCard({
        reason: 'years', year: yearEndData.year, capitalNow: winst,
        co2TotalAll: co2Total, totalNh3Kg, hasGreenCertificate: yearEndData.hasGreenCertificate,
        greenCertificateYears, unlocked, process,
      });
      return;
    }
    setShowCo2Market(true); // nieuw jaar: rechten zijn op nul gezet, meteen de kans geven in te kopen
    setCo2ModalAutoOpened(true);
  };

  const resetGame = () => {
    setGameStarted(false);
    setResultCard(null);
    setNodes(makeInitialNodes());
    setEdges([]);
    setWinst(GAME.startingCapital);
    winstRef.current = GAME.startingCapital;
    setLoanBalance(0);
    setMarket(initialMarket(process));
    setCurrentYear(1);
    setCurrentMonth(1);
    setUnlocked(initialUnlocked());
    setActiveProjectId(null); setProjectProgress(0); setRdYearlyCommitment(0);
    activeProjectRef.current = null; projectProgressRef.current = 0; rdYearlyCommitmentRef.current = 0;
    setCo2Total(0);
    setCo2CatTotals(initialCo2Totals());
    setCo2Rights(0);
    setCo2PurchasedThisYear(false);
    setCo2IntensityLive(0);
    setTotalNh3Kg(0);
    setHasGreenCertificate(false);
    setGreenCertificateYears(0);
    setLegislativeCap(process.legislativeCapInitial);
    hasGreenCertificateRef.current = false;
    legislativeCapRef.current = process.legislativeCapInitial;
    legislativeCapTightenChanceRef.current = GAME.legislativeCapTightenChance;
    setGmoBanAnnounced(false); setGmoBanAnnouncedYear(null); setGmoBanActive(false);
    gmoBanAnnouncedRef.current = false; gmoBanAnnouncedYearRef.current = null; gmoBanActiveRef.current = false;
    setProtestStress(0);
    setShutdownTicksRemaining(0);
    setShowEmergencyCo2(false);
    setEmergencyDeficit(0);
    setShowCo2Market(false);
    setCo2ModalAutoOpened(false);
    co2RightsRef.current = 0; protestStressRef.current = 0; shutdownRef.current = 0; yearTickRef.current = 0;
    yearlyRef.current = { ...initialCostTotals(), co2Heat: 0, co2Comp: 0, co2Sep: 0, co2Leak: 0, nh3Kg: 0 };
    lowCashWarnedRef.current = false;
    setPurity(0);
    setLiveSnapshot(null);
    setActiveChain([]);
    setSelectedNodeId(null);
    setToasts([]);
    setCostTotals(initialCostTotals());
    setMonthlyTotals(initialCostTotals());
    monthlyRef.current = initialCostTotals();
    idCounter.current = 0;
  };

  /* ---------- opslaan / laden ---------- */

  const exportSave = () => {
    const save = {
      version: 2,
      processKey, factoryName,
      scenarioKey, capitalKey, volatilityKey, gameDurationYears,
      nodes, edges, winst, loanBalance, market, currentYear, currentMonth, unlocked,
      activeProjectId, projectProgress, rdYearlyCommitment,
      co2Total, co2CatTotals, co2Rights, co2PurchasedThisYear, totalNh3Kg,
      hasGreenCertificate, greenCertificateYears, legislativeCap,
      legislativeCapTightenChance: legislativeCapTightenChanceRef.current,
      protestStress, shutdownTicksRemaining, energySource, costTotals,
      yearTick: yearTickRef.current, yearly: yearlyRef.current,
      idCounter: idCounter.current,
    };
    const blob = new Blob([JSON.stringify(save, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(factoryName || 'eco-chemie-tycoon').replace(/[^a-z0-9]+/gi, '-')}-jaar${currentYear}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    pushToast('Spelstand opgeslagen.');
  };

  const importSave = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const save = JSON.parse(e.target.result);
        setRunning(false);
        setProcessKey(save.processKey || 'haberBosch');
        setFactoryName(save.factoryName || '');
        setScenarioKey(save.scenarioKey || 'vrij');
        setCapitalKey(save.capitalKey || 'helfhelf');
        setVolatilityKey(save.volatilityKey || 'gematigd');
        setGameDurationYears(save.gameDurationYears === undefined ? 5 : save.gameDurationYears);
        setNodes(save.nodes || makeInitialNodes());
        setEdges(save.edges || []);
        setWinst(save.winst); winstRef.current = save.winst;
        setLoanBalance(save.loanBalance || 0); loanBalanceRef.current = save.loanBalance || 0;
        setMarket(save.market || initialMarket(PROCESSES[save.processKey || 'haberBosch']));
        setCurrentYear(save.currentYear || 1);
        setCurrentMonth(save.currentMonth || 1);
        setUnlocked(save.unlocked || initialUnlocked());
        setActiveProjectId(save.activeProjectId || null); activeProjectRef.current = save.activeProjectId || null;
        setProjectProgress(save.projectProgress || 0); projectProgressRef.current = save.projectProgress || 0;
        setRdYearlyCommitment(save.rdYearlyCommitment || 0); rdYearlyCommitmentRef.current = save.rdYearlyCommitment || 0;
        setCo2Total(save.co2Total || 0);
        setCo2CatTotals(save.co2CatTotals || initialCo2Totals());
        setCo2Rights(save.co2Rights || 0); co2RightsRef.current = save.co2Rights || 0;
        setCo2PurchasedThisYear(!!save.co2PurchasedThisYear);
        setTotalNh3Kg(save.totalNh3Kg || 0);
        setHasGreenCertificate(!!save.hasGreenCertificate); hasGreenCertificateRef.current = !!save.hasGreenCertificate;
        setGreenCertificateYears(save.greenCertificateYears || 0);
        setLegislativeCap(save.legislativeCap || PROCESSES[save.processKey || 'haberBosch'].legislativeCapInitial); legislativeCapRef.current = save.legislativeCap || PROCESSES[save.processKey || 'haberBosch'].legislativeCapInitial;
        legislativeCapTightenChanceRef.current = save.legislativeCapTightenChance || GAME.legislativeCapTightenChance;
        setProtestStress(save.protestStress || 0); protestStressRef.current = save.protestStress || 0;
        setShutdownTicksRemaining(save.shutdownTicksRemaining || 0); shutdownRef.current = save.shutdownTicksRemaining || 0;
        setEnergySource(save.energySource || 'grijs');
        setCostTotals(save.costTotals || initialCostTotals());
        yearTickRef.current = save.yearTick || 0;
        yearlyRef.current = save.yearly || { ...initialCostTotals(), co2Heat: 0, co2Comp: 0, co2Sep: 0, co2Leak: 0, nh3Kg: 0 };
        idCounter.current = save.idCounter || 0;
        setResultCard(null);
        setGameStarted(true);
        pushToast('Spelstand geladen.');
      } catch (err) {
        pushToast('Kon deze spelstand niet laden — is het een geldig bestand?', 'danger');
      }
    };
    reader.readAsText(file);
  };

  const selectedNode = nodes.find(n => n.id === selectedNodeId) || null;
  const feedNode = nodes.find(n => n.id === 'feed');
  const throughputMultiplier = (feedNode && feedNode.config.throughputMultiplier) || 1.0;
  const feedstockId = (feedNode && feedNode.config.feedstockId) || (process.feedstockOptions ? process.feedstockOptions[0].id : null);

  let connectedReactor = null;
  if (selectedNode && selectedNode.type === 'heatExchanger') {
    const { chain } = findMainChain(nodes, edges);
    const idx = chain.indexOf(selectedNode.id);
    const nextNode = idx >= 0 ? nodes.find(n => n.id === chain[idx + 1]) : null;
    if (nextNode && nextNode.type === 'reactor') connectedReactor = nextNode;
  }
  const configContext = { throughputMultiplier, energySource, connectedReactor, market, unlocked, process, feedstockId, gmoBanActive, gmoBanAnnounced, gmoBanAnnouncedYear };
  const isShutdown = shutdownTicksRemaining > 0;

  if (!gameStarted) {
    return (
      <SetupScreen
        processKey={processKey} setProcessKey={setProcessKey}
        factoryName={factoryName} setFactoryName={setFactoryName}
        capitalKey={capitalKey} setCapitalKey={setCapitalKey}
        volatilityKey={volatilityKey} setVolatilityKey={setVolatilityKey}
        scenarioKey={scenarioKey} applyScenario={applyScenario}
        gameDurationYears={gameDurationYears} setGameDurationYears={setGameDurationYears}
        onStart={startGame}
        fileInputRef={fileInputRef} onImportFile={(f) => importSave(f)}
      />
    );
  }

  if (resultCard) {
    return <ResultCardScreen data={resultCard} onRestart={resetGame} />;
  }

  return (
    <div className="h-screen w-screen flex flex-col" style={{ background: 'var(--bg)' }}>
      <Header
        running={running} onToggleRunning={() => setRunning(r => !r)} onReset={resetGame}
        energySource={energySource} onEnergyChange={setEnergySource} onInfo={() => setShowInfo(true)}
        year={currentYear} month={currentMonth} gameDurationYears={gameDurationYears}
        onExport={exportSave} factoryName={factoryName} process={process}
      />

      {isShutdown && (
        <div className="px-4 py-2 text-sm font-medium text-center warn-pulse" style={{ background: 'rgba(229,72,77,0.15)', color: 'var(--red)', borderBottom: '1px solid var(--red)' }}>
          🛑 PRODUCTIE STILGELEGD — protest wegens CO2-overschrijding (nog {(shutdownTicksRemaining * GAME.tickMs / 1000).toFixed(0)}s).
        </div>
      )}

      <div className="flex gap-3 px-4 py-3 border-b flex-wrap" style={{ borderColor: 'var(--border)', background: 'var(--panel)' }}>
        <DigitalReadout label="In kas" value={fmtEuro(winst)} colorVar={winst >= 0 ? 'var(--green)' : 'var(--red)'} icon="€" />
        <DigitalReadout label="CO2-uitstoot" value={fmtCO2(co2Total)} colorVar={co2Rights < 0 ? 'var(--red)' : 'var(--text-dim)'} icon="☁"
          onClick={() => { setShowCo2Market(true); setCo2ModalAutoOpened(false); }}
          subLabel="Gem. ton/ton (levensduur)" subValue={(totalNh3Kg > 0 ? (co2Total / totalNh3Kg) : 0).toFixed(2)} />
        <DigitalReadout label={hasGreenCertificate ? `CO2/ton ${process.speciesLabels.c} ✓ groen` : `CO2/ton ${process.speciesLabels.c}`} value={co2IntensityLive.toFixed(2)} colorVar={hasGreenCertificate ? 'var(--green)' : (co2IntensityLive > legislativeCap ? 'var(--red)' : 'var(--text-dim)')} icon="🏭" onClick={() => { setShowCo2Market(true); setCo2ModalAutoOpened(false); }} />
        <RingGauge label="Product-zuiverheid" value={purity} unit="%" min={0} max={100} colorVar="var(--cyan)" active={activeChain.length > 0} />
      </div>

      <div className="flex flex-1 min-h-0">
        <Palette onAdd={addNode} unlocked={unlocked} process={process} />

        <div
          ref={canvasRef}
          onMouseDown={() => setSelectedNodeId(null)}
          className="relative flex-1 blueprint-grid overflow-auto scrollbar-thin"
          style={{ minWidth: 0 }}
        >
          <div className="relative" style={{ width: 1080, height: 680 }}>
            <PipeLayer nodes={nodes} edges={edges} activeChain={activeChain} linking={linking} onDeleteEdge={deleteEdge} />
            {nodes.map(n => (
              <NodeCard
                key={n.id} node={n} selected={n.id === selectedNodeId} shaking={!!shakeIds[n.id]}
                activeChain={activeChain} onHeaderDown={onHeaderDown} onPortDown={onPortDown} onRemove={removeNode}
                process={process}
              />
            ))}
          </div>
        </div>
      </div>

      {selectedNode && (
        <ConfigPanel node={selectedNode} onChange={updateNodeConfig} onClose={() => setSelectedNodeId(null)}
                     onRemove={removeNode} onReplaceCatalyst={replaceCatalyst}
                     onPerformMaintenance={performMaintenance} onReplaceVessel={replaceVessel}
                     context={configContext} />
      )}

      <LiveMetricsPanel expanded={liveExpanded} onToggle={() => setLiveExpanded(v => !v)} snapshot={liveSnapshot} process={process} />

      <BottomFinancePanel
        expanded={bottomExpanded} onToggle={() => setBottomExpanded(v => !v)}
        winst={winst} loanBalance={loanBalance} totals={costTotals} monthlyTotals={monthlyTotals}
        onRepayLoan={repayLoan}
        unlocked={unlocked} activeProjectId={activeProjectId} projectProgress={projectProgress}
        rdYearlyCommitment={rdYearlyCommitment} onSelectProject={selectActiveProject} onSetYearlyCommitment={setRdYearlyCommitment}
        process={process}
      />

      <ToastStack toasts={toasts} />
      {showInfo && <InfoModal onClose={() => setShowInfo(false)} process={process} />}
      {showCo2Market && (
        <Co2MarketModal
          co2Rights={co2Rights} protestStress={protestStress} co2CatTotals={co2CatTotals}
          co2RightsBasePrice={market.co2RightsBasePrice} purchasedThisYear={co2PurchasedThisYear}
          co2IntensityLive={co2IntensityLive} totalNh3Kg={totalNh3Kg} co2TotalAll={co2Total}
          hasGreenCertificate={hasGreenCertificate} legislativeCap={legislativeCap}
          inGracePeriod={currentYear === 1 && currentMonth <= GAME.co2GracePeriodMonths}
          process={process}
          onBuy={buyCo2Rights} onEmergencyBuy={payEmergencyCo2}
          onClose={() => { setShowCo2Market(false); if (co2ModalAutoOpened) { setRunning(true); setCo2ModalAutoOpened(false); } }}
        />
      )}
      {showEmergencyCo2 && (
        <EmergencyCo2Modal
          deficitKg={emergencyDeficit} co2RightsBasePrice={market.co2RightsBasePrice}
          onPay={payEmergencyCo2} onAccept={acceptCo2Shutdown}
        />
      )}
      {showYearEnd && yearEndData && (
        <YearEndReportModal
          data={yearEndData} capitalNow={winst} loanBalance={loanBalance}
          onContinue={continueAfterYearEnd} process={process}
        />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

<script>
const CHEM_R = 8.314;
const SCALE = 10000;
function computeKpGeneric(T_K, Tref, KpRef, dH) {
  return KpRef * Math.exp(-dH / CHEM_R * (1 / T_K - 1 / Tref));
}
function solveConversionGeneric(Kp, P, FA, FB, nA, nB, nC) {
  const dn = nA + nB - nC;
  const target = Kp * Math.pow(P, dn);
  const xiMax = Math.min(FA / nA, FB / nB) * 0.999999;
  function g(xi) {
    const A = FA - nA * xi,
      B = FB - nB * xi,
      C = nC * xi;
    const total = FA + FB - dn * xi;
    const yA = A / total,
      yB = B / total,
      yC = C / total;
    return Math.pow(yC, nC) / (Math.pow(yA, nA) * Math.pow(yB, nB)) - target;
  }
  let lo = 1e-9,
    hi = xiMax;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    if (g(mid) < 0) lo = mid;else hi = mid;
  }
  return (lo + hi) / 2;
}
function kineticFactorGeneric(T_K, catalystEfficiency, throughputMultiplier, EaBase, EaReduceMax, A, tauRef) {
  const EaEff = EaBase - catalystEfficiency * EaReduceMax;
  const k = A * Math.exp(-EaEff / (CHEM_R * T_K));
  const tau = tauRef / throughputMultiplier;
  return 1 - Math.exp(-k * tau);
}
function fermentationCeilingGeneric(T_C, pH, process) {
  const survival = 1 / (1 + Math.exp((T_C - process.Tcrit) / process.survivalWidth));
  const phFactor = Math.exp(-Math.pow(pH - process.pHopt, 2) / (2 * process.pHsigma * process.pHsigma));
  return process.maxTheoreticalConversion * survival * phFactor;
}
class ProcessEngine {
  static computeKp(T_K, process) {
    return computeKpGeneric(T_K, process.Tref, process.KpRef, process.dH);
  }
  static solveConversion(Kp, P_bar, process) {
    const xi = solveConversionGeneric(Kp, P_bar, process.feedA, process.feedB, process.nA, process.nB, process.nC);
    return xi / (process.feedA / process.nA);
  }
  static kineticFactor(T_K, catalystEfficiency, throughputMultiplier, process) {
    return kineticFactorGeneric(T_K, catalystEfficiency, throughputMultiplier, process.EaBase, process.EaReduceMax, process.A, process.tauRef);
  }
  static getCeiling(config, process) {
    if (process.kineticsType === 'fermentation') {
      return fermentationCeilingGeneric(config.tempC, config.pressureBar, process);
    }
    const Kp = computeKpGeneric(config.tempC + 273, process.Tref, process.KpRef, process.dH);
    return ProcessEngine.solveConversion(Kp, config.pressureBar, process);
  }
  static runReactor(config, material, stream, heatRecoveryFraction, throughputMultiplier, process, healthFactor = 1) {
    const T_K = config.tempC + 273;
    const P = config.pressureBar;
    const xEq = ProcessEngine.getCeiling(config, process);
    const kFactorFull = kineticFactorGeneric(T_K, material.catalystEfficiency, throughputMultiplier, process.EaBase, process.EaReduceMax, process.A, process.tauRef);
    const kFactor = kFactorFull * healthFactor;
    const xNet = xEq * kFactor;
    const xiActual = stream.a / process.nA * xNet;
    const newStream = {
      a: stream.a - process.nA * xiActual,
      b: stream.b - process.nB * xiActual,
      c: stream.c + process.nC * xiActual
    };
    const freshMolesIn = process.feedA * throughputMultiplier + process.feedB * throughputMultiplier;
    const totalMolesIn = stream.a + stream.b;
    const recycleMultiplier = Math.max(0, totalMolesIn - freshMolesIn) / (process.feedA + process.feedB);
    const heatEnergyFresh = process.heatK * Math.max(0, T_K - 298) * (1 - heatRecoveryFraction) * throughputMultiplier;
    const recirculationEfficiency = 0.22;
    const heatEnergyRecycle = process.heatK * Math.max(0, T_K - 298) * recycleMultiplier * recirculationEfficiency;
    const compBasis = process.kineticsType === 'fermentation' ? Math.abs(P - 7) : P;
    const compEnergyFresh = process.compK * compBasis * throughputMultiplier;
    const compEnergyRecycle = process.compK * compBasis * recycleMultiplier * recirculationEfficiency;
    return {
      stream: newStream,
      heatEnergy: heatEnergyFresh,
      compEnergy: compEnergyFresh,
      recirculationEnergy: heatEnergyRecycle + compEnergyRecycle,
      xEq,
      kFactor,
      xNet,
      overPressure: P > material.maxPressure
    };
  }
}
const HB_BASE_MATERIALS = [{

const HB_RESEARCH_MATERIAL = {

const HB_RESEARCH_ITEMS = [{

function purityPriceFactor(purityFraction, unlocked) {
  const pts = unlocked && unlocked.membraneSep ? [{
    purity: 0.80,
    factor: 0.20
  }, {
    purity: 0.95,
    factor: 1.00
  }, {
    purity: 0.995,
    factor: 1.75
  }] : GAME.purityPriceBreaks;
  if (purityFraction <= pts[0].purity) return pts[0].factor;
  if (purityFraction >= pts[pts.length - 1].purity) return pts[pts.length - 1].factor;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i],
      b = pts[i + 1];
    if (purityFraction >= a.purity && purityFraction <= b.purity) {
      const f = (purityFraction - a.purity) / (b.purity - a.purity);
      return a.factor + f * (b.factor - a.factor);
    }
  }
  return 1.0;
}

function evolveMarket(market, volatilityKey) {
  const vol = VOLATILITY[volatilityKey] || VOLATILITY.gematigd;
  const rnd = () => Math.random() * 2 - 1;
  const shock = rnd() * vol;
  const grijsChange = shock * 1.0 + rnd() * vol * 0.3;
  const groenChange = shock * 0.4 + rnd() * vol * 0.6;
  const co2Change = shock * 0.6 + rnd() * vol * 0.4 + 0.07;
  const productChange = shock * 0.5 + rnd() * vol * 0.5;
  const clampFactor = (base, change) => Math.max(base * 0.35, base * (1 + change));
  return {
    energyPriceGrijs: clampFactor(market.energyPriceGrijs, grijsChange),
    energyPriceGroen: clampFactor(market.energyPriceGroen, groenChange),
    co2RightsBasePrice: clampFactor(market.co2RightsBasePrice, co2Change),
    productPrice: clampFactor(market.productPrice, productChange),
    changes: {
      grijsChange,
      groenChange,
      co2Change,
      productChange
    }
  };
}
