/* =========================================================================
   ECO-CHEMIE TYCOON
   ---------------------------------------------------------------------
   Gedeeld spelraamwerk (kalender, financiën, CO2-markt, R&D, onderhoud)
   met een verwisselbare "procesmodule" per fabriekstype:
     - Haber-Bosch:     N2(g) + 3H2(g) <=> 2NH3(g)   (ammoniak)
     - Contactproces:   2SO2(g) + O2(g) <=> 2SO3(g)  (zwavelzuur)
   De reactorkern gebruikt een generieke evenwichtsoplosser (willekeurige
   stoichiometrie aA+bB<=>cC), zodat recyclelus/heat exchanger/separator
   volledig gedeeld worden tussen processen. Geldbedragen zijn x10.000
   geschaald (industriële schaal, €10 mln startkapitaal).
   ========================================================================= */

const CHEM_R = 8.314;
const SCALE = 10000;

/* ---------- Generieke evenwichts- en kinetiekfuncties (proces-onafhankelijk) ---------- */

function computeKpGeneric(T_K, Tref, KpRef, dH) {
  return KpRef * Math.exp(-dH / CHEM_R * (1 / T_K - 1 / Tref));
}

// Lost aA + bB <=> cC op voor de extent xi, gegeven Kp, druk P en startmolen FA/FB.
function solveConversionGeneric(Kp, P, FA, FB, nA, nB, nC) {
  const dn = nA + nB - nC;
  const target = Kp * Math.pow(P, dn);
  const xiMax = Math.min(FA / nA, FB / nB) * 0.999999;
  function g(xi) {
    const A = FA - nA * xi, B = FB - nB * xi, C = nC * xi;
    const total = FA + FB - dn * xi;
    const yA = A / total, yB = B / total, yC = C / total;
    return Math.pow(yC, nC) / (Math.pow(yA, nA) * Math.pow(yB, nB)) - target;
  }
  let lo = 1e-9, hi = xiMax;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    if (g(mid) < 0) lo = mid; else hi = mid;
  }
  return (lo + hi) / 2;
}

function kineticFactorGeneric(T_K, catalystEfficiency, throughputMultiplier, EaBase, EaReduceMax, A, tauRef) {
  const EaEff = EaBase - catalystEfficiency * EaReduceMax;
  const k = A * Math.exp(-EaEff / (CHEM_R * T_K));
  const tau = tauRef / throughputMultiplier;
  return 1 - Math.exp(-k * tau);
}

// Voor niet-omkeerbare (bijv. fermentatie-)processen: geen thermodynamisch evenwicht, maar een
// "plafond" bepaald door overleving/geschiktheid van het micro-organisme bij de gekozen T en pH.
function fermentationCeilingGeneric(T_C, pH, process) {
  const survival = 1 / (1 + Math.exp((T_C - process.Tcrit) / process.survivalWidth));
  const phFactor = Math.exp(-Math.pow(pH - process.pHopt, 2) / (2 * process.pHsigma * process.pHsigma));
  return process.maxTheoreticalConversion * survival * phFactor;
}

class ProcessEngine {
  static computeKp(T_K, process) {
    return computeKpGeneric(T_K, process.Tref, process.KpRef, process.dH);
  }

  static solveConversion(Kp, P_bar, process) {
    const xi = solveConversionGeneric(Kp, P_bar, process.feedA, process.feedB, process.nA, process.nB, process.nC);
    return xi / (process.feedA / process.nA); // conversiefractie t.o.v. component A
  }

  static kineticFactor(T_K, catalystEfficiency, throughputMultiplier, process) {
    return kineticFactorGeneric(T_K, catalystEfficiency, throughputMultiplier, process.EaBase, process.EaReduceMax, process.A, process.tauRef);
  }

  // Voor de reactorconfig-UI: xEq ("hoeveel is er maximaal haalbaar") ongeacht het onderliggende mechanisme.
  static getCeiling(config, process) {
    if (process.kineticsType === 'fermentation') {
      return fermentationCeilingGeneric(config.tempC, config.pressureBar, process);
    }
    const Kp = computeKpGeneric(config.tempC + 273, process.Tref, process.KpRef, process.dH);
    return ProcessEngine.solveConversion(Kp, config.pressureBar, process);
  }

  // stream = { a, b, c } -- onomgezet component A, onomgezet component B, gevormd product C
  // healthFactor (0-1) schaalt de kinetische uitkomst 1-op-1 -- NIET de efficiëntie-parameter zelf,
  // want die gaat door een exponentiële (Arrhenius) functie en zou anders een kleine
  // gezondheidsdaling enorm uitvergroten in de uitkomst.
  static runReactor(config, material, stream, heatRecoveryFraction, throughputMultiplier, process, healthFactor = 1) {
    const T_K = config.tempC + 273;
    const P = config.pressureBar;
    const xEq = ProcessEngine.getCeiling(config, process);
    const kFactorFull = kineticFactorGeneric(T_K, material.catalystEfficiency, throughputMultiplier, process.EaBase, process.EaReduceMax, process.A, process.tauRef);
    const kFactor = kFactorFull * healthFactor;
    const xNet = xEq * kFactor;

    // Extent van de daadwerkelijke (kinetisch beperkte) omzetting, geschaald naar de actuele stream.
    const xiActual = (stream.a / process.nA) * xNet;
    const newStream = {
      a: stream.a - process.nA * xiActual,
      b: stream.b - process.nB * xiActual,
      c: stream.c + process.nC * xiActual,
    };

    // Energie schaalt met de TOTALE hoeveelheid gas die daadwerkelijk door de reactor stroomt,
    // niet alleen de verse voeding: gerecycled gas moet ook opnieuw verwarmd/samengeperst worden.
    // De retourstroom gaat niet via de heat exchanger (aparte poort), dus geen terugwinning daarop.
    const freshMolesIn = process.feedA * throughputMultiplier + process.feedB * throughputMultiplier;
    const totalMolesIn = stream.a + stream.b;
    const recycleMultiplier = Math.max(0, totalMolesIn - freshMolesIn) / (process.feedA + process.feedB);

    const heatEnergyFresh = process.heatK * Math.max(0, T_K - 298) * (1 - heatRecoveryFraction) * throughputMultiplier;
    // Retourgas is niet volledig koud (komt uit een reeds actief proces) en profiteert vaak van
    // warmte-integratie/economizers in een echte retourlus -- vandaar een korting t.o.v. de volle
    // verse-voeding-prijs, niet de volle GAME.heatExchangerMaxRecovery-achtige terugwinning zelf.
    const recirculationEfficiency = 0.22;
    const heatEnergyRecycle = process.heatK * Math.max(0, T_K - 298) * recycleMultiplier * recirculationEfficiency;
    // Bij fermentatie is "P" geen druk maar pH: kosten schalen dan met de afwijking van neutraal
    // (bufferen/doseren om een niet-neutrale pH vast te houden), niet met de absolute waarde.
    const compBasis = process.kineticsType === 'fermentation' ? Math.abs(P - 7) : P;
    const compEnergyFresh = process.compK * compBasis * throughputMultiplier;
    const compEnergyRecycle = process.compK * compBasis * recycleMultiplier * recirculationEfficiency;

    return {
      stream: newStream,
      heatEnergy: heatEnergyFresh, compEnergy: compEnergyFresh,
      recirculationEnergy: heatEnergyRecycle + compEnergyRecycle,
      xEq, kFactor, xNet, overPressure: P > material.maxPressure,
    };
  }
}

function scaledMaterialsGeneric(baseMaterials, researchMaterial, unlocked, tier2Flag, tier3Flag) {
  let list = [baseMaterials[0], baseMaterials[1]];
  if (unlocked[tier2Flag]) list = [...list, baseMaterials[2]];
  if (unlocked[tier3Flag]) list = [...list, researchMaterial];
  return list.map(m => ({
    ...m,
    vesselCost: m.vesselCost * SCALE,
    catalystCost: m.catalystCost * SCALE,
    maxPressure: m.maxPressure + (unlocked.reinforcedReactor ? (m.maxPressure > 20 ? 50 : 5) : 0),
  }));
}
function scaledMaterials(unlocked) { // Haber-Bosch (bestaande naam, ongewijzigd gedrag, voor compatibiliteit)
  return scaledMaterialsGeneric(HB_BASE_MATERIALS, HB_RESEARCH_MATERIAL, unlocked, 'rutheniumCatalyst', 'catalystResearch');
}
function scaledMaterialsContact(unlocked) {
  return scaledMaterialsGeneric(CONTACT_BASE_MATERIALS, CONTACT_RESEARCH_MATERIAL, unlocked, 'platinaCatalyst', 'catalystResearch');
}
function scaledMaterialsBioEthanol(unlocked) {
  return scaledMaterialsGeneric(BIOETHANOL_BASE_MATERIALS, BIOETHANOL_RESEARCH_MATERIAL, unlocked, 'thermotolerantGist', 'catalystResearch');
}
function materialTotalCost(m) { return m.vesselCost + m.catalystCost; }
function pressureFromVolume(volumeM3, process) { return process.volumeConstant / volumeM3; }
function volumeFromPressure(pressureBar, process) { return process.volumeConstant / pressureBar; }
function allMaterialsFor(process) {
  if (process.id === 'contactProcess') return [...CONTACT_BASE_MATERIALS, CONTACT_RESEARCH_MATERIAL];
  if (process.id === 'bioEthanol') return [...BIOETHANOL_BASE_MATERIALS, BIOETHANOL_RESEARCH_MATERIAL];
  return [...HB_BASE_MATERIALS, HB_RESEARCH_MATERIAL];
}

function purityPriceFactor(purityFraction, unlocked) {
  const pts = unlocked && unlocked.membraneSep
    ? [{ purity: 0.80, factor: 0.20 }, { purity: 0.95, factor: 1.00 }, { purity: 0.995, factor: 1.75 }]
    : GAME.purityPriceBreaks;
  if (purityFraction <= pts[0].purity) return pts[0].factor;
  if (purityFraction >= pts[pts.length - 1].purity) return pts[pts.length - 1].factor;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    if (purityFraction >= a.purity && purityFraction <= b.purity) {
      const f = (purityFraction - a.purity) / (b.purity - a.purity);
      return a.factor + f * (b.factor - a.factor);
    }
  }
  return 1.0;
}

function co2RightsPurchaseCost(amountKg, co2RightsBasePrice) {
  return co2RightsBasePrice * amountKg + (GAME.co2RightsPriceSlope / 2) * amountKg * amountKg;
}

    label: 'Ruime middelen', desc: 'Alleen eigen kapitaal, stabiele markt — goed startscenario om de basis te leren kennen.',
    capitalKey: 'eigen', volatilityKey: 'stabiel',
  },
  krap: {

    capitalKey: 'lening', volatilityKey: 'volatiel',
  },

    capitalKey: 'helfhelf', volatilityKey: 'gematigd',
    legislativeCapInitial: 2.0, legislativeCapTightenChance: 0.5,
  },
};

function evolveMarket(market, volatilityKey) {
  const vol = VOLATILITY[volatilityKey] || VOLATILITY.gematigd;
  const rnd = () => (Math.random() * 2 - 1); // -1..1
  const shock = rnd() * vol; // gedeelde macro-schok (energie/grondstoffenmarkt)

  const grijsChange   = shock * 1.0 + rnd() * vol * 0.3;
  const groenChange   = shock * 0.4 + rnd() * vol * 0.6;
  const co2Change     = shock * 0.6 + rnd() * vol * 0.4 + 0.07; // stevige seculiere stijging (beleid dat structureel richting nul-uitstoot stuurt)
  const productChange = shock * 0.5 + rnd() * vol * 0.5;

  const clampFactor = (base, change) => Math.max(base * 0.35, base * (1 + change));

  return {
    energyPriceGrijs: clampFactor(market.energyPriceGrijs, grijsChange),
    energyPriceGroen: clampFactor(market.energyPriceGroen, groenChange),
    co2RightsBasePrice: clampFactor(market.co2RightsBasePrice, co2Change),
    productPrice: clampFactor(market.productPrice, productChange),
    changes: { grijsChange, groenChange, co2Change, productChange },
  };
}

function initialMarket(process) {
  return {
    energyPriceGrijs: GAME.energyPriceBase.grijs,
    energyPriceGroen: GAME.energyPriceBase.groen,
    co2RightsBasePrice: GAME.co2RightsBasePriceBase,
    productPrice: process.productPriceBase,
  };
}
/* =========================================================================
   PIJPLEIDING-LOGICA (proces-generiek)
   ---------------------------------------------------------------------
   Stream-objecten gebruiken generieke velden {a,b,c}: a/b = onomgezette
   componenten A/B, c = gevormd product C. Welke stof dat concreet is
   (N2/H2/NH3 of SO2/O2/SO3) wordt bepaald door de actieve `process`-config
   (zie PROCESSES in 01_engine.js) -- zo zijn recyclelus, heat exchanger en
   separator/absorptiekolom volledig gedeeld tussen fabriekstypen.
   ========================================================================= */

const PORT_DEFS = {
  feed:          [{ id: 'out', side: 'right', dy: 0.5 }],
  product:       [{ id: 'in', side: 'left', dy: 0.5 }],
  heatExchanger: [{ id: 'in', side: 'left', dy: 0.5 }, { id: 'out', side: 'right', dy: 0.5 }],
  reactor:       [{ id: 'in', side: 'left', dy: 0.3 }, { id: 'recycleIn', side: 'left', dy: 0.8 }, { id: 'out', side: 'right', dy: 0.5 }],
  separator:     [{ id: 'in', side: 'left', dy: 0.5 }, { id: 'out', side: 'right', dy: 0.3 }, { id: 'recycleOut', side: 'right', dy: 0.8 }],
};

function findMainChain(nodes, edges) {
  const outMap = {};
  edges.forEach(e => { if (e.fromPort === 'out' && e.toPort === 'in') outMap[e.from] = e.to; });
  const chain = ['feed'];
  const visited = new Set(['feed']);
  let cur = 'feed';
  let safety = 0;
  while (outMap[cur] && !visited.has(outMap[cur]) && safety < 50) {
    cur = outMap[cur];
    chain.push(cur);
    visited.add(cur);
    if (cur === 'product') break;
    safety++;
  }
  return { chain, complete: chain[chain.length - 1] === 'product' };
}

function findRecycleEdges(edges) {
  return edges.filter(e => e.fromPort === 'recycleOut' && e.toPort === 'recycleIn');
}

function feedstockConfigFor(process, feedNode) {
  if (!process.feedstockOptions) return { costPerTick: process.feedstockCostPerTick, feedstockId: null };
  const id = (feedNode.config && feedNode.config.feedstockId) || process.feedstockOptions[0].id;
  const opt = process.feedstockOptions.find(o => o.id === id) || process.feedstockOptions[0];
  return { costPerTick: opt.costPerTick, feedstockId: opt.id };
}

function runChainOnce(nodesById, intermediate, recycleIn, recycleTargetsBySeparator, throughputMultiplier, unlocked, trackSideEffects, process, feedstockId) {
  const materials = process.getMaterials(unlocked);
  const hxMaxRecovery = unlocked.efficientHX ? 0.97 : GAME.heatExchangerMaxRecovery;
  const hxThroughputExp = unlocked.efficientHX ? 0.7 : 1.0; // minder gevoelig voor doorvoer
  const leakStressRate = GAME.leakStressRate * (unlocked.predictiveMaintenance ? 0.5 : 1.0);
  const sepKnee = unlocked.membraneSep ? process.separatorKnee.upgraded : process.separatorKnee.base;
  const sepKLoss = unlocked.membraneSep ? process.separatorKLoss.upgraded : process.separatorKLoss.base;

  let stream = { a: process.feedA * throughputMultiplier, b: process.feedB * throughputMultiplier, c: 0 };
  let pendingRecoveryDial = 0;
  let heatEnergy = 0, compEnergy = 0, sepEnergy = 0, recirculationEnergy = 0;
  let purity = null;
  let usedSeparator = false;
  let maintenanceCount = 0;
  const newRecycleIn = {};
  const statusUpdates = {};
  const leakEvents = [];

  for (const nodeId of intermediate) {
    const node = nodesById[nodeId];

    if (node.type === 'heatExchanger') {
      pendingRecoveryDial = Math.min(hxMaxRecovery, node.config.recovery / Math.pow(throughputMultiplier, hxThroughputExp));
      // De wisselaar zelf kost energie (grotere/efficiëntere units, meer drukverlies),
      // kubisch oplopend met de instelling -- "gewoon op max zetten" is daarom niet gratis.
      heatEnergy += GAME.heatExchangerSelfEnergyK * Math.pow(node.config.recovery, 3);
      if (trackSideEffects) { statusUpdates[nodeId] = { effectiveRecovery: pendingRecoveryDial }; maintenanceCount++; }
      continue;
    }

    if (node.type === 'reactor') {
      const isOffline = node.status && node.status.offlineTicks > 0;
      if (isOffline) {
        if (trackSideEffects) {
          statusUpdates[nodeId] = { ...node.status, offlineTicks: node.status.offlineTicks - 1 };
        }
        pendingRecoveryDial = 0;
        continue;
      }

      const material = materials.find(m => m.id === node.config.materialId) || materials[0];
      const health = (node.status && node.status.catalystHealth != null) ? node.status.catalystHealth : 100;
      const vesselCondition = (node.status && node.status.vesselCondition != null) ? node.status.vesselCondition : 100;
      const serviceCount = (node.status && node.status.serviceCount) || 0;
      // Een versleten vat is minder veilig bij dezelfde nominale druk: de effectieve grens
      // daalt geleidelijk van 100% naar 70% van de nominale materiaalgrens.
      const effectiveMaxPressure = material.maxPressure * (0.7 + 0.3 * vesselCondition / 100);
      const effectiveMaterial = {
        ...material,
        maxPressure: effectiveMaxPressure,
      };

      const recycle = recycleIn[nodeId] || { a: 0, b: 0 };
      const incoming = { a: stream.a + recycle.a, b: stream.b + recycle.b, c: stream.c };
      const result = ProcessEngine.runReactor(node.config, effectiveMaterial, incoming, pendingRecoveryDial, throughputMultiplier, process, health / 100);
      stream = result.stream;
      heatEnergy += result.heatEnergy;
      compEnergy += result.compEnergy;
      recirculationEnergy += result.recirculationEnergy;
      pendingRecoveryDial = 0;

      if (trackSideEffects) {
        maintenanceCount++;

        const inspectionOverdue = vesselCondition < GAME.inspectionThreshold;
        const effectiveLeakStressRate = leakStressRate * (inspectionOverdue ? GAME.inspectionLeakStressMultiplier : 1);
        let stress = (node.status && node.status.stress) || 0;
        if (result.overPressure) stress += (node.config.pressureBar - effectiveMaxPressure) * effectiveLeakStressRate;
        else stress = Math.max(0, stress - GAME.leakStressDecay);

        // Vergiftiging: verkeerde grondstof/katalysator-combinatie versnelt de katalysatorslijtage fors.
        const isPoisoned = material.poisonedByFeedstock && material.poisonedByFeedstock === feedstockId;
        const decay = (GAME.catalystDecayBase + GAME.catalystDecayTempFactor * Math.max(0, node.config.tempC - GAME.catalystDecayRefTempC))
          * (material.decayMult || 1.0) * (isPoisoned ? GAME.catalystPoisoningMultiplier : 1);
        const newHealth = Math.max(0, health - decay);

        const pressureFrac = node.config.pressureBar / material.maxPressure;
        const vesselDecay = GAME.vesselDecayBase * (1 + serviceCount * GAME.vesselDecayAccelPerService)
          + GAME.vesselDecayPressureFactor * Math.max(0, pressureFrac - 0.5);
        const newVesselCondition = Math.max(0, vesselCondition - vesselDecay);

        let offlineTicks = 0;
        if (stress >= GAME.leakStressThreshold) {
          leakEvents.push({ nodeId, pressure: node.config.pressureBar, maxPressure: effectiveMaxPressure });
          stress = 0;
          offlineTicks = GAME.leakDowntimeTicks;
        }
        statusUpdates[nodeId] = {
          leakRisk: result.overPressure, stress, offlineTicks,
          xEq: result.xEq, kFactor: result.kFactor, xNet: result.xNet,
          recycled: recycle.a > 0.01,
          catalystHealth: newHealth,
          vesselCondition: newVesselCondition,
          inspectionOverdue,
          isPoisoned,
        };
      }
      continue;
    }

    if (node.type === 'separator') {
      usedSeparator = true;
      const eff = node.config.efficiency;
      // Tot de knik geen opbrengstverlies; daarna een echte parabool (kwadratisch) omlaag --
      // de verbeterde-absorptie-upgrade verschuift de knik hoger en verzacht de val.
      const recoveryFraction = eff <= sepKnee ? 1 : Math.max(0.02, 1 - sepKLoss * Math.pow(eff - sepKnee, 2));
      const productC = stream.c * recoveryFraction;
      const totalIncoming = stream.a + stream.b + stream.c; // vóór scheiding -- verdunning telt mee

      const targetReactorId = recycleTargetsBySeparator[nodeId];
      if (targetReactorId) {
        newRecycleIn[targetReactorId] = {
          a: stream.a * GAME.recycleEfficiency,
          b: stream.b * GAME.recycleEfficiency,
        };
      }
      // Scheidingsenergie hangt af van de TOTALE (verdunde) stroom, niet alleen het product:
      // een lager reactorrendement betekent meer onomgezet gas dat toch gekoeld/gescheiden
      // moet worden om diezelfde hoeveelheid product terug te winnen.
      sepEnergy += process.sepK * eff * (totalIncoming + 1);
      stream = { a: 0, b: 0, c: productC };
      purity = eff;
      if (trackSideEffects) { statusUpdates[nodeId] = { hasRecycleOut: !!targetReactorId, recoveryFraction }; maintenanceCount++; }
      continue;
    }
  }

  if (purity === null) {
    const totalMol = stream.a + stream.b + stream.c;
    purity = totalMol > 0 ? (stream.c / totalMol) : 0;
  }

  return { stream, newRecycleIn, heatEnergy, compEnergy, sepEnergy, recirculationEnergy, purity, statusUpdates, leakEvents, usedSeparator, maintenanceCount };
}

function shutdownTick(nodesById, intermediate) {
  const equipmentCount = intermediate.filter(id => ['reactor', 'heatExchanger', 'separator'].includes(nodesById[id].type)).length;
  return {
    active: true,
    product_kg: 0,
    purity: 0,
    breakdown: {
      revenue: 0, feedCost: 0,
      energyCostHeat: 0, energyCostComp: 0, energyCostSep: 0, energyCostRecirculation: 0,
      maintenanceCost: equipmentCount * GAME.maintenanceCostPerTick,
      repairCost: 0,
    },
    co2Breakdown: { heat: 0, comp: 0, sep: 0, recirculatie: 0, leak: 0 },
    co2Delta: 0,
    statusUpdates: {},
    leakEvents: [],
  };
}

function simulateTick(nodes, edges, energySource, isShutdown, market, unlocked, hasGreenCertificate, process) {
  const nodesById = {};
  nodes.forEach(n => { nodesById[n.id] = n; });
  const { chain, complete } = findMainChain(nodes, edges);

  const emptyResult = {
    active: false, product_kg: 0, purity: 0,
    breakdown: { revenue: 0, feedCost: 0, energyCostHeat: 0, energyCostComp: 0, energyCostSep: 0, energyCostRecirculation: 0, maintenanceCost: 0, repairCost: 0 },
    co2Breakdown: { heat: 0, comp: 0, sep: 0, recirculatie: 0, leak: 0 },
    co2Delta: 0, statusUpdates: {}, leakEvents: [], activeChain: complete ? chain : [],
  };
  if (!complete) return emptyResult;

  const intermediate = chain.filter(id => id !== 'feed' && id !== 'product');

  if (isShutdown) {
    return { ...shutdownTick(nodesById, intermediate), activeChain: chain };
  }

  const throughputMultiplier = (nodesById.feed.config && nodesById.feed.config.throughputMultiplier) || 1.0;
  const { costPerTick: feedstockCostPerTick, feedstockId } = feedstockConfigFor(process, nodesById.feed);

  const recycleTargetsBySeparator = {};
  findRecycleEdges(edges).forEach(e => {
    if (intermediate.includes(e.from) && intermediate.includes(e.to)) {
      recycleTargetsBySeparator[e.from] = e.to;
    }
  });

  let recycleIn = {};
  intermediate.forEach(id => { if (nodesById[id].type === 'reactor') recycleIn[id] = { a: 0, b: 0 }; });
  for (let iter = 0; iter < 25; iter++) {
    const pass = runChainOnce(nodesById, intermediate, recycleIn, recycleTargetsBySeparator, throughputMultiplier, unlocked, false, process, feedstockId);
    Object.keys(recycleIn).forEach(rId => { recycleIn[rId] = pass.newRecycleIn[rId] || { a: 0, b: 0 }; });
  }

  const final = runChainOnce(nodesById, intermediate, recycleIn, recycleTargetsBySeparator, throughputMultiplier, unlocked, true, process, feedstockId);

  const product_kg = (final.stream.c * process.productMolarMass) / 1000;
  // Biologisch (geen GMO waar dan ook in de lijn) kan een meerprijs opleveren, net als het
  // groene certificaat -- maar de twee bonussen zijn onafhankelijk en kunnen allebei gelden.
  const materials = process.getMaterials(unlocked);
  const reactorMaterials = intermediate
    .filter(id => nodesById[id].type === 'reactor')
    .map(id => materials.find(m => m.id === nodesById[id].config.materialId))
    .filter(Boolean);
  const isOrganic = reactorMaterials.length > 0 && reactorMaterials.every(m => !m.isGMO);
  const priceFactor = purityPriceFactor(final.purity, unlocked)
    * (hasGreenCertificate ? (1 + GAME.greenCertificateBonus) : 1)
    * (isOrganic && process.organicBonus ? (1 + process.organicBonus) : 1);

  // Zonnepanelen: dekken een vast aandeel van elke energiestroom, vrijwel
  // gratis en CO2-vrij, ongeacht de gekozen stroombron voor de rest.
  const solarShare = unlocked.solarPanels ? 0.4 : 0;
  const gridFraction = 1 - solarShare;
  const energyPrice = energySource === 'grijs' ? market.energyPriceGrijs : market.energyPriceGroen;
  const co2Factor = GAME.co2Factor[energySource];

  const breakdown = {
    revenue: product_kg * market.productPrice * priceFactor,
    feedCost: feedstockCostPerTick * throughputMultiplier,
    energyCostHeat: final.heatEnergy * gridFraction * energyPrice,
    energyCostComp: final.compEnergy * gridFraction * energyPrice,
    energyCostSep: final.sepEnergy * gridFraction * energyPrice,
    energyCostRecirculation: final.recirculationEnergy * gridFraction * energyPrice,
    maintenanceCost: final.maintenanceCount * GAME.maintenanceCostPerTick,
    repairCost: final.leakEvents.length * GAME.leakRepairCost,
  };

  const captureFraction = unlocked.co2Capture ? 0.3 : 0;
  const co2Mult = gridFraction * (1 - captureFraction);
  const co2Breakdown = {
    heat: final.heatEnergy * co2Factor * co2Mult,
    comp: final.compEnergy * co2Factor * co2Mult,
    sep: final.sepEnergy * co2Factor * co2Mult,
    recirculatie: final.recirculationEnergy * co2Factor * co2Mult,
    leak: final.leakEvents.length * GAME.leakCo2Spike * (1 - captureFraction),
  };

  return {
    active: true,
    product_kg,
    purity: final.purity * 100,
    priceFactor,
    isOrganic,
    breakdown,
    totalEnergyUnits: final.heatEnergy + final.compEnergy + final.sepEnergy + final.recirculationEnergy,
    co2Breakdown,
    co2Delta: co2Breakdown.heat + co2Breakdown.comp + co2Breakdown.sep + co2Breakdown.recirculatie + co2Breakdown.leak,
    statusUpdates: final.statusUpdates,
    leakEvents: final.leakEvents,
    activeChain: chain,
  };
}
const { useState, useEffect, useRef, useCallback } = React;

const NODE_W = { feed: 108, product: 108, reactor: 172, heatExchanger: 172, separator: 172 };
const NODE_H = { feed: 62, product: 62, reactor: 100, heatExchanger: 88, separator: 92 };

function portPos(node, portId) {
  const w = NODE_W[node.type], h = NODE_H[node.type];
  const def = PORT_DEFS[node.type].find(p => p.id === portId) || PORT_DEFS[node.type][0];
  const x = def.side === 'left' ? node.x : node.x + w;
  const y = node.y + h * def.dy;
  return { x, y };
}

function labelForType(type) {
  return { reactor: 'Reactor', heatExchanger: 'Heat Exchanger', separator: 'Separator' }[type] || type;
}

function fmtEuro(v) {

  return sign + '€' + Math.abs(v).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function fmtCO2(kg) {

  return ton.toLocaleString('nl-NL', { maximumFractionDigits: 1 }) + ' ton';

function snapToGrid(v) {

/* ---------- Pipe layer (SVG) ---------- */

function stageColor(stage) {
  switch (stage) {
    case 'feed': return 'var(--cyan)';
    case 'hot': return 'var(--amber)';
    case 'product': return 'var(--green)';
    case 'leak': return 'var(--red)';
    case 'recycle': return 'var(--green)';
    default: return '#3A4A55';
  }
}

function edgeStage(edge, activeChain, nodesById) {
  // Retourlus: eigen, herkenbare stijl ongeacht positie in de keten
  if (edge.fromPort === 'recycleOut' && edge.toPort === 'recycleIn') {
    return activeChain.includes(edge.from) && activeChain.includes(edge.to) ? 'recycle' : 'idle';
  }
  if (!activeChain.includes(edge.from) || !activeChain.includes(edge.to)) return 'idle';
  let passedReactor = false, passedSeparator = false;
  for (const id of activeChain) {
    if (id === edge.from) break;
    const t = nodesById[id] && nodesById[id].type;
    if (t === 'reactor') passedReactor = true;
    if (t === 'separator') passedSeparator = true;
  }
  const fromNode = nodesById[edge.from];
  if (fromNode && fromNode.type === 'reactor') {
    passedReactor = true;
    if (fromNode.status && fromNode.status.leakRisk) return 'leak';
  }
  if (fromNode && fromNode.type === 'separator') passedSeparator = true;
  if (passedSeparator) return 'product';
  if (passedReactor) return 'hot';
  return 'feed';
}

// Retourlus als nette lus onderlangs (P&ID-conventie): omlaag, langs, omhoog,
// met afgeronde hoeken, in plaats van een rechte lijn die door andere nodes snijdt.
function recycleLoopPath(p1, p2, belowY) {
  const r = 16;
  const dir = p2.x >= p1.x ? 1 : -1;
  return `M ${p1.x} ${p1.y}
          L ${p1.x} ${belowY - r}
          Q ${p1.x} ${belowY} ${p1.x + r * dir} ${belowY}
          L ${p2.x - r * dir} ${belowY}
          Q ${p2.x} ${belowY} ${p2.x} ${belowY - r}
          L ${p2.x} ${p2.y}`;
}

function PipeLayer({ nodes, edges, activeChain, linking, onDeleteEdge }) {
  const nodesById = {};
  nodes.forEach(n => { nodesById[n.id] = n; });
  const belowY = nodes.length ? Math.max(...nodes.map(n => n.y + NODE_H[n.type])) + 36 : 400;
  return (
    <svg className="absolute inset-0 pointer-events-none" width="100%" height="100%" style={{ overflow: 'visible' }}>
      {edges.map(e => {
        const from = nodesById[e.from], to = nodesById[e.to];
        if (!from || !to) return null;
        const p1 = portPos(from, e.fromPort), p2 = portPos(to, e.toPort);
        const isRecycle = e.fromPort === 'recycleOut' && e.toPort === 'recycleIn';
        const stage = edgeStage(e, activeChain, nodesById);
        const color = stageColor(stage);
        const flowing = stage !== 'idle';
        const d = isRecycle
          ? recycleLoopPath(p1, p2, belowY)
          : `M ${p1.x} ${p1.y} C ${p1.x + 55} ${p1.y}, ${p2.x - 55} ${p2.y}, ${p2.x} ${p2.y}`;
        const midX = isRecycle ? (p1.x + p2.x) / 2 : (p1.x + p2.x) / 2;
        const midY = isRecycle ? belowY : (p1.y + p2.y) / 2;
        return (
          <g key={e.id}>
            <path d={d} fill="none" stroke={color} strokeWidth={isRecycle ? 3 : 4}
                  strokeLinecap="round"
                  strokeDasharray={isRecycle && !flowing ? '3 4' : undefined}
                  className={flowing ? (stage === 'leak' ? 'pipe-flow' : 'pipe-flow-slow') : ''}
                  opacity={flowing ? 1 : 0.55} />
            <circle cx={midX} cy={midY} r="9" fill="var(--panel)" stroke={color} strokeWidth="1.5"
                    className="pointer-events-auto cursor-pointer" onClick={() => onDeleteEdge(e.id)} />
            <text x={midX} y={midY + 4} textAnchor="middle" fontSize="11" fill={color} className="pointer-events-none">×</text>
          </g>
        );
      })}
      {linking && (
        <path d={`M ${linking.x1} ${linking.y1} C ${linking.x1 + 55} ${linking.y1}, ${linking.mx - 55} ${linking.my}, ${linking.mx} ${linking.my}`}
              fill="none" stroke="var(--copper)" strokeWidth="3" strokeDasharray="5 5" opacity="0.85" />
      )}
    </svg>
  );
}
function NodeIcon({ type }) {
  const common = { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 };
  if (type === 'reactor') return <svg {...common}><rect x="6" y="4" width="12" height="16" rx="2" /><path d="M9 9h6M9 13h6" /></svg>;
  if (type === 'heatExchanger') return <svg {...common}><path d="M4 12h4l2-6 4 12 2-6h4" /></svg>;
  if (type === 'separator') return <svg {...common}><path d="M12 3v18M6 8c0 3 3 3 3 6s-3 3-3 6M18 8c0 3-3 3-3 6s3 3 3 6" /></svg>;
  if (type === 'feed') return <svg {...common}><path d="M3 12h11M10 7l5 5-5 5" /></svg>;
  return <svg {...common}><path d="M21 12H10M14 7l-5 5 5 5" /></svg>;
}

function NodeCard({ node, onHeaderDown, onPortDown, onRemove, selected, shaking, activeChain, process }) {
  const w = NODE_W[node.type], h = NODE_H[node.type];
  const isRemovable = node.type !== 'feed' && node.type !== 'product';
  const isClickable = node.type !== 'product';
  const isActive = activeChain.includes(node.id);
  const leak = node.status && node.status.leakRisk;
  const offline = node.status && node.status.offlineTicks > 0;
  const catalystHealth = (node.status && node.status.catalystHealth != null) ? node.status.catalystHealth : 100;
  const vesselCondition = (node.status && node.status.vesselCondition != null) ? node.status.vesselCondition : 100;
  const sp = process.speciesLabels;
  const allMaterials = allMaterialsFor(process);

  let borderColor = 'var(--border)';
  if (leak) borderColor = 'var(--red)';
  else if (isActive) borderColor = 'var(--copper)';

  return (
    <div
      className={`absolute node-card rounded-lg border select-none ${shaking ? 'shake' : ''} ${leak ? 'warn-pulse' : ''}`}
      style={{
        left: node.x, top: node.y, width: w, height: h,
        background: offline ? '#1A1F23' : 'var(--panel)',
        borderColor, borderWidth: selected ? 2 : 1,
        opacity: offline ? 0.65 : 1,
        zIndex: selected ? 20 : 10,
      }}
    >
      {/* header / drag handle */}
      <div
        onMouseDown={(e) => isClickable && onHeaderDown(e, node)}
        className="flex items-center justify-between px-2 py-1.5 rounded-t-lg"
        style={{ cursor: !isClickable ? 'default' : 'grab', background: 'var(--panel-2)', borderBottom: '1px solid var(--border)' }}
      >
        <div className="flex items-center gap-1.5 truncate" style={{ color: (node.type === 'feed' || node.type === 'product') ? 'var(--cyan)' : 'var(--amber)' }}>
          <NodeIcon type={node.type} />
          <span className="text-xs font-medium truncate">
            {node.type === 'feed' ? `Voeding (${sp.a}/${sp.b})` : node.type === 'product' ? 'Product' : node.type === 'separator' ? process.separatorLabel : labelForType(node.type)}
          </span>
        </div>
        {isRemovable && (
          <button onClick={() => onRemove(node.id)} className="text-xs px-1 rounded hover:bg-white/10" style={{ color: 'var(--text-dim)' }}>✕</button>
        )}
      </div>

      {/* body */}
      <div className="px-2 py-1.5 text-[11px] font-mono-data" style={{ color: 'var(--text-dim)' }}>
        {node.type === 'feed' && (
          <div>
            doorvoer: <span style={{ color: 'var(--amber)' }}>{Math.round((node.config.throughputMultiplier || 1) * 100)}%</span><br />
            {sp.a}: {Math.round(process.feedA * (node.config.throughputMultiplier || 1))} · {sp.b}: {Math.round(process.feedB * (node.config.throughputMultiplier || 1))} mol/s
          </div>
        )}
        {node.type === 'product' && <div>Verzamelt {sp.c}</div>}
        {node.type === 'reactor' && (
          <div>
            {node.config.tempC}°C · {process.volumeRange
              ? <>{(node.config.volumeM3 != null ? node.config.volumeM3 : (process.volumeConstant / node.config.pressureBar)).toFixed(1)} m³ ({node.config.pressureBar.toFixed(1)} bar)</>
              : <>{node.config.pressureBar}{process.secondDialUnit != null ? process.secondDialUnit : ' bar'}</>}<br />
            {(allMaterials.find(m => m.id === node.config.materialId) || allMaterials[0]).label.split(' + ')[1] || allMaterials[0].label}<br />
            katalysator: <span style={{ color: catalystHealth < 25 ? 'var(--red)' : catalystHealth < 60 ? 'var(--amber)' : 'var(--text-dim)' }}>{catalystHealth.toFixed(0)}%</span>
            {' · vat: '}<span style={{ color: vesselCondition < 30 ? 'var(--red)' : vesselCondition < 60 ? 'var(--amber)' : 'var(--text-dim)' }}>{vesselCondition.toFixed(0)}%</span><br />
            {offline
              ? <span style={{ color: 'var(--red)' }}>onderhoud…</span>
              : (node.status && node.status.xNet != null
                  ? <span>netto omzet: {(node.status.xNet * 100).toFixed(0)}%{node.status.isPoisoned ? ' ⚠ vergiftigd' : ''}</span>
                  : <span>klik om in te stellen</span>)}
          </div>
        )}
        {node.type === 'heatExchanger' && (
          <div>
            instelling: {Math.round(node.config.recovery * 100)}%<br />
            {node.status && node.status.effectiveRecovery != null
              ? <span>effectief: <span style={{ color: 'var(--green)' }}>{Math.round(node.status.effectiveRecovery * 100)}%</span></span>
              : <span>niet aangesloten vóór een Reactor</span>}
          </div>
        )}
        {node.type === 'separator' && (
          <div>
            opbrengst: {Math.round(node.config.efficiency * 100)}%
            {node.status && node.status.hasRecycleOut && <div style={{ color: 'var(--green)' }}>🔁 voedt retourlus</div>}
          </div>
        )}
        {node.type === 'reactor' && node.status && node.status.recycled && (
          <div style={{ color: 'var(--green)' }}>🔁 ontvangt retourgas</div>
        )}
        {leak && <div className="mt-0.5" style={{ color: 'var(--red)' }}>⚠ risico op lekkage</div>}
      </div>

      {/* poorten */}
      {PORT_DEFS[node.type].map(portDef => {
        const isRecycle = portDef.id === 'recycleIn' || portDef.id === 'recycleOut';
        const isInput = portDef.id === 'in' || portDef.id === 'recycleIn';
        const color = isInput ? 'var(--cyan)' : 'var(--copper)';
        const posStyle = portDef.side === 'left' ? { left: -7, top: h * portDef.dy - 7 } : { right: -7, top: h * portDef.dy - 7 };
        return (
          <div key={portDef.id}
               onMouseDown={(e) => onPortDown(e, node, portDef.id)}
               title={isRecycle ? (isInput ? 'Retourgas-ingang' : `Retourgas-uitgang (onomgezet ${sp.a}/${sp.b})`) : undefined}
               className="absolute rounded-full cursor-pointer"
               style={{ ...posStyle, width: 14, height: 14, background: 'var(--panel)', border: `2px ${isRecycle ? 'dashed' : 'solid'} ${color}` }} />
        );
      })}
    </div>
  );
}
function ConfigPanel({ node, onChange, onClose, onRemove, onReplaceCatalyst, onPerformMaintenance, onReplaceVessel, context }) {
  if (!node) return null;
  const process = context.process;
  const title = node.type === 'feed' ? 'Voeding instellen' : node.type === 'separator' ? `${process.separatorLabel} instellen` : `${labelForType(node.type)} instellen`;

  return (
    <div className="slide-in fixed top-0 right-0 h-full w-[320px] z-30 border-l overflow-y-auto scrollbar-thin"
         style={{ background: 'var(--panel)', borderColor: 'var(--border)', bottom: 'var(--bottompanel-h, 0)' }}>
      <div className="flex items-center justify-between px-4 py-3 border-b" style={{ borderColor: 'var(--border)' }}>
        <span className="font-medium" style={{ color: 'var(--amber)' }}>{title}</span>
        <button onClick={onClose} className="text-sm px-2 py-1 rounded hover:bg-white/10" style={{ color: 'var(--text-dim)' }}>Sluiten</button>
      </div>

      <div className="p-4 flex flex-col gap-5">
        {node.type === 'feed' && <FeedConfig node={node} onChange={onChange} process={process} />}
        {node.type === 'reactor' && <ReactorConfig node={node} onChange={onChange} onReplaceCatalyst={onReplaceCatalyst} onPerformMaintenance={onPerformMaintenance} onReplaceVessel={onReplaceVessel} context={context} />}
        {node.type === 'heatExchanger' && <HeatExchangerConfig node={node} onChange={onChange} context={context} />}
        {node.type === 'separator' && <SeparatorConfig node={node} onChange={onChange} context={context} />}

        {node.type !== 'feed' && (
          <button onClick={() => { onRemove(node.id); onClose(); }}
                  className="mt-2 text-sm rounded-md border px-3 py-2 hover:bg-red-500/10"
                  style={{ borderColor: 'var(--red)', color: 'var(--red)' }}>
            Component verwijderen
          </button>
        )}
      </div>
    </div>
  );
}

function Slider({ label, value, min, max, step, unit, onChange }) {
  return (
    <div>
      <div className="flex justify-between text-xs mb-1" style={{ color: 'var(--text-dim)' }}>
        <span>{label}</span>
        <span className="font-mono-data" style={{ color: 'var(--text)' }}>{value}{unit}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
             onChange={(e) => onChange(parseFloat(e.target.value))} className="w-full" />
    </div>
  );
}

function FeedConfig({ node, onChange, process }) {
  const mult = node.config.throughputMultiplier || 1.0;
  const sp = process.speciesLabels;
  const feedstockId = node.config.feedstockId || (process.feedstockOptions ? process.feedstockOptions[0].id : null);
  return (
    <>
      <Slider label="Doorvoersnelheid" value={Math.round(mult * 100)} min={GAME.throughputMin * 100} max={GAME.throughputMax * 100} step={5} unit="%"
              onChange={(v) => onChange(node.id, { throughputMultiplier: v / 100 })} />
      <div className="rounded-md border px-3 py-2 text-xs font-mono-data" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)', color: 'var(--text-dim)' }}>
        <div>{sp.a}: <span style={{ color: 'var(--cyan)' }}>{Math.round(process.feedA * mult).toLocaleString('nl-NL')}</span> mol/s</div>
        <div>{sp.b}: <span style={{ color: 'var(--cyan)' }}>{Math.round(process.feedB * mult).toLocaleString('nl-NL')}</span> mol/s</div>
      </div>

      {process.feedstockOptions && (
        <div>
          <div className="text-xs mb-1" style={{ color: 'var(--text-dim)' }}>Grondstofroute</div>
          <select value={feedstockId}
                  onChange={(e) => onChange(node.id, { feedstockId: e.target.value })}
                  className="w-full text-sm rounded-md border px-2 py-1.5 mb-1.5"
                  style={{ background: 'var(--panel-2)', borderColor: 'var(--border)', color: 'var(--text)' }}>
            {process.feedstockOptions.map(o => (
              <option key={o.id} value={o.id}>{o.label} — {fmtEuro(o.costPerTick)}/tick</option>
            ))}
          </select>
          {process.feedstockOptions.map(o => o.id === feedstockId && (
            <p key={o.id} className="text-[11px] leading-relaxed" style={{ color: 'var(--text-dim)' }}>
              {o.desc}{o.byproductLabel ? ` Bijproduct: ${o.byproductLabel}.` : ''}
            </p>
          ))}
        </div>
      )}

      <p className="text-[11px] leading-relaxed" style={{ color: 'var(--text-dim)' }}>
        Meer doorvoer = meer gas per tijdseenheid door dezelfde apparatuur = kortere verblijftijd
        per molecuul. Dat verlaagt de kinetiekfactor van elke Reactor (bij gelijke temperatuur) en
        de effectieve terugwinning van elke Heat Exchanger — je moet dan compenseren met een hogere
        temperatuur, wat weer energie en katalysatorlevensduur kost.
      </p>
    </>
  );
}

function ReactorConfig({ node, onChange, onReplaceCatalyst, onPerformMaintenance, onReplaceVessel, context }) {
  const throughputMultiplier = (context && context.throughputMultiplier) || 1.0;
  const unlocked = (context && context.unlocked) || {};
  const process = context.process;
  const materials = process.getMaterials(unlocked);
  const material = materials.find(m => m.id === node.config.materialId) || materials[0];
  const catalystHealth = (node.status && node.status.catalystHealth != null) ? node.status.catalystHealth : 100;
  const vesselCondition = (node.status && node.status.vesselCondition != null) ? node.status.vesselCondition : 100;
  const serviceCount = (node.status && node.status.serviceCount) || 0;
  const effectiveMaxPressure = material.maxPressure * (0.7 + 0.3 * vesselCondition / 100);
  const T_K = node.config.tempC + 273;
  const xEq = ProcessEngine.getCeiling(node.config, process);
  const kFactorFull = ProcessEngine.kineticFactor(T_K, material.catalystEfficiency, throughputMultiplier, process);
  const kFactor = kFactorFull * (catalystHealth / 100);
  const xNet = xEq * kFactor;
  const overPressure = node.config.pressureBar > effectiveMaxPressure;
  const healthColor = catalystHealth < 25 ? 'var(--red)' : catalystHealth < 60 ? 'var(--amber)' : 'var(--green)';
  const vesselColor = vesselCondition < GAME.inspectionThreshold ? 'var(--red)' : vesselCondition < 60 ? 'var(--amber)' : 'var(--green)';
  const inspectionOverdue = vesselCondition < GAME.inspectionThreshold;
  const maintenanceCost = material.catalystCost * GAME.maintenanceServiceCostFraction;
  const maintenanceRestore = GAME.maintenanceServiceRestoreBase * Math.pow(GAME.maintenanceServiceRestoreDecayFactor, serviceCount);
  const feedstockId = context.feedstockId;
  const isPoisonRisk = material.poisonedByFeedstock && material.poisonedByFeedstock === feedstockId;
  const usesVolume = !!process.volumeRange;
  const currentVolume = node.config.volumeM3 != null ? node.config.volumeM3 : (usesVolume ? volumeFromPressure(node.config.pressureBar, process) : null);

  return (
    <>
      <Slider label="Temperatuur" value={node.config.tempC} min={process.tempRange[0]} max={process.tempRange[1]} step={5} unit="°C"
              onChange={(v) => onChange(node.id, { tempC: v })} />
      {usesVolume ? (
        <>
          <Slider label="Reactorvolume" value={currentVolume} min={process.volumeRange[0]} max={process.volumeRange[1]} step={process.volumeStep} unit=" m³"
                  onChange={(v) => onChange(node.id, { volumeM3: v, pressureBar: pressureFromVolume(v, process) })} />
          <div className="rounded-md border px-3 py-1.5 -mt-3 text-xs font-mono-data" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)', color: 'var(--text-dim)' }}>
            Komt overeen met: <span style={{ color: 'var(--amber)' }}>{node.config.pressureBar.toFixed(1)} bar</span> (bij gelijke hoeveelheid deeltjes: kleiner volume → hogere druk)
          </div>
        </>
      ) : (
        <Slider label={process.secondDialLabel || 'Druk'} value={node.config.pressureBar} min={process.pressureRange[0]} max={process.pressureRange[1]} step={process.pressureStep} unit={process.secondDialUnit != null ? process.secondDialUnit : ' bar'}
                onChange={(v) => onChange(node.id, { pressureBar: v })} />
      )}

      <div>
        <div className="text-xs mb-1" style={{ color: 'var(--text-dim)' }}>Materiaal / katalysator</div>
        <select value={node.config.materialId}
                onChange={(e) => onChange(node.id, { materialId: e.target.value })}
                className="w-full text-sm rounded-md border px-2 py-1.5"
                style={{ background: 'var(--panel-2)', borderColor: 'var(--border)', color: 'var(--text)' }}>
          {materials.map(m => {
            const banned = context.gmoBanActive && m.isGMO;
            return (
              <option key={m.id} value={m.id} disabled={banned}>
                {m.label} (vat {fmtEuro(m.vesselCost)} + katalysator {fmtEuro(m.catalystCost)}{process.kineticsType !== 'fermentation' ? `, max ${m.maxPressure} bar` : ''}){banned ? ' 🚫 verboden' : ''}
              </option>
            );
          })}
        </select>
        {isPoisonRisk && (
          <p className="text-[11px] mt-1.5" style={{ color: 'var(--red)' }}>
            ⚠ Deze katalysator wordt vergiftigd door de gekozen grondstofroute — slijt {GAME.catalystPoisoningMultiplier}× zo snel.
          </p>
        )}
        {context.gmoBanActive && (
          <p className="text-[11px] mt-1.5" style={{ color: 'var(--red)' }}>
            🚫 GMO-giststammen zijn wettelijk verboden — alleen biologische tiers zijn nog te kiezen.
          </p>
        )}
        {!context.gmoBanActive && context.gmoBanAnnounced && (
          <p className="text-[11px] mt-1.5" style={{ color: 'var(--amber)' }}>
            ⚠ GMO-verbod aangekondigd in jaar {context.gmoBanAnnouncedYear} — plan tijdig een overstap naar een biologische stam.
          </p>
        )}
        {process.organicBonus && !material.isGMO && (
          <p className="text-[11px] mt-1.5" style={{ color: 'var(--green)' }}>
            ✓ Biologisch — telt mee voor de meerprijs (+{Math.round(process.organicBonus * 100)}%), zolang er nergens in de lijn een GMO-stam wordt gebruikt.
          </p>
        )}
        {process.organicBonus && material.isGMO && (
          <p className="text-[11px] mt-1.5" style={{ color: 'var(--text-dim)' }}>
            Dit is een GMO-stam — geen recht op de biologisch-meerprijs, en gevoelig voor een eventueel toekomstig verbod.
          </p>
        )}
      </div>

      <div className="rounded-md border px-3 py-2" style={{ borderColor: 'var(--border)', background: 'var(--panel-2)' }}>
        <div className="flex justify-between text-xs mb-1.5">
          <span style={{ color: 'var(--text-dim)' }}>Katalysatorgezondheid</span>
          <span className="font-mono-data" style={{ color: healthColor }}>{catalystHealth.toFixed(0)}%</span>
        </div>
        <div className="w-full h-1.5 rounded-full overflow-hidden mb-2" style={{ background: '#233038' }}>
          <div style={{ width: `${catalystHealth}%`, height: '100%', background: healthColor, transition: 'width 0.4s ease' }} />
        </div>
        <button onClick={() => onReplaceCatalyst(node.id)}
                className="w-full text-xs rounded-md border px-2 py-1.5 hover:bg-white/5"
                style={{ borderColor: 'var(--border)', color: 'var(--amber)' }}>
          Vervang katalysator — {fmtEuro(material.catalystCost)}
        </button>
        <p className="text-[10px] mt-1.5 leading-relaxed" style={{ color: 'var(--text-dim)' }}>
          Slijt geleidelijk, sneller boven ~350°C (sintering)
          {material.decayMult < 1 ? ' — dit materiaal slijt door onderzoek half zo snel.' : '.'}
        </p>
      </div>

      <div className="rounded-md border px-3 py-2" style={{ borderColor: inspectionOverdue ? 'var(--red)' : 'var(--border)', background: 'var(--panel-2)' }}>
        <div className="flex justify-between text-xs mb-1.5">
          <span style={{ color: 'var(--text-dim)' }}>Vatstaat</span>
          <span className="font-mono-data" style={{ color: vesselColor }}>{vesselCondition.toFixed(0)}%</span>
        </div>
        <div className="w-full h-1.5 rounded-full overflow-hidden mb-2" style={{ background: '#233038' }}>
          <div style={{ width: `${vesselCondition}%`, height: '100%', background: vesselColor, transition: 'width 0.4s ease' }} />
        </div>
        <div className="text-[10px] font-mono-data mb-2" style={{ color: 'var(--text-dim)' }}>
          Effectieve druklimiet: <span style={{ color: 'var(--text)' }}>{effectiveMaxPressure.toFixed(1)} bar</span> (nominaal {material.maxPressure} bar)
        </div>
        {inspectionOverdue && (
          <div className="rounded-md px-2 py-1.5 mb-2 text-[11px] warn-pulse" style={{ background: 'rgba(229,72,77,0.12)', color: 'var(--red)' }}>
            ⚠ Inspectie vereist: onder {GAME.inspectionThreshold}% bouwt lekkage-stress {GAME.inspectionLeakStressMultiplier}× zo snel op. Onderhoud of vervang het vat.
          </div>
        )}
        <div className="flex flex-col gap-1.5">
          <button onClick={() => onPerformMaintenance(node.id)}
                  className="w-full text-xs rounded-md border px-2 py-1.5 hover:bg-white/5"
                  style={{ borderColor: 'var(--border)', color: 'var(--amber)' }}>
            Onderhoudsbeurt (+{maintenanceRestore.toFixed(0)}pt) — {fmtEuro(maintenanceCost)}
          </button>
          <button onClick={() => onReplaceVessel(node.id)}
                  className="w-full text-xs rounded-md border px-2 py-1.5 hover:bg-white/5"
                  style={{ borderColor: 'var(--green)', color: 'var(--green)' }}>
            Vervang vat (volledig herstel) — {fmtEuro(material.vesselCost)}
          </button>
        </div>
        <p className="text-[10px] mt-1.5 leading-relaxed" style={{ color: 'var(--text-dim)' }}>
          Slijt sneller boven ~50% van de nominale druklimiet. Elke onderhoudsbeurt herstelt minder
          dan de vorige en versnelt daarna de slijtage — alleen vervanging zet dat terug naar nul.
        </p>
      </div>

      {overPressure && (
        <div className="rounded-md border px-3 py-2 text-xs warn-pulse" style={{ borderColor: 'var(--red)', color: 'var(--red)', background: 'rgba(229,72,77,0.08)' }}>
          ⚠ Druk ({node.config.pressureBar} bar) overschrijdt de effectieve grens van dit vat ({effectiveMaxPressure.toFixed(1)} bar) — risico op lekkage bij aanhoudend gebruik.
        </div>
      )}

      <div className="rounded-md border px-3 py-2 text-xs font-mono-data flex flex-col gap-1"
           style={{ borderColor: 'var(--border)', background: 'var(--panel-2)', color: 'var(--text-dim)' }}>
        <div className="text-[10px] uppercase tracking-wide mb-0.5" style={{ color: 'var(--text)' }}>Live berekening (bij {Math.round(throughputMultiplier * 100)}% doorvoer)</div>
        <div>{process.kineticsType === 'fermentation' ? 'Haalbaar maximum (gistgezondheid × pH)' : 'Evenwichtsconversie (Kp, Le Chatelier)'}: <span style={{ color: 'var(--cyan)' }}>{(xEq * 100).toFixed(1)}%</span></div>
        <div>Kinetiekfactor (Arrhenius, incl. doorvoer): <span style={{ color: 'var(--amber)' }}>{(kFactor * 100).toFixed(1)}%</span></div>
        <div>Netto omzet: <span style={{ color: 'var(--green)' }}>{(xNet * 100).toFixed(1)}%</span></div>
      </div>
      <p className="text-[11px] leading-relaxed" style={{ color: 'var(--text-dim)' }}>
        {process.kineticsType === 'fermentation'
          ? `Hogere temperatuur versnelt de gisting (Arrhenius), maar boven ~${process.Tcrit}°C sterven de micro-organismen versneld af — een scherpe klokkromme, geen geleidelijk evenwicht. pH werkt via dezelfde soort curve: te zuur of te basisch remt de gist. Bij hogere doorvoer is de verblijftijd korter, dus moet je met temperatuur/pH compenseren om dezelfde kinetiekfactor te houden.`
          : `Hogere temperatuur versnelt de reactie (Arrhenius) maar verlaagt de evenwichtsopbrengst (exotherme reactie, Le Chatelier). Bij hogere doorvoer (zie Voeding) is de verblijftijd korter en moet je met temperatuur compenseren om dezelfde kinetiekfactor te houden.`}
      </p>
    </>
  );
}

function HeatExchangerConfig({ node, onChange, context }) {
  const throughputMultiplier = (context && context.throughputMultiplier) || 1.0;
  const energySource = (context && context.energySource) || 'grijs';
  const market = (context && context.market);
  const unlocked = (context && context.unlocked) || {};
  const connectedReactor = context && context.connectedReactor;
  const process = context.process;
  const maxRecovery = unlocked.efficientHX ? 0.97 : GAME.heatExchangerMaxRecovery;
  const throughputExp = unlocked.efficientHX ? 0.7 : 1.0;
  const effectiveRecovery = Math.min(maxRecovery, node.config.recovery / Math.pow(throughputMultiplier, throughputExp));
  const energyPrice = market ? (energySource === 'grijs' ? market.energyPriceGrijs : market.energyPriceGroen) : GAME.energyPriceBase[energySource];
  const selfEnergy = GAME.heatExchangerSelfEnergyK * Math.pow(node.config.recovery, 3);
  const selfCostEuro = selfEnergy * energyPrice;

  let savings = null;
  if (connectedReactor) {
    const T_K = connectedReactor.config.tempC + 273;
    const heatWithout = process.heatK * Math.max(0, T_K - 298);
    const heatWith = heatWithout * (1 - effectiveRecovery);
    const energySaved = heatWithout - heatWith;
    savings = { energy: energySaved, euro: energySaved * energyPrice, co2: energySaved * GAME.co2Factor[energySource] };
  }

  return (
    <>
      <Slider label="Warmteterugwinning (instelling)" value={Math.round(node.config.recovery * 100)} min={0} max={80} step={5} unit="%"
              onChange={(v) => onChange(node.id, { recovery: v / 100 })} />

      <div className="rounded-md border px-3 py-2 text-xs font-mono-data flex flex-col gap-1"
           style={{ borderColor: 'var(--border)', background: 'var(--panel-2)', color: 'var(--text-dim)' }}>
        <div className="text-[10px] uppercase tracking-wide mb-0.5" style={{ color: 'var(--text)' }}>Live berekening</div>
        <div>Effectieve terugwinning (bij {Math.round(throughputMultiplier * 100)}% doorvoer, plafond {Math.round(maxRecovery * 100)}%): <span style={{ color: 'var(--amber)' }}>{Math.round(effectiveRecovery * 100)}%</span></div>
        <div className="mt-1 pt-1 border-t" style={{ borderColor: 'var(--border)' }}>Eigen energieverbruik van de wisselaar (loopt kubisch op met de instelling):</div>
        <div>· <span style={{ color: 'var(--red)' }}>{selfEnergy.toFixed(0)} energie-eenheden/tick</span></div>
        {connectedReactor ? (
          <>
            <div className="mt-1 pt-1 border-t" style={{ borderColor: 'var(--border)' }}>Bespaarde verwarmingsenergie van "{labelForType(connectedReactor.type)}" ({connectedReactor.config.tempC}°C):</div>
            <div>· <span style={{ color: 'var(--green)' }}>{savings.energy.toFixed(0)} energie-eenheden/tick</span></div>
          </>
        ) : (
          <div className="mt-1 pt-1 border-t" style={{ borderColor: 'var(--red)', color: 'var(--red)' }}>⚠ Niet direct vóór een Reactor aangesloten — heeft nu geen besparing, wél eigen verbruik.</div>
        )}
      </div>

      <p className="text-[11px] leading-relaxed" style={{ color: 'var(--text-dim)' }}>
        Voorverwarmt de voedingsstroom met restwarmte uit het proces, vlak vóór een Reactor. De
        effectieve terugwinning erodeert bij hogere doorvoer (minder contacttijd). Een hogere
        instelling vraagt een grotere/efficiëntere unit met meer eigen energieverbruik (drukverlies).
        Vergelijk zelf de twee energiegetallen hierboven om te bepalen of een instelling de moeite waard is.
      </p>
    </>
  );
}

function SeparatorConfig({ node, onChange, context }) {
  const unlocked = (context && context.unlocked) || {};
  const market = context && context.market;
  const process = context.process;
  const productPrice = market ? market.productPrice : process.productPriceBase;
  const eff = node.config.efficiency;
  const knee = unlocked.membraneSep ? process.separatorKnee.upgraded : process.separatorKnee.base;
  const kLoss = unlocked.membraneSep ? process.separatorKLoss.upgraded : process.separatorKLoss.base;
  const recoveryFraction = eff <= knee ? 1 : Math.max(0.02, 1 - kLoss * Math.pow(eff - knee, 2));
  const priceFactor = purityPriceFactor(eff, unlocked);
  const maxEff = unlocked.membraneSep ? 99.5 : (process.hardSeparationLimit || 99);

  return (
    <>
      <Slider label={`${process.separatorAction === 'absorberen' ? 'Absorptie-efficiëntie' : 'Scheidingsefficiëntie'} (zuiverheid)`} value={Math.round(eff * 1000) / 10} min={70} max={maxEff} step={0.5} unit="%"
              onChange={(v) => onChange(node.id, { efficiency: v / 100 })} />

      <div className="rounded-md border px-3 py-2 text-xs font-mono-data flex flex-col gap-1"
           style={{ borderColor: 'var(--border)', background: 'var(--panel-2)', color: 'var(--text-dim)' }}>
        <div className="text-[10px] uppercase tracking-wide mb-0.5" style={{ color: 'var(--text)' }}>Live berekening</div>
        <div>Opbrengst (aandeel {process.speciesLabels.c} dat behouden blijft): <span style={{ color: 'var(--amber)' }}>{(recoveryFraction * 100).toFixed(0)}%</span></div>
        <div>Prijsfactor t.o.v. huidige marktprijs ({fmtEuro(productPrice)}/kg): <span style={{ color: priceFactor >= 1 ? 'var(--green)' : 'var(--red)' }}>{priceFactor.toFixed(2)}×</span></div>
        <div>Effectieve verkoopprijs: <span style={{ color: 'var(--green)' }}>{fmtEuro(productPrice * priceFactor)}/kg</span></div>
      </div>

      <p className="text-[11px] leading-relaxed" style={{ color: 'var(--text-dim)' }}>
        {process.kineticsType === 'fermentation' && !unlocked.membraneSep
          ? `Gewone destillatie loopt vast op het ethanol-water-azeotroop: bij ${process.hardSeparationLimit || 96}% zuiverheid is een hogere instelling natuurkundig onmogelijk zonder een ander scheidingsprincipe — vandaar de harde grens op de schuifregelaar. Extractieve destillatie (met een entrainer) doorbreekt dat plafond.`
          : `Tot ongeveer ${Math.round(knee * 100)}% kost hogere zuiverheid nauwelijks opbrengst, en stijgt de prijs wel door — daarna stort de opbrengst parabolisch in en wint de prijsstijging dat niet meer terug. Het omslagpunt ligt rond de ${Math.round(knee * 100)}-97%.${unlocked.membraneSep ? ' Met de upgrade ligt die knik hoger en is de val zachter.' : ''}`}
      </p>
    </>
  );
}
