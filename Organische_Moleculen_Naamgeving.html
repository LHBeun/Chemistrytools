  function substFingerprint(node) {
    var sc = node.substCounts || {};
    return Object.keys(sc).sort().map(function(k){ return k + ":" + sc[k]; }).join(";");
  }
  function chainsEquivalent(builtChain, targetChain) {
    function fingerprint(chain) { return chain.map(function(n){ return [substFingerprint(n), n.bondAfter, n.branchUp || 0, n.branchDown || 0].join(","); }); }
    function fingerprintReversed(chain) {
      var rev = chain.slice().reverse(); var n = chain.length;
      return rev.map(function(node, i){
        var origIdx = n - 1 - i;
        var bondAfterRev = (origIdx > 0) ? chain[origIdx - 1].bondAfter : "single";
        return [substFingerprint(node), bondAfterRev, node.branchDown || 0, node.branchUp || 0].join(",");
      });
    }
    if (builtChain.length !== targetChain.length) return false;
    var bf = fingerprint(builtChain), tf = fingerprint(targetChain), tfRev = fingerprintReversed(targetChain);
    function arraysEqualLoose(a, b) {
      if (a.length !== b.length) return false;
      for (var i = 0; i < a.length; i++) {
        var pa = a[i].split(","), pb = b[i].split(",");
        if (pa[0] !== pb[0] || pa[1] !== pb[1]) return false;
        var bA = [pa[2], pa[3]].sort(), bB = [pb[2], pb[3]].sort();
        if (bA[0] !== bB[0] || bA[1] !== bB[1]) return false;
      }
      return true;
    }
    return arraysEqualLoose(bf, tf) || arraysEqualLoose(bf, tfRev);
  }
  function ringsEquivalent(builtChain, targetChain) {
    if (builtChain.length !== targetChain.length) return false;
    var n = builtChain.length;
    function fingerprintAt(chain, start, dir) {
      var fp = [];
      for (var i = 0; i < n; i++) {
        var srcIdx = ((start + dir * i) % n + n) % n;
        var node = chain[srcIdx];
        var bondAfterInThisDir = (dir === 1) ? node.bondAfter : chain[(srcIdx - 1 + n) % n].bondAfter;
        fp.push([substFingerprint(node), bondAfterInThisDir, node.branchUp || 0, node.branchDown || 0].join(","));
      }
      return fp;
    }
    function arraysEqualLoose(a, b) {
      if (a.length !== b.length) return false;
      for (var i = 0; i < a.length; i++) {
        var pa = a[i].split(","), pb = b[i].split(",");
        if (pa[0] !== pb[0] || pa[1] !== pb[1]) return false;
        var bA = [pa[2], pa[3]].sort(), bB = [pb[2], pb[3]].sort();
        if (bA[0] !== bB[0] || bA[1] !== bB[1]) return false;
      }
      return true;
    }
    var builtFp = fingerprintAt(builtChain, 0, 1);
    for (var start = 0; start < n; start++) {
      if (arraysEqualLoose(builtFp, fingerprintAt(targetChain, start, 1))) return true;
      if (arraysEqualLoose(builtFp, fingerprintAt(targetChain, start, -1))) return true;
    }
    return false;
  }
  function benzeneSubstFingerprint(node) {
    var sc = node.substCounts || {};
    return [Object.keys(sc).sort().map(function(k){ return k + ":" + sc[k]; }).join(";"), node.branchUp || 0, node.branchDown || 0].join(",");
  }
  function benzeneRingsEquivalent(builtChain, targetChain) {
    if (builtChain.length !== 6 || targetChain.length !== 6) return false;
    var n = 6;
    function fingerprintAt(chain, start, dir) {
      var fp = [];
      for (var i = 0; i < n; i++) fp.push(benzeneSubstFingerprint(chain[((start + dir * i) % n + n) % n]));
      return fp;
    }
    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (var i = 0; i < a.length; i++) {
        var pa = a[i].split(","), pb = b[i].split(",");
        if (pa[0] !== pb[0]) return false;
        var bA = [pa[1], pa[2]].sort(), bB = [pb[1], pb[2]].sort();
        if (bA[0] !== bB[0] || bA[1] !== bB[1]) return false;
      }
      return true;
    }
    var builtFp = fingerprintAt(builtChain, 0, 1);
    for (var start = 0; start < n; start++) {
      if (arraysEqual(builtFp, fingerprintAt(targetChain, start, 1))) return true;
      if (arraysEqual(builtFp, fingerprintAt(targetChain, start, -1))) return true;
    }
    return false;
  }
  // ---------- Built-chain -> two-chain interpretation, for checking ester/ether answers ----------
  // Finds the single "ether" bond in a built straight chain, splits the chain there, and reports
  // whether the carbon just before the split also carries a KETO group (which makes it an ester's
  // carbonyl carbon) or not (a plain ether oxygen). Returns null if the built chain doesn't have
  // exactly one ether-bond split, since that's the only shape these two classes support here.
  function interpretBuiltTwoChain(builtChain) {
    var splitIdx = -1;
    for (var i = 0; i < builtChain.length; i++) {
      if (builtChain[i].bondAfter === "ether") {
        if (splitIdx !== -1) return null; // more than one ether-bond: not a valid ester/ether shape
        splitIdx = i;
      }
    }
    if (splitIdx === -1) return null; // no ether-bond at all
    var leftChain = builtChain.slice(0, splitIdx + 1);
    var rightChain = builtChain.slice(splitIdx + 1);
    if (leftChain.length === 0 || rightChain.length === 0) return null;

    // The carbonyl carbon (for an ester) can be on EITHER side of the split: the schakel right
    // before the -O- (left side's last carbon) OR the schakel right after it (right side's first
    // carbon) -- since the person may have built the acid side on either side of the ether bond.
    var leftCandidate = leftChain[leftChain.length - 1];
    var rightCandidate = rightChain[0];
    var leftHasKeto = !!(leftCandidate.substCounts && leftCandidate.substCounts.KETO);
    var rightHasKeto = !!(rightCandidate.substCounts && rightCandidate.substCounts.KETO);
    if (leftHasKeto && rightHasKeto) return null; // ambiguous/invalid: both sides claim to be the acid

    var isEster = leftHasKeto || rightHasKeto;
    var carbonylNode = leftHasKeto ? leftCandidate : (rightHasKeto ? rightCandidate : null);
    // If the acid side turns out to be the RIGHT chain, swap so "leftChain"/"rightChain" below
    // consistently mean "acid side" / "alcohol side" for an ester, keeping the rest of the logic simple.
    if (rightHasKeto) {
      var tmpChain = leftChain; leftChain = rightChain; rightChain = tmpChain;
    }

    // For the comparison, the only thing that matters per side is its plain carbon-chain length
    // and (for ether's long side) any OH/halogen/branch substituent elsewhere on that side. Any
    // OTHER substituent/branch present anywhere in the built chain makes this an invalid match
    // for ester (which allows none) or makes it not match the agreed ether scope if found on the
    // short side.
    function hasAnyExtraFeature(chainPart, excludeNode) {
      for (var j = 0; j < chainPart.length; j++) {
        var node = chainPart[j];
        if (node === excludeNode) continue; // the carbonyl's own KETO doesn't count as an "extra" feature
        if (node.branchUp || node.branchDown) return true;
        var sc = node.substCounts || {};
        var keys = Object.keys(sc).filter(function(k){ return !(node === excludeNode && k === "KETO"); });
        if (keys.length > 0) return true;
      }
      return false;
    }

    if (isEster) {
      // Esters: no substituents allowed anywhere except the carbonyl's own KETO.
      if (hasAnyExtraFeature(leftChain, carbonylNode)) return null;
      if (hasAnyExtraFeature(rightChain, null)) return null;
      return { kind: "ester", acidLen: leftChain.length, alcLen: rightChain.length };
    } else {
      // Ether: neither side should have KETO (that would make it look like an ester without the
      // bond actually being recognized as one in our simple model). Determine short/long sides and
      // check for a single allowed substituent (OH/halogen/branch) on the LONG side only.
      if (carbonylNode.substCounts && carbonylNode.substCounts.KETO) return null;
      var shortChain = leftChain.length <= rightChain.length ? leftChain : rightChain;
      var longChain = leftChain.length <= rightChain.length ? rightChain : leftChain;
      if (hasAnyExtraFeature(shortChain, null)) return null;

      var foundSubst = null;
      for (var k = 0; k < longChain.length; k++) {
        var ln = longChain[k];
        if (ln.branchUp || ln.branchDown) {
          if (foundSubst) return null; // more than one feature found -> doesn't match the agreed scope
          foundSubst = { kind: "branch", len: ln.branchUp || ln.branchDown, pos: k };
        }
        var lsc = ln.substCounts || {};
        var lkeys = Object.keys(lsc);
        if (lkeys.length > 0) {
          if (foundSubst) return null;
          if (lkeys.length > 1 || lsc[lkeys[0]] > 1) return null; // only a single, single-count substituent allowed
          var t = lkeys[0];
          if (t === "OH") foundSubst = { kind: "OH", pos: k };
          else if (HALOGENS.some(function(h){ return h.key === t; })) foundSubst = { kind: "halogen", hal: t, pos: k };
          else return null; // NH2/COOH/KETO etc. are outside the agreed ether scope
        }
      }
      return { kind: "ether", shortLen: shortChain.length, longLen: longChain.length, longSubst: foundSubst };
    }
  }

  function twoChainEquivalent(builtChain, targetMol) {
    var interpreted = interpretBuiltTwoChain(builtChain);
    if (!interpreted) return false;
    if (interpreted.kind !== targetMol.kind) return false;

    if (targetMol.kind === "ester") {
      return interpreted.acidLen === targetMol.acidLen && interpreted.alcLen === targetMol.alcLen;
    } else {
      if (interpreted.shortLen !== targetMol.shortLen || interpreted.longLen !== targetMol.longLen) return false;
      var a = interpreted.longSubst, b = targetMol.longSubst;
      if (!a && !b) return true;
      if (!a || !b) return false;
      if (a.pos !== b.pos) return false;
      if (a.kind !== b.kind) return false;
      if (a.kind === "halogen" && a.hal !== b.hal) return false;
      if (a.kind === "branch" && a.len !== b.len) return false;
      return true;
    }
  }

  function checkBuilderAnswer() {
    var built = state.builder.chain;
    var target = state.question.mol.chain;
    var targetMol = state.question.mol;
    var isBenzeneQuestion = !!targetMol.isBenzene;
    var isRingQuestion = !!targetMol.isRing;
    var isTwoChainQuestion = !!targetMol.isTwoChain;
    var correct;
    if (isTwoChainQuestion) {
      correct = !state.builder.isRing && twoChainEquivalent(built, targetMol);
    } else if (isBenzeneQuestion) {
      correct = !!state.builder.isBenzene && benzeneRingsEquivalent(built, target);
    } else if (isRingQuestion) {
      correct = !!state.builder.isRing && !state.builder.isBenzene && ringsEquivalent(built, target);
    } else {
      correct = !state.builder.isRing && chainsEquivalent(built, target);
    }
    var hasInvalidBranch = false;
    if (!isRingQuestion && !isBenzeneQuestion && !isTwoChainQuestion) {
      for (var i = 0; i < built.length; i++) {
        var node = built[i];
        if (node.branchUp && !isValidBranchPlacement(built.length, i, node.branchUp)) hasInvalidBranch = true;
        if (node.branchDown && !isValidBranchPlacement(built.length, i, node.branchDown)) hasInvalidBranch = true;
      }
    }
    state.checked = true; state.isCorrect = correct; state.builderLongerChainWarning = hasInvalidBranch;
    state.score.total++; if (correct) state.score.correct++;
    render();
  }

  function bindEvents() {
    var app = document.getElementById("app");
    var answerInput = document.getElementById("answer-input");
    if (answerInput) {
      answerInput.addEventListener("input", function(){ state.userAnswer = answerInput.value; });
      answerInput.addEventListener("keydown", function(e){ if (e.key === "Enter" && !state.checked) checkNameAnswer(); else if (e.key === "Enter" && state.checked) nextQuestion(); });
      if (!state.checked) answerInput.focus();
    }
    var ownNameInput = document.getElementById("own-name-input");
    if (ownNameInput) {
      ownNameInput.addEventListener("input", function(){ state.ownNameInput = ownNameInput.value; });
      ownNameInput.addEventListener("keydown", function(e){ if (e.key === "Enter") { var btn = document.querySelector('[data-act="parse-own-name"]'); if (btn) btn.click(); } });
      ownNameInput.focus();
    }
    var minSel = document.getElementById("min-length");
    var maxSel = document.getElementById("max-length");
    if (minSel) minSel.addEventListener("change", function(){ state.settings.minLength = parseInt(minSel.value, 10); if (state.settings.minLength > state.settings.maxLength) state.settings.maxLength = state.settings.minLength; render(); });
    if (maxSel) maxSel.addEventListener("change", function(){ state.settings.maxLength = parseInt(maxSel.value, 10); if (state.settings.maxLength < state.settings.minLength) state.settings.minLength = state.settings.maxLength; render(); });
    var minFeatSel = document.getElementById("min-features");
    var maxFeatSel = document.getElementById("max-features");
    if (minFeatSel) minFeatSel.addEventListener("change", function(){ state.settings.minFeatures = parseInt(minFeatSel.value, 10); if (state.settings.minFeatures > state.settings.maxFeatures) state.settings.maxFeatures = state.settings.minFeatures; render(); });
    if (maxFeatSel) maxFeatSel.addEventListener("change", function(){ state.settings.maxFeatures = parseInt(maxFeatSel.value, 10); if (state.settings.maxFeatures < state.settings.minFeatures) state.settings.minFeatures = state.settings.maxFeatures; render(); });
    app.querySelectorAll("[data-class]").forEach(function(cb){ cb.addEventListener("change", function(){ state.settings.classes[cb.getAttribute("data-class")] = cb.checked; render(); }); });

    if (!app.__delegatedClick) {
      app.__delegatedClick = function(e){
        var actEl = e.target.closest("[data-act]");
        if (!actEl) return;
        var act = actEl.getAttribute("data-act");
        var b = state.builder;
        switch (act) {
          case "pick-mode":
            state.mode = actEl.getAttribute("data-mode");
            if (state.mode === "own-name-to-struct") { state.view = "practice"; state.question = null; state.ownNameInput = ""; state.ownNameError = null; state.checked = false; }
            else state.view = "settings";
            render();
            break;
          case "back-home": state.view = "home"; render(); break;
          case "start-practice": startPractice(); break;
          case "check-answer": checkNameAnswer(); break;
          case "next-question": nextQuestion(); break;
          case "select-unit": b.selectedUnitId = actEl.getAttribute("data-unit-id"); render(); break;
          case "set-builder-mode": {
            var ringMode = actEl.getAttribute("data-ringmode");
            if (ringMode === "2") {
              var bc = blankChain(6);
              bc.forEach(function(nd, bi3){ nd.isRingNode = true; nd.isBenzeneNode = true; nd.bondAfter = (bi3 % 2 === 0) ? "double" : "single"; });
              state.builder = { chain: bc, selectedUnitId: bc[0].id, isRing: true, isBenzene: true };
            } else if (ringMode === "1") {
              var rc = blankChain(3);
              rc.forEach(function(nd){ nd.isRingNode = true; });
              state.builder = { chain: rc, selectedUnitId: rc[0].id, isRing: true, isBenzene: false };
            } else state.builder = { chain: [], selectedUnitId: null, isRing: false, isBenzene: false };
            render();
            break;
          }
          case "set-ring-size": {
            var ns = parseInt(actEl.getAttribute("data-size"), 10);
            var nrc = blankChain(ns);
            nrc.forEach(function(nd){ nd.isRingNode = true; });
            state.builder = { chain: nrc, selectedUnitId: nrc[0].id, isRing: true, isBenzene: false };
            render();
            break;
          }
          case "add-carbon": {
            var newNode = { id: uid(), substCounts: {}, bondAfter: "single", branchUp: null, branchDown: null };
            b.chain.push(newNode); b.selectedUnitId = newNode.id; render();
            break;
          }
          case "remove-last-carbon": {
            if (b.chain.length > 0) {
              var removed = b.chain.pop();
              if (b.selectedUnitId === removed.id) b.selectedUnitId = b.chain.length ? b.chain[b.chain.length-1].id : null;
              render();
            }
            break;
          }
          case "set-bond": {
            var node1 = b.chain.filter(function(x){ return x.id === b.selectedUnitId; })[0];
            if (node1) { node1.bondAfter = actEl.getAttribute("data-bond"); render(); }
            break;
          }
          case "add-branch": {
            var node2 = b.chain.filter(function(x){ return x.id === b.selectedUnitId; })[0];
            if (node2) {
              var side = actEl.getAttribute("data-side");
              var field = side === "up" ? "branchUp" : "branchDown";
              var idxNode2 = b.chain.indexOf(node2);
              var maxH2 = maxHOnNode(b.chain, idxNode2);
              var alreadyHasThisBranch = !!node2[field];
              var otherBranchUsage = (field === "branchUp" ? (node2.branchDown ? 1 : 0) : (node2.branchUp ? 1 : 0));
              var availableForThisBranch = isCompletedAldehydeCarbon(b.chain, idxNode2) ? 0 : (maxH2 - otherBranchUsage - usedSubstCount(node2));
              if (alreadyHasThisBranch) { node2[field] = (node2[field] >= 2) ? 1 : node2[field] + 1; render(); }
              else if (availableForThisBranch > 0) { node2[field] = 1; render(); }
            }
            break;
          }
          case "set-subst": {
            var node3 = b.chain.filter(function(x){ return x.id === b.selectedUnitId; })[0];
            if (node3) {
              var val = actEl.getAttribute("data-subst");
              var idxNode = b.chain.indexOf(node3);
              var maxH = maxHOnNode(b.chain, idxNode);
              var availableSlots = isCompletedAldehydeCarbon(b.chain, idxNode) ? 0 : (maxH - branchUsage(node3) - usedSubstCount(node3));
              if (availableSlots > 0) { if (!node3.substCounts) node3.substCounts = {}; node3.substCounts[val] = (node3.substCounts[val] || 0) + 1; }
              render();
            }
            break;
          }
          case "set-bond-after": {
            var idxSel = b.chain.map(function(x){ return x.id; }).indexOf(b.selectedUnitId);
            if (idxSel > -1 && idxSel < b.chain.length - 1) {
              b.chain[idxSel].bondAfter = actEl.getAttribute("data-bond");
              render();
            }
            break;
          }
          case "clear-branches": {
            var node5 = b.chain.filter(function(x){ return x.id === b.selectedUnitId; })[0];
            if (node5) { node5.branchUp = null; node5.branchDown = null; render(); }
            break;
          }
          case "clear-subst": {
            var node4 = b.chain.filter(function(x){ return x.id === b.selectedUnitId; })[0];
            if (node4) { node4.substCounts = {}; render(); }
            break;
          }
          case "check-builder": checkBuilderAnswer(); break;
          case "parse-own-name": {
            var ownInputEl = document.getElementById("own-name-input");
            var rawName = ownInputEl ? ownInputEl.value : state.ownNameInput;
            var result = parseOrganicName(rawName);
            if (result.error) { state.ownNameError = result.error; render(); }
            else {
              state.ownNameError = null;
              var canonicalName = nameMolecule(result.mol);
              state.question = { mol: result.mol, correctName: canonicalName };
              state.builder = { chain: [], selectedUnitId: null, isRing: false };
              state.checked = false; state.isCorrect = false;
              render();
            }
            break;
          }
          case "own-name-again": { state.question = null; state.ownNameInput = ""; state.ownNameError = null; state.checked = false; render(); break; }
        }
      };
      app.addEventListener("click", app.__delegatedClick);
    }
  }

  render();
  if (!window.__resizeHandlerSet) {
    window.__resizeHandlerSet = true;
    window.addEventListener("resize", function(){ fitChainToContainer(); });
  }
})();
</script>
