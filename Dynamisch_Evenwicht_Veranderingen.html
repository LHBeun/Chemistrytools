<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evenwichten ‚Äď Snelheidsredeneren</title>
<style>
:root {
  --bg: #fafafa; --surface: #ffffff; --text: #1a1a1a; --text-sec: #666;
  --border: #e0e0e0; --hover: #f0f0f0; --danger: #dc2626; --positive: #16a34a;
  --font: system-ui, -apple-system, sans-serif; --font-mono: ui-monospace, SFMono-Regular, monospace;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #0a0a0a; --surface: #1a1a1a; --text: #f0f0f0; --text-sec: #999; --border: #333; --hover: #222; }
}
* { box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.tool { max-width: 800px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 4px; }
.subtitle { color: var(--text-sec); font-size: 13px; margin-bottom: 20px; }
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab { padding: 8px 16px; cursor: pointer; border: none; background: none; color: var(--text-sec); font-size: 14px; border-bottom: 2px solid transparent; font-family: var(--font); }
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }
.panel { display: none; }
.panel.active { display: block; }
.section { margin-bottom: 20px; }
.label { font-size: 12px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 10px; font-family: var(--font); font-size: 14px; background: var(--surface); color: var(--text); }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; font-family: var(--font); }
.btn:hover { background: var(--hover); }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.card { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); }
.correct { border-color: var(--positive); background: rgba(22,163,74,0.06); }
.wrong { border-color: var(--danger); background: rgba(220,38,38,0.06); }
.expl { padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); margin-top: 12px; font-size: 13px; line-height: 1.6; }
.score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.eq-box { font-family: var(--font-mono); padding: 12px; border-radius: 10px; border: 1px solid var(--border); text-align: center; margin-bottom: 16px; font-size: 15px; }
@media (max-width: 600px) { .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="tool">
  <h1>Evenwichten ‚Äď Snelheidsredeneren</h1>
  <div class="subtitle">Directe effecten op reactiesnelheden (t = 0+)</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('practice')">Oefenen</button>
    <button class="tab" onclick="switchTab('quiz')">Quiz</button>
  </div>

  <div id="panel-practice" class="panel active">
    <div class="section">
      <div class="label">Reactie</div>
      <select id="prac-reaction" onchange="onReactionChange()">
        <option value="">-- Selecteer --</option>
        <option value="no2">2NO‚āā(g) ‚áĆ N‚āāO‚āĄ(g)  őĒH &lt; 0</option>
        <option value="hi">H‚āā(g) + I‚āā(g) ‚áĆ 2HI(g)  őĒH &lt; 0</option>
        <option value="fescn">Fe¬≥‚Āļ(aq) + SCN‚ĀĽ(aq) ‚áĆ FeSCN¬≤‚Āļ(aq)  őĒH &lt; 0</option>
        <option value="brcl">2Br‚ĀĽ(aq) + Cl‚āā(aq) ‚áĆ Br‚āā(aq) + 2Cl‚ĀĽ(aq)  őĒH &lt; 0</option>
        <option value="agcl">AgCl(s) ‚áĆ Ag‚Āļ(aq) + Cl‚ĀĽ(aq)  őĒH &gt; 0</option>
        <option value="acetic">CH‚āÉCOOH(aq) + H‚āāO(l) ‚áĆ CH‚āÉCOO‚ĀĽ(aq) + H‚āÉO‚Āļ(aq)  őĒH &gt; 0</option>
      </select>
    </div>

    <div id="step-change" class="section" style="display:none;">
      <div class="label">Verandering</div>
      <select id="prac-change" onchange="onChangeChange()">
        <option value="">-- Selecteer --</option>
        <option value="add">Stof toevoegen</option>
        <option value="remove">Stof verwijderen</option>
        <option value="volume_decrease">Volume verkleinen</option>
        <option value="volume_increase">Volume vergroten</option>
        <option value="temp_increase">Temperatuur verhogen</option>
        <option value="temp_decrease">Temperatuur verlagen</option>
        <option value="catalyst">Katalysator toevoegen</option>
      </select>
    </div>

    <div id="step-substance" class="section" style="display:none;">
      <div class="label">Welke stof?</div>
      <select id="prac-substance" onchange="onSubstanceChange()"></select>
    </div>


    <div id="step-inputs" style="display:none;">
      <div class="grid-3">
        <div class="section">
          <div class="label">v‚Üí</div>
          <select id="prac-vf"><option value="">-- Kies --</option><option value="++">Neemt meer toe</option><option value="+">Neemt toe</option><option value="0">Blijft gelijk</option><option value="-">Neemt af</option><option value="--">Neemt meer af</option></select>
        </div>
        <div class="section">
          <div class="label">v‚Üź</div>
          <select id="prac-vr"><option value="">-- Kies --</option><option value="++">Neemt meer toe</option><option value="+">Neemt toe</option><option value="0">Blijft gelijk</option><option value="-">Neemt af</option><option value="--">Neemt meer af</option></select>
        </div>
        <div class="section">
          <div class="label">Netto</div>
          <select id="prac-net"><option value="">-- Kies --</option><option value="right">‚Üí rechts</option><option value="left">‚Üź links</option><option value="eq">Evenwicht</option></select>
        </div>
      </div>
      <div class="section" style="max-width: 200px;">
        <div class="label">K</div>
        <select id="prac-K"><option value="">-- Kies --</option><option value="up">Neemt toe</option><option value="down">Neemt af</option><option value="same">Gelijk</option></select>
      </div>
      <div style="margin-top: 12px;">
        <button class="btn btn-primary" onclick="checkPractice()">Controleer</button>
      </div>
      <div id="prac-feedback"></div>
    </div>
  </div>

  <div id="panel-quiz" class="panel">
    <div class="score-bar">
      <div style="font-size:14px;font-weight:600;">Quiz</div>
      <div style="font-size:13px;color:var(--text-sec);">Score: <span id="quiz-score">0</span> / <span id="quiz-total">0</span></div>
    </div>
    <div id="quiz-content">
      <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;">Nieuwe vraag</button>
    </div>
  </div>
</div>

<script>
const reactions = {
  no2: { eq: '2NO‚āā(g) ‚áĆ N‚āāO‚āĄ(g)', dH: 'exotherm', species: { 'NO‚āā': 'g', 'N‚āāO‚āĄ': 'g' }, gas: true },
  hi: { eq: 'H‚āā(g) + I‚āā(g) ‚áĆ 2HI(g)', dH: 'exotherm', species: { 'H‚āā': 'g', 'I‚āā': 'g', 'HI': 'g' }, gas: true },
  fescn: { eq: 'Fe¬≥‚Āļ(aq) + SCN‚ĀĽ(aq) ‚áĆ FeSCN¬≤‚Āļ(aq)', dH: 'exotherm', species: { 'Fe¬≥‚Āļ': 'aq', 'SCN‚ĀĽ': 'aq', 'FeSCN¬≤‚Āļ': 'aq' }, gas: false },
  brcl: { eq: '2Br‚ĀĽ(aq) + Cl‚āā(aq) ‚áĆ Br‚āā(aq) + 2Cl‚ĀĽ(aq)', dH: 'exotherm', species: { 'Br‚ĀĽ': 'aq', 'Cl‚āā': 'aq', 'Br‚āā': 'aq', 'Cl‚ĀĽ': 'aq' }, gas: false },
  agcl: { eq: 'AgCl(s) ‚áĆ Ag‚Āļ(aq) + Cl‚ĀĽ(aq)', dH: 'endotherm', species: { 'AgCl': 's', 'Ag‚Āļ': 'aq', 'Cl‚ĀĽ': 'aq' }, gas: false },
  acetic: { eq: 'CH‚āÉCOOH(aq) + H‚āāO(l) ‚áĆ CH‚āÉCOO‚ĀĽ(aq) + H‚āÉO‚Āļ(aq)', dH: 'endotherm', species: { 'CH‚āÉCOOH': 'aq', 'H‚āāO': 'l', 'CH‚āÉCOO‚ĀĽ': 'aq', 'H‚āÉO‚Āļ': 'aq' }, gas: false },
  nh4cl: { eq: 'NH‚āĄCl(s) ‚áĆ NH‚āÉ(g) + HCl(g)', dH: 'endotherm', species: { 'NH‚āĄCl': 's', 'NH‚āÉ': 'g', 'HCl': 'g' }, gas: false },
  caco3: { eq: 'CaCO‚āÉ(s) ‚áĆ CaO(s) + CO‚āā(g)', dH: 'endotherm', species: { 'CaCO‚āÉ': 's', 'CaO': 's', 'CO‚āā': 'g' }, gas: false },
  n2h2: { eq: 'N‚āā(g) + 3H‚āā(g) ‚áĆ 2NH‚āÉ(g)', dH: 'exotherm', species: { 'N‚āā': 'g', 'H‚āā': 'g', 'NH‚āÉ': 'g' }, gas: true },
  cowater: { eq: 'CO(g) + H‚āāO(g) ‚áĆ CO‚āā(g) + H‚āā(g)', dH: 'exotherm', species: { 'CO': 'g', 'H‚āāO': 'g', 'CO‚āā': 'g', 'H‚āā': 'g' }, gas: true },
  pcl5: { eq: 'PCl‚āÖ(g) ‚áĆ PCl‚āÉ(g) + Cl‚āā(g)', dH: 'endotherm', species: { 'PCl‚āÖ': 'g', 'PCl‚āÉ': 'g', 'Cl‚āā': 'g' }, gas: true },
  so2cl2: { eq: 'SO‚āāCl‚āā(g) ‚áĆ SO‚āā(g) + Cl‚āā(g)', dH: 'endotherm', species: { 'SO‚āāCl‚āā': 'g', 'SO‚āā': 'g', 'Cl‚āā': 'g' }, gas: true },
  so2o2: { eq: '2SO‚āā(g) + O‚āā(g) ‚áĆ 2SO‚āÉ(g)', dH: 'exotherm', species: { 'SO‚āā': 'g', 'O‚āā': 'g', 'SO‚āÉ': 'g' }, gas: true },
  ester: { eq: 'CH‚āÉCOOC‚āāH‚āÖ(aq) + H‚āāO(l) ‚áĆ CH‚āÉCOOH(aq) + C‚āāH‚āÖOH(aq)', dH: 'endotherm', species: { 'CH‚āÉCOOC‚āāH‚āÖ': 'aq', 'H‚āāO': 'l', 'CH‚āÉCOOH': 'aq', 'C‚āāH‚āÖOH': 'aq' }, gas: false },
  nh3base: { eq: 'NH‚āÉ(aq) + H‚āāO(l) ‚áĆ NH‚āĄ‚Āļ(aq) + OH‚ĀĽ(aq)', dH: 'exotherm', species: { 'NH‚āÉ': 'aq', 'H‚āāO': 'l', 'NH‚āĄ‚Āļ': 'aq', 'OH‚ĀĽ': 'aq' }, gas: false },
  h2co3: { eq: 'H‚āāCO‚āÉ(aq) ‚áĆ H‚āāO(l) + CO‚āā(g)', dH: 'endotherm', species: { 'H‚āāCO‚āÉ': 'aq', 'H‚āāO': 'l', 'CO‚āā': 'g' }, gas: false }
};

const speedTxt = { '++': 'Neemt meer toe', '+': 'Neemt toe', '0': 'Blijft gelijk', '-': 'Neemt af', '--': 'Neemt meer af' };
const netTxt = { right: '‚Üí rechts', left: '‚Üź links', eq: 'Evenwicht' };
const kTxt = { up: 'Neemt toe', down: 'Neemt af', same: 'Gelijk' };

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function onReactionChange() {
  const rid = document.getElementById('prac-reaction').value;
  if (!rid) {
    document.getElementById('step-change').style.display = 'none';
    return;
  }
  document.getElementById('step-change').style.display = 'block';
  document.getElementById('step-substance').style.display = 'none';
  document.getElementById('step-inputs').style.display = 'none';
  document.getElementById('prac-feedback').innerHTML = '';
}

function onChangeChange() {
  const rid = document.getElementById('prac-reaction').value;
  const change = document.getElementById('prac-change').value;
  const r = reactions[rid];

  document.getElementById('step-substance').style.display = 'none';
  document.getElementById('step-inputs').style.display = 'none';
  document.getElementById('prac-feedback').innerHTML = '';

  if (change === 'add' || change === 'remove') {
    const sel = document.getElementById('prac-substance');
    sel.innerHTML = '<option value="">-- Selecteer stof --</option>';
    for (const [name, phase] of Object.entries(r.species)) {
      const label = name + ' (' + phase + ')';
      sel.innerHTML += '<option value="' + name + '">' + label + '</option>';
    }
    if (change === 'add' && r.gas) {
      sel.innerHTML += '<option value="inert">Inert gas (bijv. Ar, N‚āā) (g)</option>';
    }
    document.getElementById('step-substance').style.display = 'block';
  } else {
    document.getElementById('step-inputs').style.display = 'block';
  }
}

function onSubstanceChange() {
  const val = document.getElementById('prac-substance').value;
  if (val) {
    document.getElementById('step-inputs').style.display = 'block';
  }
}

function getAnswer(rid, change, substance, inert) {
  const key = change + (substance ? '_' + substance : '') + (inert === 'yes' ? '_inert' : '');

  if (rid === 'no2') {
    if (key === 'add_NO‚āā') return { vf: '+', vr: '0', net: 'right', K: 'same', expl: 'Meer NO‚āā ‚Üí direct meer botsingen voor v‚Üí. [N‚āāO‚āĄ] verandert nog niet, dus v‚Üź blijft gelijk.' };
    if (key === 'add_N‚āāO‚āĄ') return { vf: '0', vr: '+', net: 'left', K: 'same', expl: 'Meer N‚āāO‚āĄ ‚Üí direct hogere v‚Üź. [NO‚āā] ongewijzigd, dus v‚Üí blijft gelijk.' };
    if (key === 'remove_NO‚āā') return { vf: '-', vr: '0', net: 'left', K: 'same', expl: 'Minder NO‚āā ‚Üí direct lagere v‚Üí. [N‚āāO‚āĄ] ongewijzigd, dus v‚Üź blijft gelijk.' };
    if (key === 'remove_N‚āāO‚āĄ') return { vf: '0', vr: '-', net: 'right', K: 'same', expl: 'Minder N‚āāO‚āĄ ‚Üí direct lagere v‚Üź. [NO‚āā] ongewijzigd, dus v‚Üí blijft gelijk.' };
    if (key === 'volume_decrease') return { vf: '++', vr: '+', net: 'right', K: 'same', expl: 'Alle concentraties stijgen. v‚Üí = k[NO‚āā]¬≤: verdubbeling ‚Üí 4√ó (meer toe, ++). v‚Üź = k[N‚āāO‚āĄ]: verdubbeling ‚Üí 2√ó (toe, +).' };
    if (key === 'volume_increase') return { vf: '--', vr: '-', net: 'left', K: 'same', expl: 'Alle concentraties dalen. [NO‚āā] halveert ‚Üí v‚Üí ¬ľ (meer af, --). [N‚āāO‚āĄ] halveert ‚Üí v‚Üź ¬Ĺ (af, -).' };
    if (key === 'temp_increase') return { vf: '+', vr: '++', net: 'left', K: 'down', expl: 'Beide stijgen, maar endotherm (links) harder. v‚Üź = ++, v‚Üí = +. K daalt.' };
    if (key === 'temp_decrease') return { vf: '-', vr: '--', net: 'right', K: 'up', expl: 'Beide dalen, maar exotherm (rechts) minder hard. v‚Üź = --, v‚Üí = -. K stijgt.' };
    if (key === 'catalyst') return { vf: '+', vr: '+', net: 'eq', K: 'same', expl: 'Beide richtingen evenveel versneld. Beide +.' };
    if (inert === 'yes') return { vf: '0', vr: '0', net: 'eq', K: 'same', expl: 'Inert gas bij const V: parti√ęle drukken ongewijzigd.' };
  }
  if (rid === 'hi') {
    if (key === 'add_H‚āā' || key === 'add_I‚āā') return { vf: '+', vr: '0', net: 'right', K: 'same', expl: 'Meer reagens ‚Üí direct hogere v‚Üí. [HI] ongewijzigd, dus v‚Üź gelijk.' };
    if (key === 'add_HI') return { vf: '0', vr: '+', net: 'left', K: 'same', expl: 'Meer HI ‚Üí direct hogere v‚Üź. [H‚āā] en [I‚āā] ongewijzigd, dus v‚Üí gelijk.' };
    if (key === 'remove_H‚āā' || key === 'remove_I‚āā') return { vf: '-', vr: '0', net: 'left', K: 'same', expl: 'Minder reagens ‚Üí direct lagere v‚Üí. [HI] ongewijzigd, dus v‚Üź gelijk.' };
    if (key === 'remove_HI') return { vf: '0', vr: '-', net: 'right', K: 'same', expl: 'Minder HI ‚Üí direct lagere v‚Üź. [H‚āā] en [I‚āā] ongewijzigd, dus v‚Üí gelijk.' };
    if (key === 'volume_decrease') return { vf: '+', vr: '+', net: 'eq', K: 'same', expl: 'Gelijk aantal deeltjes (2‚ÜĒ2). Alle concentraties verdubbelen ‚Üí beide 4√ó. Beide + (evenveel).' };
    if (key === 'volume_increase') return { vf: '-', vr: '-', net: 'eq', K: 'same', expl: 'Gelijk aantal deeltjes. Alle concentraties halveren ‚Üí beide ¬ľ. Beide - (evenveel).' };
    if (key === 'temp_increase') return { vf: '+', vr: '++', net: 'left', K: 'down', expl: 'Exotherm: endotherm (terug) harder. v‚Üź = ++, v‚Üí = +. K daalt.' };
    if (key === 'temp_decrease') return { vf: '-', vr: '--', net: 'right', K: 'up', expl: 'Exotherm: exotherm (voorwaarts) minder hard. v‚Üź = --, v‚Üí = -. K stijgt.' };
    if (key === 'catalyst') return { vf: '+', vr: '+', net: 'eq', K: 'same', expl: 'Beide evenveel. Beide +.' };
    if (key === 'add_inert') return { vf: '0', vr: '0', net: 'eq', K: 'same', expl: 'Inert gas bij constant volume: parti√ęle drukken ongewijzigd.' };
  }
  if (rid === 'fescn') {
    if (key === 'add_Fe¬≥‚Āļ' || key === 'add_SCN‚ĀĽ') return { vf: '+', vr: '0', net: 'right', K: 'same', expl: 'Meer reagens ‚Üí direct hogere v‚Üí. [FeSCN¬≤‚Āļ] ongewijzigd, dus v‚Üź gelijk.' };
    if (key === 'add_FeSCN¬≤‚Āļ') return { vf: '0', vr: '+', net: 'left', K: 'same', expl: 'Meer product ‚Üí direct hogere v‚Üź. [Fe¬≥‚Āļ] en [SCN‚ĀĽ] ongewijzigd, dus v‚Üí gelijk.' };
    if (key === 'remove_Fe¬≥‚Āļ' || key === 'remove_SCN‚ĀĽ') return { vf: '-', vr: '0', net: 'left', K: 'same', expl: 'Minder reagens ‚Üí direct lagere v‚Üí. [FeSCN¬≤‚Āļ] ongewijzigd, dus v‚Üź gelijk.' };
    if (key === 'remove_FeSCN¬≤‚Āļ') return { vf: '0', vr: '-', net: 'right', K: 'same', expl: 'Minder product ‚Üí direct lagere v‚Üź. [Fe¬≥‚Āļ] en [SCN‚ĀĽ] ongewijzigd, dus v‚Üí gelijk.' };
    if (key === 'volume_decrease') return { vf: '++', vr: '+', net: 'right', K: 'same', expl: '2 deeltjes links, 1 rechts. Concentraties verdubbelen ‚Üí v‚Üí 4√ó (++), v‚Üź 2√ó (+).' };
    if (key === 'volume_increase') return { vf: '--', vr: '-', net: 'left', K: 'same', expl: 'Verdunning: v‚Üí ¬ľ (--), v‚Üź ¬Ĺ (-).' };
    if (key === 'temp_increase') return { vf: '+', vr: '++', net: 'left', K: 'down', expl: 'Exotherm: v‚Üź = ++, v‚Üí = +. K daalt.' };
    if (key === 'temp_decrease') return { vf: '-', vr: '--', net: 'right', K: 'up', expl: 'Exotherm: v‚Üź = --, v‚Üí = -. K stijgt.' };
    if (key === 'catalyst') return { vf: '+', vr: '+', net: 'eq', K: 'same', expl: 'Beide evenveel. Beide +.' };
  }
  if (rid === 'brcl') {
    if (key === 'add_Br‚ĀĽ' || key === 'add_Cl‚āā') return { vf: '+', vr: '0', net: 'right', K: 'same', expl: 'Meer reagens ‚Üí direct hogere v‚Üí. Producten ongewijzigd, dus v‚Üź gelijk.' };
    if (key === 'add_Br‚āā' || key === 'add_Cl‚ĀĽ') return { vf: '0', vr: '+', net: 'left', K: 'same', expl: 'Meer product ‚Üí direct hogere v‚Üź. Reagens ongewijzigd, dus v‚Üí gelijk.' };
    if (key === 'remove_Br‚ĀĽ' || key === 'remove_Cl‚āā') return { vf: '-', vr: '0', net: 'left', K: 'same', expl: 'Minder reagens ‚Üí direct lagere v‚Üí. Producten ongewijzigd, dus v‚Üź gelijk.' };

function checkPractice() {
  const rid = document.getElementById('prac-reaction').value;
  const change = document.getElementById('prac-change').value;
  const substance = document.getElementById('prac-substance').value;

  const ans = getAnswer(rid, change, substance, 'no');
  if (!ans) { document.getElementById('prac-feedback').innerHTML = '<div style="color:var(--danger)">Combinatie niet gevonden.</div>'; return; }

  const vf = document.getElementById('prac-vf').value;
  const vr = document.getElementById('prac-vr').value;
  const net = document.getElementById('prac-net').value;
  const K = document.getElementById('prac-K').value;

  let correct = 0;
  if (vf === ans.vf) correct++;
  if (vr === ans.vr) correct++;
  if (net === ans.net) correct++;
  if (K === ans.K) correct++;

  let html = '<div class="card ' + (correct === 4 ? 'correct' : 'wrong') + '"><h4>' + correct + '/4 correct</h4>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">';
  html += '<div><b>v‚Üí:</b> ' + speedTxt[ans.vf] + ' ' + (vf === ans.vf ? '‚úď' : '‚úó (jij: ' + (speedTxt[vf] || '-') + ')') + '</div>';
  html += '<div><b>v‚Üź:</b> ' + speedTxt[ans.vr] + ' ' + (vr === ans.vr ? '‚úď' : '‚úó (jij: ' + (speedTxt[vr] || '-') + ')') + '</div>';
  html += '<div><b>Netto:</b> ' + netTxt[ans.net] + ' ' + (net === ans.net ? '‚úď' : '‚úó (jij: ' + (netTxt[net] || '-') + ')') + '</div>';
  html += '<div><b>K:</b> ' + kTxt[ans.K] + ' ' + (K === ans.K ? '‚úď' : '‚úó (jij: ' + (kTxt[K] || '-') + ')') + '</div>';
  html += '</div></div>';
  html += '<div class="expl"><h4>Uitleg</h4>' + ans.expl + '</div>';
  document.getElementById('prac-feedback').innerHTML = html;
}

let quizScore = 0, quizTotal = 0, currentQuiz = null;

function startQuiz() {
  const rids = Object.keys(reactions);
  const rid = rids[Math.floor(Math.random() * rids.length)];
  const r = reactions[rid];

  const changes = ['add', 'remove', 'volume_decrease', 'volume_increase', 'temp_increase', 'temp_decrease', 'catalyst'];
  let change = changes[Math.floor(Math.random() * changes.length)];

  let substance = '', inert = 'no';

  if (change === 'add' || change === 'remove') {
    const specs = Object.keys(r.species);
    substance = specs[Math.floor(Math.random() * specs.length)];
    if (change === 'add' && r.gas && Math.random() > 0.8) {
      substance = 'inert';
    }
  }

  const ans = getAnswer(rid, change, substance, inert);
  if (!ans) { startQuiz(); return; }

  currentQuiz = { rid: rid, change: change, substance: substance, inert: inert, ans: ans };

  let html = '<div class="eq-box">' + r.eq + '  <span style="color:var(--text-sec)">őĒH ' + (r.dH === 'exotherm' ? '&lt; 0 (exotherm)' : '&gt; 0 (endotherm)') + '</span></div>';

  let changeText = '';
  if (change === 'add') changeText = (substance === 'inert' ? 'Inert gas' : substance) + ' toevoegen';
  else if (change === 'remove') changeText = substance + ' verwijderen';
  else if (change === 'volume_decrease') changeText = 'Volume verkleinen';
  else if (change === 'volume_increase') changeText = 'Volume vergroten';
  else if (change === 'temp_increase') changeText = 'Temperatuur verhogen';
  else if (change === 'temp_decrease') changeText = 'Temperatuur verlagen';
  else if (change === 'catalyst') changeText = 'Katalysator toevoegen';


  html += '<div class="section" style="text-align:center;font-size:16px;font-weight:600;">' + changeText + '</div>';

  html += '<div class="grid-3">';
  html += '<div class="section"><div class="label">v‚Üí</div><select id="quiz-vf"><option value="">-- Kies --</option><option value="++">Neemt meer toe</option><option value="+">Neemt toe</option><option value="0">Blijft gelijk</option><option value="-">Neemt af</option><option value="--">Neemt meer af</option></select></div>';
  html += '<div class="section"><div class="label">v‚Üź</div><select id="quiz-vr"><option value="">-- Kies --</option><option value="++">Neemt meer toe</option><option value="+">Neemt toe</option><option value="0">Blijft gelijk</option><option value="-">Neemt af</option><option value="--">Neemt meer af</option></select></div>';
  html += '<div class="section"><div class="label">Netto</div><select id="quiz-net"><option value="">-- Kies --</option><option value="right">‚Üí rechts</option><option value="left">‚Üź links</option><option value="eq">Evenwicht</option></select></div>';
  html += '</div>';
  html += '<div class="section" style="max-width:200px;"><div class="label">K</div><select id="quiz-K"><option value="">-- Kies --</option><option value="up">Neemt toe</option><option value="down">Neemt af</option><option value="same">Gelijk</option></select></div>';
  html += '<div style="margin-top:12px;"><button class="btn btn-primary" onclick="checkQuiz()" style="width:100%;">Controleer</button></div>';
  html += '<div id="quiz-feedback" style="margin-top:12px;"></div>';

  document.getElementById('quiz-content').innerHTML = html;
}

function checkQuiz() {
  if (!currentQuiz) return;
  const ans = currentQuiz.ans;
  const vf = document.getElementById('quiz-vf').value;
  const vr = document.getElementById('quiz-vr').value;
  const net = document.getElementById('quiz-net').value;
  const K = document.getElementById('quiz-K').value;

  if (!vf || !vr || !net || !K) {
    document.getElementById('quiz-feedback').innerHTML = '<div style="color:var(--danger)">Vul alle velden in.</div>';
    return;
  }

  quizTotal++;
  let correct = 0;
  if (vf === ans.vf) correct++;
  if (vr === ans.vr) correct++;
  if (net === ans.net) correct++;
  if (K === ans.K) correct++;
  if (correct === 4) quizScore++;

  document.getElementById('quiz-score').textContent = quizScore;
  document.getElementById('quiz-total').textContent = quizTotal;

  let html = '<div class="card ' + (correct === 4 ? 'correct' : 'wrong') + '"><h4>' + correct + '/4 correct</h4>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">';
  html += '<div><b>v‚Üí:</b> ' + speedTxt[ans.vf] + ' ' + (vf === ans.vf ? '‚úď' : '‚úó') + '</div>';
  html += '<div><b>v‚Üź:</b> ' + speedTxt[ans.vr] + ' ' + (vr === ans.vr ? '‚úď' : '‚úó') + '</div>';
  html += '<div><b>Netto:</b> ' + netTxt[ans.net] + ' ' + (net === ans.net ? '‚úď' : '‚úó') + '</div>';
  html += '<div><b>K:</b> ' + kTxt[ans.K] + ' ' + (K === ans.K ? '‚úď' : '‚úó') + '</div>';
  html += '</div></div>';
  html += '<div class="expl"><h4>Uitleg</h4>' + ans.expl + '</div>';
  html += '<div style="margin-top:12px;"><button class="btn btn-primary" onclick="startQuiz()" style="width:100%;">Volgende vraag</button></div>';
  document.getElementById('quiz-feedback').innerHTML = html;
}
