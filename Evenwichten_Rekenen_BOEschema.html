<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>BOE-schema — Chemisch Evenwicht VWO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--panel:#f7f7f5;--border:#d8d8d4;
  --accent:#6b8a12;--text:#1c1e1f;--muted:#5f6469;
  --ok:#2f8a5b;--err:#b8402f;--warn:#b8862a;
  --mono:'Courier New',monospace;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;padding:24px 16px;min-height:100vh}
.wrap{max-width:860px;margin:0 auto}
h1{font-size:1.25em;font-weight:700;color:var(--accent);margin-bottom:16px}

/* Reactiebalk */
.rxnbar{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.rxneq{font-family:var(--mono);font-size:1.1em;color:var(--accent);flex:1}
.newbtn{background:transparent;border:1.5px solid var(--accent);color:var(--accent);padding:6px 14px;border-radius:5px;font-size:.82em;font-weight:700;cursor:pointer}
.newbtn:hover{background:rgba(107,138,18,.12)}

/* Scenario badge */
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.badge-A{background:#eaf0fa;color:#3b6bc4;border:1px solid #b7cbe8}
.badge-B{background:#eaf5ea;color:#2f8a5b;border:1px solid #8fc98f}

/* Gegeven info */
.given-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:14px;font-size:.92em;line-height:1.7}
.given-box .hl{font-weight:700;color:var(--accent)}
.given-box .hl2{font-weight:700;color:#3b6bc4}

/* BOE tabel */
.boe-wrap{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:14px;overflow-x:auto}
.boe-title{font-size:.72em;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
table.boe{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.92em}
table.boe th,table.boe td{padding:9px 12px;border:1px solid var(--border);text-align:center}
table.boe th{background:#f2f2ef;color:var(--muted);font-size:.8em;letter-spacing:.5px}
table.boe th.row-lbl{text-align:left;width:80px;color:var(--accent)}
table.boe td.row-lbl{text-align:left;font-weight:700;color:var(--accent);background:#f2f2ef}
table.boe td.fixed{background:#f2f2ef;color:var(--text)}
table.boe td.solid{background:#f2f2ef;color:var(--muted);font-style:italic;font-size:.82em}
table.boe td.auto-fill{background:#eaf5ea;color:var(--ok)}
table.boe td.input-cell{background:#f2f2ef;padding:4px 6px}

/* Dropdown O-rij */
.o-select-wrap{display:flex;align-items:center;gap:3px;justify-content:center}
select.o-sign{background:#f2f2ef;border:1.5px solid var(--border);border-radius:4px;color:#3b6bc4;font-family:var(--mono);font-size:.88em;padding:4px 6px;cursor:pointer;outline:none;width:44px}
select.o-coef{background:#f2f2ef;border:1.5px solid var(--border);border-radius:4px;color:#3b6bc4;font-family:var(--mono);font-size:.88em;padding:4px 6px;cursor:pointer;outline:none;width:60px}
select.o-sign:focus,select.o-coef:focus{border-color:#3b6bc4}
select.o-sign.ok,select.o-coef.ok{border-color:var(--ok);background:#eaf5ea}
select.o-sign.err,select.o-coef.err{border-color:var(--err);background:#f7e9e6}

/* Invoervelden */
.num-input{background:#f2f2ef;border:1.5px solid var(--border);border-radius:5px;color:#3b6bc4;font-family:var(--mono);font-size:.88em;padding:5px 7px;outline:none;width:100%;text-align:center}
.num-input:focus{border-color:#3b6bc4}
.num-input.ok{border-color:var(--ok);background:#eaf5ea;color:var(--ok)}
.num-input.err{border-color:var(--err);background:#f7e9e6;color:var(--err)}

/* Knoppen */
.check-btn{background:transparent;border:1.5px solid #3b6bc4;color:#3b6bc4;padding:8px 20px;border-radius:6px;font-size:.88em;font-weight:700;cursor:pointer;transition:background .12s;margin-top:12px}
.check-btn:hover{background:rgba(91,141,238,.15)}
.check-btn:disabled{opacity:.35;cursor:not-allowed}

/* Feedback blokken */
.fb{margin-top:10px;padding:12px 16px;border-radius:6px;font-size:.88em;line-height:1.6;display:none}
.fb.ok{background:#eaf5ea;border:1px solid var(--ok);color:var(--ok)}
.fb.err{background:#f7e9e6;border:1px solid var(--err);color:var(--err)}
.fb.info{background:#eef1fb;border:1px solid #3b6bc4;color:#5f6469}
.fb.warn{background:#faf3df;border:1px solid var(--warn);color:var(--warn)}

/* Stap-secties */
.step-section{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 18px;margin-bottom:14px;display:none}
.step-title{font-size:.78em;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:12px}
.step-body{font-size:.92em;line-height:1.7}
.formula-box{background:#f2f2ef;border:1px solid var(--border);border-radius:5px;padding:10px 14px;font-family:var(--mono);font-size:.92em;color:#6b8a12;margin:10px 0}
.input-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.unit-lbl{font-size:.82em;color:var(--muted);font-family:var(--mono)}
.ans-input{width:120px;background:#f2f2ef;border:1.5px solid var(--border);border-radius:5px;color:#3b6bc4;font-family:var(--mono);font-size:.9em;padding:6px 10px;outline:none}
.ans-input:focus{border-color:#3b6bc4}
.ans-input.ok{border-color:var(--ok);background:#eaf5ea}
.ans-input.err{border-color:var(--err);background:#f7e9e6}

/* Eenheid badge */
.kc-unit{font-family:var(--mono);font-size:.85em;color:#5f6469}

/* Voortgangsbalk */
.progress{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.pstep{padding:4px 12px;border-radius:20px;font-size:.75em;font-weight:700;border:1.5px solid var(--border);color:var(--muted)}
.pstep.active{border-color:var(--accent);color:var(--accent);background:rgba(107,138,18,.08)}
.pstep.done{border-color:var(--ok);color:var(--ok);background:rgba(79,195,161,.08)}
</style>
</head>
<body>
<div class="wrap">
<h1>BOE-schema — Chemisch Evenwicht</h1>

<div class="rxnbar">
  <div class="rxneq" id="eq-disp">—</div>
  <button class="newbtn" onclick="newQ()">↻ Nieuwe opgave</button>
</div>

<div id="badge-wrap"></div>

<div class="progress" id="progress"></div>

<div class="given-box" id="given-box"></div>

<!-- BOE tabel -->
<div class="boe-wrap">
  <div class="boe-title">
    <span>BOE-schema</span>
    <span id="boe-hint" style="font-size:.82em;font-weight:400;color:#5f6469"></span>
  </div>
  <table class="boe" id="boe-table"></table>
  <button class="check-btn" id="btn-check-boe" onclick="checkBOE()">Controleer BOE</button>
  <div class="fb" id="fb-boe"></div>
</div>

<!-- Stap 2: x oplossen (scenario A) / x berekenen (scenario B) -->
<div class="step-section" id="step-x">
  <div class="step-title" id="step-x-title"></div>
  <div class="step-body" id="step-x-body"></div>
</div>

<!-- Stap 3: verwaarlozing check (alleen scenario A) -->
<div class="step-section" id="step-verw">
  <div class="step-title">Verwaarlozing controleren</div>
  <div class="step-body" id="step-verw-body"></div>
</div>

<!-- Stap 4: exacte oplossing (als verwaarlozing niet geldig) -->
<div class="step-section" id="step-exact">
  <div class="step-title">Exacte oplossing (abc-formule)</div>
  <div class="step-body" id="step-exact-body"></div>
</div>

<!-- Stap 5: eindantwoord -->
<div class="step-section" id="step-final">
  <div class="step-title" id="step-final-title"></div>
  <div class="step-body" id="step-final-body"></div>
</div>

</div>
<script>
// ── Reacties ──────────────────────────────────────────────────────────────
// co: [a,b,c,d] = stoichiometrische coëfficiënten [reactant A, reactant B, product C, product D]
// Voor Kc: Kc = [C]^c * [D]^d / ([A]^a * [B]^b)
// Vaste stof: solidA/solidB/solidC — niet in Kc, grijs in tabel
const RXNS=[
  { eq:'N₂(g) + 3H₂(g) ⇌ 2NH₃(g)',
    names:['N₂','H₂','NH₃',null], co:[1,3,2,0], solid:[false,false,false,false],
    KcRef:0.20, Tref:500 },
  { eq:'H₂(g) + I₂(g) ⇌ 2HI(g)',
    names:['H₂','I₂','HI',null], co:[1,1,2,0], solid:[false,false,false,false],
    KcRef:50, Tref:700 },
  { eq:'2SO₂(g) + O₂(g) ⇌ 2SO₃(g)',
    names:['SO₂','O₂','SO₃',null], co:[2,1,2,0], solid:[false,false,false,false],
    KcRef:13.0, Tref:900 },
  { eq:'N₂O₄(g) ⇌ 2NO₂(g)',
    names:['N₂O₄',null,'NO₂',null], co:[1,0,2,0], solid:[false,false,false,false],
    KcRef:4.5, Tref:350 },
  { eq:'CH₃COOH(aq) ⇌ CH₃COO⁻(aq) + H⁺(aq)',
    names:['CH₃COOH',null,'CH₃COO⁻','H⁺'], co:[1,0,1,1], solid:[false,false,false,false],
    KcRef:1.8e-5, Tref:298 },
  { eq:'C(s) + CO₂(g) ⇌ 2CO(g)',
    names:['C','CO₂','CO',null], co:[1,1,2,0], solid:[true,false,false,false],
    KcRef:1.3, Tref:1000 },
  { eq:'H₂(g) + CO₂(g) ⇌ H₂O(g) + CO(g)',
    names:['H₂','CO₂','H₂O','CO'], co:[1,1,1,1], solid:[false,false,false,false],
    KcRef:0.771, Tref:1023 },
  { eq:'PCl₅(g) ⇌ PCl₃(g) + Cl₂(g)',
    names:['PCl₅',null,'PCl₃','Cl₂'], co:[1,0,1,1], solid:[false,false,false,false],
    KcRef:0.041, Tref:523 },
];

// ── State ─────────────────────────────────────────────────────────────────
let Q={}, phase='boe'; // phases: boe → x → verw → exact → final

function fmt(x,d=3){
  if(!isFinite(x))return'—';
  if(Math.abs(x)<0.001||Math.abs(x)>=10000)return x.toExponential(2);
  return parseFloat(x.toPrecision(d)).toString().replace('.',',');
}
function fmtKc(x){ return x.toExponential(3); }

// Eenheid van Kc: (mol/L)^(Δn) waarbij Δn = som product-exponenten - som reactant-exponenten
function kcUnit(co){
  const[a,b,c,d]=co;
  const dn=(c+d)-(a+b);
  if(dn===0) return 'dimensieloos';
  if(dn===1) return 'mol/L';
  if(dn===-1) return 'L/mol';
  if(dn===2) return 'mol²/L²';
  if(dn===-2) return 'L²/mol²';
  return `(mol/L)^${dn}`;
}

// Kc-expressie als string
function kcExpr(names,co,solid){
  const[a,b,c,d]=co;
  const term=(name,exp,s)=>s?null:(exp===0?null:(exp===1?`[${name}]`:`[${name}]^${exp}`));
  const num=[term(names[2],c,solid[2]),term(names[3],d,solid[3])].filter(Boolean);
  const den=[term(names[0],a,solid[0]),term(names[1],b,solid[1])].filter(Boolean);
  const ns=num.length?num.join('·'):'1';
  const ds=den.length?den.join('·'):'1';
  return `Kc = ${ns} / ${ds}`;
}

// Voortgang
function setProgress(steps,current){
  const div=document.getElementById('progress');
  div.innerHTML=steps.map((s,i)=>`<span class="pstep${i<current?' done':i===current?' active':''}">${s}</span>`).join('');
}

// ── Nieuwe opgave genereren ────────────────────────────────────────────────
function newQ(){
  const rxn=RXNS[Math.floor(Math.random()*RXNS.length)];
  // Scenario A (Kc gegeven) of B (concentratie gegeven)
  const scenario=Math.random()<0.5?'A':'B';
  const[a,b,c,d]=rxn.co;

  // Actieve stoffen (niet null, niet vaste stof die al in A-positie zit)
  // In ons model: namen staan als [reactantA, reactantB of null, productC, productD of null]
  // Sommige zijn vaste stof (solid[])
  // Beginconcentraties genereren
  const B={};
  const activeNames=rxn.names.map((n,i)=>n?{name:n,idx:i,co:rxn.co[i],solid:rxn.solid[i]}:null).filter(Boolean);
  const fluidActive=activeNames.filter(s=>!s.solid&&s.co>0);

  // Genereer beginconcentraties EERLIJK: gewoon willekeurig binnen een realistisch bereik
  // (0,05–3,0 mol/L), zonder enige sturing naar een "leerzame" x-fractie. De echte, opgezochte
  // Kc-waarde bepaalt simpelweg wat x wordt — soms heel klein (verwaarlozing duidelijk terecht),
  // soms zo groot dat verwaarlozing duidelijk faalt of er zelfs geen chemisch zinvolle oplossing
  // bestaat bij die combinatie (dan opnieuw loten, geen doelfractie-forcering).
  const Kc=rxn.KcRef;

  function calcXverw(A0,B0){
    const denom_val=Math.pow(A0,a)*(b>0?Math.pow(B0,b):1);
    const coef_prod=Math.pow(c,c)*(d>0?Math.pow(d,d):1);
    const exponent=c+(d>0?d:0);
    return Math.pow(Kc*denom_val/coef_prod, 1/exponent);
  }
  function solveXeq(A0,B0){
    const evalKc=(xv)=>{
      const cA=Math.max(A0-a*xv,1e-10);
      const cB=b>0?Math.max(B0-b*xv,1e-10):1;
      const cC=c>0?Math.max(c*xv,1e-10):1;
      const cD=d>0?Math.max(d*xv,1e-10):1;
      let num=1,den=1;
      if(c>0&&!rxn.solid[2])num*=Math.pow(cC,c);
      if(d>0&&!rxn.solid[3])num*=Math.pow(cD,d);
      if(a>0&&!rxn.solid[0])den*=Math.pow(cA,a);
      if(b>0&&!rxn.solid[1])den*=Math.pow(cB,b);
      return num/den-Kc;
    };
    const xMax=Math.min(a>0?A0/a:Infinity, (b>0&&B0>0)?B0/b:Infinity)*0.9999;
    if(evalKc(0)*evalKc(xMax)>0) return null;
    let lo=0,hi=xMax;
    for(let i=0;i<80;i++){
      const mid=(lo+hi)/2;
      evalKc(lo)*evalKc(mid)<0?hi=mid:lo=mid;
    }
    return (lo+hi)/2;
  }

  let Bvals, x_eq, x_verw, found=false;
  for(let attempt=0; attempt<60 && !found; attempt++){
    const A0=+(0.05+Math.random()*2.95).toFixed(3);
    const B0=(b>0 && !rxn.solid[1]) ? +(0.05+Math.random()*2.95).toFixed(3) : 0;
    const xe=solveXeq(A0,B0);
    if(xe===null) continue; // chemisch onmogelijk bij deze combinatie — opnieuw loten
    Bvals={A:A0,B:B0,C:0,D:0};
    x_eq=xe; x_verw=calcXverw(A0,B0); found=true;
  }

  // Vangnet: in de praktijk altijd 'found' binnen 60 pogingen.
  if(!found){
    Bvals={A:1.00,B:rxn.co[1]>0&&!rxn.solid[1]?1.00:0,C:0,D:0};
    x_eq=solveXeq(Bvals.A,Bvals.B)??0.05;
    x_verw=calcXverw(Bvals.A,Bvals.B);
  }

  // Evenwichtsconcentraties
  const E={
    A:Bvals.A-a*x_eq, B:b>0?Bvals.B-b*x_eq:0,
    C:Bvals.C+c*x_eq, D:d>0?Bvals.D+d*x_eq:0
  };


  // Scenario B: welke evenwichtsconcentratie geven we?
  // Kies een fluïde stof met duidelijke concentratie
  let givenEqIdx=null, givenEqVal=null;
  if(scenario==='B'){
    const candidates=fluidActive.filter(s=>s.co>0);
    const pick=candidates[Math.floor(Math.random()*candidates.length)];
    givenEqIdx=pick.idx; // 0=A,1=B,2=C,3=D
    const keys=['A','B','C','D'];
    givenEqVal=+E[keys[givenEqIdx]].toFixed(2);
  }
  // x_verw is al berekend in de generatielus hierboven (alleen relevant voor scenario A).

  Q={ rxn, scenario, Bvals, E, Kc, x_eq, x_verw, givenEqIdx, givenEqVal,
      phase:'boe', boeDone:false, xDone:false, verwDone:false };

  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const{rxn,scenario,Bvals,E,Kc,givenEqIdx,givenEqVal}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const solid=rxn.solid;

  document.getElementById('eq-disp').textContent=rxn.eq;

  // Badge
  document.getElementById('badge-wrap').innerHTML=
    `<div class="badge badge-${scenario}">
      ${scenario==='A'?'📐 Scenario A — Kc gegeven, concentraties berekenen':'📊 Scenario B — Concentratie gegeven, Kc berekenen'}
    </div>`;

  // Voortgang
  const steps=scenario==='A'
    ?['1. BOE invullen','2. x oplossen (verwaarlozing)','3. Verwaarlozing check','4. Evenwichtsconcentraties']
    :['1. BOE invullen','2. x berekenen','3. Kc berekenen'];
  setProgress(steps,0);

  // Gegeven info
  const keyNames=['A','B','C','D'];
  let givenHTML=`<strong>Reactievergelijking:</strong> ${rxn.eq}<br><br>`;
  givenHTML+=`<strong>Beginconcentraties:</strong><br>`;
  names.forEach((nm,i)=>{
    if(!nm||solid[i]) return;
    givenHTML+=`[${nm}]₀ = <span class="hl">${fmt(Bvals[keyNames[i]])} mol/L</span> &nbsp;`;
  });
  if(scenario==='A'){
    givenHTML+=`<br><br><strong>Gegeven:</strong> Kc = <span class="hl">${fmtKc(Kc)}</span> <span class="hl2">${kcUnit(rxn.co)}</span>`;
  } else {
    const gnm=names[givenEqIdx];
    givenHTML+=`<br><br><strong>Gegeven evenwichtsconcentratie:</strong> [${gnm}]<sub>eq</sub> = <span class="hl">${fmt(givenEqVal)} mol/L</span>`;
  }
  document.getElementById('given-box').innerHTML=givenHTML;
  document.getElementById('given-box').style.display='block';

  // Hint
  document.getElementById('boe-hint').textContent=
    scenario==='A'?'Vul de O-rij in met ±nx (gebruik dropdowns), de E-rij wordt automatisch aangevuld.'
                  :'Vul de O- en E-rij numeriek in.';

  // BOE tabel
  buildBOETable();

  // Verberg latere stappen
  ['step-x','step-verw','step-exact','step-final'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('fb-boe').style.display='none';
  document.getElementById('btn-check-boe').disabled=false;
}

// ── BOE tabel bouwen ──────────────────────────────────────────────────────
function buildBOETable(){
  const{rxn,scenario,Bvals,givenEqIdx,givenEqVal}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const solid=rxn.solid;
  const co=[a,b,c,d];
  const keyNames=['A','B','C','D'];
  // Actieve kolommen: naam aanwezig, niet vast, coëfficiënt > 0
  const cols=names.map((nm,i)=>nm&&!solid[i]&&co[i]>0?{nm,i,co:co[i],solid:solid[i]}:null).filter(Boolean);

  let html=`<tr><th class="row-lbl">Stof</th>${cols.map(col=>`<th>${col.nm}${col.solid?' (s)':''}</th>`).join('')}</tr>`;

  // B-rij (altijd vast)
  html+=`<tr><td class="row-lbl">B</td>${cols.map(col=>{
    if(col.solid) return `<td class="solid">—</td>`;
    return `<td class="fixed">${fmt(Bvals[keyNames[col.i]])} mol/L</td>`;
  }).join('')}</tr>`;

  // O-rij
  if(scenario==='A'){
    // Dropdowns — geen vooringevulde waarde, leerling kiest zelf
    html+=`<tr><td class="row-lbl">O</td>${cols.map(col=>{
      if(col.solid) return `<td class="solid">—</td>`;
      return `<td class="input-cell">
        <div class="o-select-wrap">
          <select class="o-sign" id="osign-${col.i}">
            <option value="" selected>±</option>
            <option value="-">−</option>
            <option value="+">+</option>
          </select>
          <select class="o-coef" id="ocoef-${col.i}">
            <option value="" selected>nx</option>
            ${[1,2,3,4].map(n=>`<option value="${n}">${n}x</option>`).join('')}
          </select>
        </div>
      </td>`;
    }).join('')}</tr>`;
  } else {
    // Numeriek
    html+=`<tr><td class="row-lbl">O</td>${cols.map(col=>{
      if(col.solid) return `<td class="solid">—</td>`;
      return `<td class="input-cell"><input type="number" class="num-input" id="o-${col.i}" step="0.0001" placeholder="…"></td>`;
    }).join('')}</tr>`;
  }

  // E-rij
  if(scenario==='A'){
    // Automatisch ingevuld na correcte O (voor nu: placeholder)
    html+=`<tr><td class="row-lbl">E</td>${cols.map(col=>{
      if(col.solid) return `<td class="solid">—</td>`;
      return `<td class="auto-fill" id="e-cell-${col.i}">—</td>`;
    }).join('')}</tr>`;
  } else {
    html+=`<tr><td class="row-lbl">E</td>${cols.map(col=>{
      if(col.solid) return `<td class="solid">—</td>`;
      // Gegeven evenwichtsconcentratie vast
      if(col.i===givenEqIdx) return `<td class="fixed">${fmt(givenEqVal)} mol/L</td>`;
      return `<td class="input-cell"><input type="number" class="num-input" id="e-${col.i}" step="0.0001" placeholder="…"></td>`;
    }).join('')}</tr>`;
  }

  document.getElementById('boe-table').innerHTML=html;
}

// ── BOE controleren ───────────────────────────────────────────────────────
function checkBOE(){
  const{rxn,scenario,Bvals,E,x_eq,givenEqIdx,givenEqVal}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const solid=rxn.solid;
  const co=[a,b,c,d];
  const keyNames=['A','B','C','D'];
  // Alleen stoffen met naam, niet vast, én coëfficiënt > 0
  const cols=names.map((nm,i)=>nm&&!solid[i]&&co[i]>0?{nm,i,co:co[i],solid:solid[i]}:null).filter(Boolean);
  const tol=0.04;
  let allOk=true;

  if(scenario==='A'){
    // Controleer dropdowns O-rij
    const errors=[];
    cols.forEach(col=>{
      const signEl=document.getElementById('osign-'+col.i);
      const coefEl=document.getElementById('ocoef-'+col.i);
      if(!signEl||!coefEl)return;
      const correctSign=col.i<=1?'-':'+';
      const correctCoef=col.co;
      const okSign=signEl.value===correctSign;
      const okCoef=parseInt(coefEl.value)===correctCoef;
      signEl.classList.toggle('ok',okSign&&okCoef);
      signEl.classList.toggle('err',!okSign);
      coefEl.classList.toggle('ok',okSign&&okCoef);
      coefEl.classList.toggle('err',!okCoef);
      if(!okSign||!okCoef){
        allOk=false;
        errors.push(`${col.nm}: verwacht ${correctSign==='-'?'−':'+'}${correctCoef}x`);
      }
    });
    if(allOk){
      // Vul E-rij automatisch in
      cols.forEach(col=>{
        const sign=col.i<=1?-1:1;
        const expr=`${fmt(Bvals[keyNames[col.i]])} ${sign>0?'+':'−'} ${col.co}x`;
        const cell=document.getElementById('e-cell-'+col.i);
        if(cell) cell.textContent=expr;
      });
      showFB('fb-boe','ok',`✓ O-rij correct! De E-rij is automatisch ingevuld. Ga nu verder met stap 2.`);
      Q.boeDone=true;
      showStepX();
    } else {
      showFB('fb-boe','err',`✗ Controleer: ${errors.join(' | ')}`);
    }

  } else {
    // Scenario B: controleer O en E numeriek
    const oErrors=[], eErrors=[];
    cols.forEach(col=>{
      const keyN=keyNames[col.i];
      const oEl=document.getElementById('o-'+col.i);
      const eEl=document.getElementById('e-'+col.i);
      const sign=col.i<=1?-1:1;  // reactanten negatief, producten positief
      const correctO=sign*col.co*x_eq;
      const correctE=Bvals[keyN]+correctO;

      if(oEl){
        const uO=parseFloat(oEl.value);
        const okO=!isNaN(uO)&&Math.abs(uO-correctO)/Math.max(Math.abs(correctO),1e-10)<tol;
        oEl.classList.toggle('ok',okO);oEl.classList.toggle('err',!okO);
        if(!okO){allOk=false;oErrors.push(`O(${col.nm}): verwacht ${fmt(correctO)}`);}
      }
      if(eEl){
        const uE=parseFloat(eEl.value);
        const okE=!isNaN(uE)&&Math.abs(uE-correctE)/Math.max(Math.abs(correctE),1e-10)<tol;
        eEl.classList.toggle('ok',okE);eEl.classList.toggle('err',!okE);
        if(!okE){allOk=false;eErrors.push(`E(${col.nm}): verwacht ${fmt(correctE)}`);}
      }
    });
    if(allOk){
      showFB('fb-boe','ok','✓ BOE-schema correct! Ga verder met stap 2: Kc berekenen.');
      Q.boeDone=true;
      Q.x_correct=x_eq; // x al bepaald via bisectie
      showFinalB();
    } else {
      const all=[...oErrors,...eErrors];
      showFB('fb-boe','err','✗ '+all.join(' | '));
    }
  }
}

// ── Stap X: x bepalen ─────────────────────────────────────────────────────
function showStepX(){
  const{rxn,scenario,Bvals,E,Kc,x_eq,x_verw,givenEqIdx,givenEqVal}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const keyNames=['A','B','C','D'];
  const sec=document.getElementById('step-x');
  sec.style.display='block';

  const steps=scenario==='A'
    ?['1. BOE invullen','2. x oplossen (verwaarlozing)','3. Verwaarlozing check','4. Evenwichtsconcentraties']
    :['1. BOE invullen','2. x berekenen','3. Kc berekenen'];
  setProgress(steps,1);

  if(scenario==='A'){
    document.getElementById('step-x-title').textContent='Stap 2 — x oplossen via verwaarlozing';
    // Kc-expressie met x
    const expr=kcExpr(names,rxn.co,rxn.solid);
    const Bvarsubs=names.map((nm,i)=>{
      if(!nm||rxn.solid[i])return null;
      const key=keyNames[i];
      const sign=i<=1?'-':'+';
      return `[${nm}] = ${fmt(Bvals[key])} ${sign} ${rxn.co[i]}x`;
    }).filter(Boolean).join('<br>');
    document.getElementById('step-x-body').innerHTML=`
      <div class="formula-box">${expr} = ${fmtKc(Kc)}</div>
      <p style="margin-bottom:8px">Vul de E-rij in:</p>
      <div style="font-family:var(--mono);font-size:.88em;line-height:2;margin-bottom:12px">${Bvarsubs}</div>
      <p><strong>Verwaarlozing:</strong> stel x ≪ beginconcentratie reactant, zodat:</p>
      <div class="formula-box" id="verw-expr"></div>
      <p style="margin-bottom:8px">Los op voor x (verwaarlozing):</p>
      <div class="input-row">
        <span class="unit-lbl">x ≈</span>
        <input type="number" class="ans-input" id="ans-xverw" step="0.00001" placeholder="…">
        <span class="unit-lbl">mol/L</span>
        <button class="check-btn" onclick="checkXverw()">Controleer</button>
      </div>
      <div class="fb" id="fb-xverw"></div>`;
    // Vul verwaarlozing-expressie in
    buildVerwExpr();
  } else {
    document.getElementById('step-x-title').textContent='Stap 2 — x berekenen uit de gegeven evenwichtsconcentratie';
    const gnm=names[givenEqIdx];
    const gco=rxn.co[givenEqIdx];
    const gkey=keyNames[givenEqIdx];
    const isReactant=givenEqIdx<=1;
    // x = (Bvals[gkey] - givenEqVal) / gco als reactant
    // x = (givenEqVal - Bvals[gkey]) / gco als product
    const x_correct=isReactant
      ?(Bvals[gkey]-givenEqVal)/gco
      :(givenEqVal-Bvals[gkey])/gco;
    Q.x_correct=x_correct;
    document.getElementById('step-x-body').innerHTML=`
      <p>Uit de gegeven evenwichtsconcentratie van ${gnm}:<br>
      <span style="font-family:var(--mono)">[${gnm}]<sub>eq</sub> = ${fmt(Bvals[gkey])} ${isReactant?'−':'+'}
      ${gco}x = ${fmt(givenEqVal)}</span></p>
      <div class="input-row">
        <span class="unit-lbl">x =</span>
        <input type="number" class="ans-input" id="ans-x" step="0.00001" placeholder="…">
        <span class="unit-lbl">mol/L</span>
        <button class="check-btn" onclick="checkXB()">Controleer</button>
      </div>
      <div class="fb" id="fb-x"></div>`;
  }
}

function buildVerwExpr(){
  const{rxn,Bvals,Kc}=Q;
  const[a,b,c,d]=rxn.co;
  const solid=rxn.solid;
  const BA=fmt(Bvals.A), BB=b>0?fmt(Bvals.B):'';
  // Teller: (coef·x)^exp — coëfficiënt én exponent correct
  const termNum=(coef,exp,isSolid)=>{
    if(isSolid||coef===0)return null;
    const inner=coef===1?'x':`${coef}x`;
    return exp===1?`(${inner})`:`(${inner})^${exp}`;
  };
  const numParts=[termNum(c,c,solid[2]),termNum(d,d,solid[3])].filter(Boolean);
  // Noemer: [B]₀^exp
  const termDen=(val,exp,isSolid)=>{
    if(isSolid||exp===0)return null;
    return exp===1?val:exp===2?`${val}²`:`${val}^${exp}`;
  };
  const denParts=[termDen(BA,a,solid[0]),termDen(BB,b,solid[1])].filter(Boolean);
  const num=numParts.join('·')||'1';
  const den=denParts.join('·')||'1';
  document.getElementById('verw-expr').textContent=`Kc ≈ ${num} / ${den} = ${fmtKc(Kc)}`;
}

function checkXverw(){
  const{x_verw,Bvals,rxn}=Q;
  const u=parseFloat(document.getElementById('ans-xverw').value);
  const ok=!isNaN(u)&&Math.abs(u-x_verw)/Math.abs(x_verw)<0.05;
  const el=document.getElementById('ans-xverw');
  el.classList.toggle('ok',ok);el.classList.toggle('err',!ok);
  if(ok){
    showFB('fb-xverw','ok',`✓ Correct! x ≈ ${fmt(x_verw,4)} mol/L (via verwaarlozing)`);
    Q.x_verw_user=x_verw;
    showVerwCheck();
  } else {
    showFB('fb-xverw','err',`✗ Niet correct. Controleer je berekening. x ≈ ${fmt(x_verw,4)} mol/L`);
  }
}

function checkXB(){
  const{x_correct}=Q;
  const u=parseFloat(document.getElementById('ans-x').value);
  const ok=!isNaN(u)&&Math.abs(u-x_correct)/Math.abs(x_correct)<0.05;
  const el=document.getElementById('ans-x');
  el.classList.toggle('ok',ok);el.classList.toggle('err',!ok);
  if(ok){
    showFB('fb-x','ok',`✓ Correct! x = ${fmt(x_correct,4)} mol/L`);
    Q.xDone=true;
    showFinalB();
  } else {
    showFB('fb-x','err',`✗ Niet correct. x = ${fmt(x_correct,4)} mol/L`);
  }
}

// ── Verwaarlozing check ───────────────────────────────────────────────────
function showVerwCheck(){
  const{x_verw,Bvals,rxn}=Q;
  const sec=document.getElementById('step-verw');
  sec.style.display='block';
  const steps=['1. BOE invullen','2. x oplossen (verwaarlozing)','3. Verwaarlozing check','4. Evenwichtsconcentraties'];
  setProgress(steps,2);

  document.getElementById('step-verw-body').innerHTML=`
    <p>Bereken zelf het percentage: x / [${rxn.names[0]}]₀ × 100%</p>
    <div class="input-row">
      <input type="number" class="ans-input" id="ans-pct" step="0.1" placeholder="…">
      <span class="unit-lbl">%</span>
      <button class="check-btn" onclick="checkPct()">Controleer</button>
    </div>
    <div class="fb" id="fb-pct"></div>`;
}

function checkPct(){
  const{x_verw,Bvals}=Q;
  const pct=Math.abs(x_verw)/Bvals.A*100;
  Q.pct=pct;
  const u=parseFloat(document.getElementById('ans-pct').value);
  const ok=!isNaN(u)&&Math.abs(u-pct)<0.5; // 0.5% absolute tolerantie
  const el=document.getElementById('ans-pct');
  el.classList.toggle('ok',ok);el.classList.toggle('err',!ok);
  const fb=document.getElementById('fb-pct');
  fb.style.display='block';
  if(ok){
    fb.className='fb ok';
    fb.innerHTML=`✓ Correct! x / [${Q.rxn.names[0]}]₀ × 100% = ${pct.toFixed(1)}%
      <br><br>Welke foutmarge vind jij acceptabel?
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
        <button class="check-btn" onclick="checkMarge(1)">1%</button>
        <button class="check-btn" onclick="checkMarge(5)">5%</button>
        <button class="check-btn" onclick="checkMarge(10)">10%</button>
      </div>
      <div id="fb-marge" style="margin-top:10px"></div>`;
  } else {
    fb.className='fb err';
    fb.innerHTML=`✗ Niet correct. ${fmt(x_verw,4)} / ${fmt(Bvals.A)} × 100% = ${pct.toFixed(1)}%`;
  }
}

function checkMarge(chosen){
  const{pct,x_verw,x_eq,Kc}=Q;
  const valid=pct<=chosen;
  const fb=document.getElementById('fb-marge');
  if(!fb){showVerwCheck();return;}
  fb.style.display='block';
  if(valid){
    fb.innerHTML=`<div class="fb ok" style="display:block">✓ ${pct.toFixed(1)}% ≤ ${chosen}% → verwaarlozing acceptabel.
      <br><button class="check-btn" onclick="showFinalA()" style="margin-top:10px">Verder →</button></div>`;
    Q.x_final=x_verw;
  } else {
    const extra = pct>100
      ? `<br><br><em>Bij deze reactie is Kc relatief groot (Kc = ${fmtKc(Kc)}). Een grote Kc betekent dat het evenwicht ver naar de productkant ligt — er reageert dus relatief veel van de beginstof weg. De verwaarlozingsbenadering gaat er juist van uit dat er weinig wegreageert (x ≪ [A]₀), dus bij een groot Kc gaat die aanname volledig de mist in: de "benaderde" x kan dan zelfs groter uitvallen dan de beginconcentratie zelf, wat fysisch onmogelijk is. Dat is precies het signaal dat je hier niet mag verwaarlozen.</em>`
      : '';
    fb.innerHTML=`<div class="fb warn" style="display:block">⚠ ${pct.toFixed(1)}% > ${chosen}% → verwaarlozing niet acceptabel.
      Bereken x exact via de onderstaande stap.${extra}
      <br><button class="check-btn" onclick="showExact()" style="margin-top:10px">Exact oplossen →</button></div>`;
    Q.x_final=x_eq;
  }
}

// ── Exacte oplossing (leerling lost zelf op) ─────────────────────────────
function showExact(){
  const{rxn,Bvals,Kc,x_eq}=Q;
  const[a,b,c,d]=rxn.co;
  const solid=rxn.solid;
  const sec=document.getElementById('step-exact');
  sec.style.display='block';
  Q.x_final=x_eq;

  // Toon de Kc-uitdrukking met E-rij ingevuld als hint
  const names=rxn.names;
  const keyNames=['A','B','C','D'];
  const co=[a,b,c,d];
  const sign=(i)=>i<=1?-1:1;

  // Kc-expressie met x ingevuld
  const termExact=(nm,exp,isSolid,idx)=>{
    if(!nm||isSolid||exp===0)return null;
    const B=fmt(Bvals[keyNames[idx]]);
    const s=sign(idx)>0?'+':'-';
    const inner=exp===1?`(${B} ${s} ${co[idx]}x)`:`(${B} ${s} ${co[idx]}x)^${exp}`;
    return inner;
  };
  const numTerms=[termExact(names[2],c,solid[2],2),termExact(names[3],d,solid[3],3)].filter(Boolean);
  const denTerms=[termExact(names[0],a,solid[0],0),termExact(names[1],b,solid[1],1)].filter(Boolean);
  const exprFull=`Kc = ${numTerms.join('·')||'1'} / ${denTerms.join('·')||'1'} = ${fmtKc(Kc)}`;

  document.getElementById('step-exact-body').innerHTML=`
    <p>Los x exact op. Gebruik de volledige Kc-uitdrukking:</p>
    <div class="formula-box">${exprFull}</div>
    <p style="margin-bottom:10px">Werk dit zelf uit (herschrijf als kwadratische vergelijking of gebruik de abc-formule) en vul x in:</p>
    <div class="input-row">
      <span class="unit-lbl">x =</span>
      <input type="number" class="ans-input" id="ans-xexact" step="0.00001" placeholder="…">
      <span class="unit-lbl">mol/L</span>
      <button class="check-btn" onclick="checkXExact()">Controleer</button>
    </div>
    <div class="fb" id="fb-xexact"></div>`;
}

function checkXExact(){
  const{x_final}=Q;
  const u=parseFloat(document.getElementById('ans-xexact').value);
  const ok=!isNaN(u)&&Math.abs(u-x_final)/Math.abs(x_final)<0.05;
  const el=document.getElementById('ans-xexact');
  el.classList.toggle('ok',ok);el.classList.toggle('err',!ok);
  if(ok){ showFB('fb-xexact','ok',`✓ Correct! x = ${fmt(x_final,5)} mol/L`); showFinalA(); }
  else   { showFB('fb-xexact','err',`✗ Niet correct. x = ${fmt(x_final,5)} mol/L`); }
}

// ── Eindstap A: evenwichtsconcentraties ───────────────────────────────────
function showFinalA(){
  const{rxn,Bvals,x_final,verwValid}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const solid=rxn.solid;
  const keyNames=['A','B','C','D'];
  const co=[a,b,c,d];
  const sec=document.getElementById('step-final');
  sec.style.display='block';
  document.getElementById('step-final-title').textContent='Stap 4 — Evenwichtsconcentraties berekenen';
  const steps=['1. BOE invullen','2. x oplossen (verwaarlozing)','3. Verwaarlozing check','4. Evenwichtsconcentraties'];
  setProgress(steps,3);

  const activeFluid=names.map((nm,i)=>nm&&!solid[i]&&co[i]>0?{nm,i,co:co[i]}:null).filter(Boolean);
  const sign=(i)=>i<=1?-1:1;
  const correctE=(i)=>Bvals[keyNames[i]]+sign(i)*co[i]*x_final;

  let inputsHTML=activeFluid.map(col=>`
    <div class="input-row">
      <span class="unit-lbl">[${col.nm}]<sub>eq</sub> =</span>
      <input type="number" class="ans-input" id="finA-${col.i}" step="0.0001" placeholder="…">
      <span class="unit-lbl">mol/L</span>
    </div>`).join('');

  document.getElementById('step-final-body').innerHTML=`
    <p>Gebruik x = ${fmt(x_final,5)} mol/L${!verwValid?' (exacte oplossing)':' (verwaarlozing geldig)'}.</p>
    ${inputsHTML}
    <button class="check-btn" onclick="checkFinalA()">Controleer</button>
    <div class="fb" id="fb-finalA"></div>`;
}

function checkFinalA(){
  const{rxn,Bvals,x_final}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const keyNames=['A','B','C','D'];
  const co=[a,b,c,d];
  const sign=(i)=>i<=1?-1:1;
  const activeFluid=names.map((nm,i)=>nm&&!rxn.solid[i]&&co[i]>0?{nm,i,co:co[i]}:null).filter(Boolean);
  let allOk=true, details=[];
  activeFluid.forEach(col=>{
    const correct=Bvals[keyNames[col.i]]+sign(col.i)*col.co*x_final;
    const el=document.getElementById('finA-'+col.i);
    const u=parseFloat(el.value);
    const ok=!isNaN(u)&&Math.abs(u-correct)/Math.abs(correct)<0.04;
    el.classList.toggle('ok',ok);el.classList.toggle('err',!ok);
    if(!ok){allOk=false;details.push(`[${col.nm}]eq = ${fmt(correct,4)}`);}
  });
  if(allOk){
    showFB('fb-finalA','ok','✓ Alle evenwichtsconcentraties correct! Uitstekend.');
  } else {
    showFB('fb-finalA','err','✗ '+details.join(' | '));
  }
}

// ── Eindstap B: Kc berekenen ──────────────────────────────────────────────
function showFinalB(){
  const{rxn,Bvals,Kc,x_correct,givenEqIdx}=Q;
  const[a,b,c,d]=rxn.co;
  const names=rxn.names;
  const solid=rxn.solid;
  const keyNames=['A','B','C','D'];
  const co=[a,b,c,d];
  const sign=(i)=>i<=1?-1:1;

  const sec=document.getElementById('step-final');
  sec.style.display='block';
  document.getElementById('step-final-title').textContent='Stap 3 — Kc berekenen';
  const steps=['1. BOE invullen','2. x berekenen','3. Kc berekenen'];
  setProgress(steps,2);

  // Bereken evenwichtsconcentraties
  const Evals={};
  names.forEach((nm,i)=>{if(nm&&!solid[i])Evals[i]=Bvals[keyNames[i]]+sign(i)*co[i]*x_correct;});

  // Kc-expressie
  const expr=kcExpr(names,rxn.co,solid);
  const unit=kcUnit(rxn.co);

  // Numerieke invulling tonen
  const activeFluid=names.map((nm,i)=>nm&&!solid[i]&&co[i]>0?{nm,i,co:co[i]}:null).filter(Boolean);
  const substStr=activeFluid.map(col=>`[${col.nm}]eq = ${fmt(Evals[col.i],4)} mol/L`).join(' &nbsp;|&nbsp; ');

  document.getElementById('step-final-body').innerHTML=`
    <p>Evenwichtsconcentraties (berekend via x = ${fmt(x_correct,4)} mol/L):</p>
    <div class="formula-box" style="font-size:.85em">${substStr}</div>
    <p>Vul in de Kc-expressie:</p>
    <div class="formula-box">${expr}</div>
    <div class="input-row">
      <span class="unit-lbl">Kc =</span>
      <input type="number" class="ans-input" id="ans-kc" step="0.000001" placeholder="…">
      <span class="unit-lbl kc-unit">${unit}</span>
      <button class="check-btn" onclick="checkKc()">Controleer</button>
    </div>
    <div class="fb" id="fb-kc"></div>`;
}

function checkKc(){
  const{Kc}=Q;
  const u=parseFloat(document.getElementById('ans-kc').value);
  const ok=!isNaN(u)&&Math.abs(u-Kc)/Math.abs(Kc)<0.05;
  const el=document.getElementById('ans-kc');
  el.classList.toggle('ok',ok);el.classList.toggle('err',!ok);
  const unit=kcUnit(Q.rxn.co);
  showFB('fb-kc',ok?'ok':'err',
    ok?`✓ Correct! Kc = ${fmtKc(Kc)} ${unit}`
      :`✗ Niet correct. Kc = ${fmtKc(Kc)} ${unit}`);
}

  el.innerHTML=msg;
